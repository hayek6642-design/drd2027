<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      margin: 0;
    }
    h2 { margin-top: 0; color: #00d4ff; font-size: 18px; }
    .stats {
      background: #16213e;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 13px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
    }
    .error-count { color: #ff6b6b; font-weight: bold; }
    .warning-count { color: #ffd93d; font-weight: bold; }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }
    button {
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
    .btn-secondary {
      background: #0f3460;
      color: #fff;
    }
    .btn-secondary:hover { background: #1a4a7a; }
    .btn-danger {
      background: #e94560;
      color: white;
      font-size: 12px;
      padding: 8px;
    }
    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 4px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .status.success { background: #2ecc71; color: #fff; display: block; }
    .status.error { background: #e74c3c; color: #fff; display: block; }
    .filter-group {
      margin: 15px 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      cursor: pointer;
    }
    input[type="checkbox"] { accent-color: #667eea; }
    .preview {
      background: #0f0f23;
      padding: 10px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      max-height: 150px;
      overflow-y: auto;
      margin-top: 10px;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <h2>🎯 Kimi Console Capture</h2>
  
  <div class="stats" id="stats">
    <div class="stat-row">
      <span>Total Logs Captured:</span>
      <span id="totalLogs">0</span>
    </div>
    <div class="stat-row">
      <span>Errors:</span>
      <span id="errorCount" class="error-count">0</span>
    </div>
    <div class="stat-row">
      <span>Warnings:</span>
      <span id="warningCount" class="warning-count">0</span>
    </div>
    <div class="stat-row">
      <span>Session Time:</span>
      <span id="sessionTime">0s</span>
    </div>
  </div>

  <div class="filter-group">
    <label><input type="checkbox" id="errorsOnly" checked> Errors Only</label>
    <label><input type="checkbox" id="last5Min"> Last 5 Min</label>
    <label><input type="checkbox" id="includeContext" checked> Include Context</label>
  </div>

  <div class="button-group">
    <button class="btn-primary" id="copyBtn">
      📋 Copy Formatted for Kimi
    </button>
    <button class="btn-secondary" id="downloadBtn">
      💾 Download JSON Report
    </button>
    <button class="btn-secondary" id="previewBtn">
      👁️ Preview Report
    </button>
  </div>

  <div id="status" class="status"></div>
  
  <div class="preview" id="preview" style="display: none;"></div>

  <button class="btn-danger" id="clearBtn" style="margin-top: 15px;">
    🗑️ Clear Logs
  </button>

  <script src="popup.js"></script>
</body>
</html>
