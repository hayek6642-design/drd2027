name: Build Mobile Apps

on:
  push:
    tags:
      - 'v*'           # Trigger on version tags (v1.0.0, v1.0.1, etc.)
  workflow_dispatch:     # Manual trigger from GitHub UI
    inputs:
      platform:
        description: 'Build platform'
        required: true
        default: 'both'
        type: choice
        options:
          - android
          - ios
          - both
      release_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  APP_SERVER_URL: 'https://drd2027.onrender.com'

jobs:
  # ==========================================
  # Android APK Build
  # ==========================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'android' ||
      github.event.inputs.platform == 'both'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Prepare web assets
        run: node build-apk.js --prepare-only 2>/dev/null || node -e "
          const fs = require('fs');
          const path = require('path');
          const wwwDir = './www';
          if (fs.existsSync(wwwDir)) fs.rmSync(wwwDir, { recursive: true });
          fs.mkdirSync(wwwDir, { recursive: true });
          const html = '<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover\"><meta name=\"theme-color\" content=\"#0d1117\"><title>CodeBank</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0d1117;color:#fff;font-family:system-ui;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}.spinner{width:48px;height:48px;border:3px solid #30363d;border-top-color:#00d4ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body><div style=\"text-align:center\"><div class=\"spinner\"></div><p>Connecting to CodeBank...</p></div><script>setTimeout(function(){window.location.replace(\"${{ env.APP_SERVER_URL }}\")},1000)</script></body></html>';
          fs.writeFileSync(path.join(wwwDir, 'index.html'), html);
          console.log('Web shell created');
        "

      - name: Add Android platform
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android

      - name: Configure Android permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # Ensure internet permissions
            if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
              sed -i 's/<application/\n    <uses-permission android:name="android.permission.INTERNET" \/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" \/>\n    <application/' "$MANIFEST"
            fi
          fi

      - name: Build Debug APK
        if: github.event.inputs.release_type != 'release'
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Build Release APK
        if: github.event.inputs.release_type == 'release' || startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Decode keystore from secrets
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/codebank-release.keystore
            
            cd android
            chmod +x ./gradlew
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=codebank-release.keystore \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            echo "No keystore configured, building debug APK instead"
            cd android
            chmod +x ./gradlew
            ./gradlew assembleDebug
          fi

      - name: Get version info
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Upload Debug APK
        if: github.event.inputs.release_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: CodeBank-Android-Debug-${{ steps.version.outputs.version }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        if: github.event.inputs.release_type == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: CodeBank-Android-Release-${{ steps.version.outputs.version }}
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
          retention-days: 90

  # ==========================================
  # iOS IPA Build
  # ==========================================
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'ios' ||
      github.event.inputs.platform == 'both'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Prepare web assets
        run: |
          mkdir -p www
          cat > www/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html><head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
          <title>CodeBank</title>
          <style>*{margin:0;padding:0}body{background:#0d1117;color:#fff;font-family:system-ui;min-height:100vh;display:flex;align-items:center;justify-content:center}
          .spinner{width:48px;height:48px;border:3px solid #30363d;border-top-color:#00d4ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
          @keyframes spin{to{transform:rotate(360deg)}}</style></head>
          <body><div style="text-align:center"><div class="spinner"></div><p>Connecting...</p></div>
          <script>setTimeout(function(){window.location.replace("${{ env.APP_SERVER_URL }}")},1000)</script></body></html>
          HTMLEOF

      - name: Add iOS platform
        run: |
          npx cap add ios 2>/dev/null || true
          npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS (unsigned)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build iOS Archive (Release)
        if: github.event.inputs.release_type == 'release' || startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -n "$APPLE_CERTIFICATE_BASE64" ]; then
            # Setup signing
            CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            
            echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
            echo -n "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
            
            security create-keychain -p "" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "" $KEYCHAIN_PATH
            security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
            security list-keychain -d user -s $KEYCHAIN_PATH
            
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
            
            cd ios/App
            xcodebuild \
              -workspace App.xcworkspace \
              -scheme App \
              -configuration Release \
              -archivePath $RUNNER_TEMP/CodeBank.xcarchive \
              archive
              
            # Export IPA
            cat > $RUNNER_TEMP/ExportOptions.plist << PLIST
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0"><dict>
            <key>method</key><string>ad-hoc</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            </dict></plist>
            PLIST
            
            xcodebuild -exportArchive \
              -archivePath $RUNNER_TEMP/CodeBank.xcarchive \
              -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
              -exportPath $RUNNER_TEMP/ipa-output
          else
            echo "No Apple signing certificates configured. Skipping signed build."
          fi

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: CodeBank-iOS-${{ github.sha }}
          path: |
            ${{ runner.temp }}/ipa-output/*.ipa
            ios/App/build/
          retention-days: 30

  # ==========================================
  # Create GitHub Release (on tag push)
  # ==========================================
  create-release:
    name: Create Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: CodeBank-Android-*
          path: ./artifacts/

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: CodeBank-iOS-*
          path: ./artifacts/
        continue-on-error: true  # iOS may not produce artifacts without signing

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
