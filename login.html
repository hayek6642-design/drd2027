<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBank - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00d4ff 0%, #8a2be2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d4ff 0%, #8a2be2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: #ff4757;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .signup-link {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
        .signup-link a {
            color: #00d4ff;
            text-decoration: none;
        }
        .loading {
            display: none;
            margin-bottom: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🏦</div>
        <h1>CodeBank</h1>
        <p class="subtitle">Sign in to access your assets</p>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #888;">Checking session...</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <form id="login-form" style="display: none;">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@gmail.com" required>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" id="login-btn">
                Sign In
            </button>
        </form>
        
        <p class="signup-link" id="signup-section" style="display: none;">
            Don't have an account? <a href="/signup.html">Sign up</a>
        </p>
    </div>

    <script src="/shared/js/session-manager.js"></script>
    <script>
        // Check for existing session first
        async function checkSession() {
            const loading = document.getElementById('loading');
            const form = document.getElementById('login-form');
            const signup = document.getElementById('signup-section');
            
            loading.style.display = 'block';
            
            // SessionManager will auto-redirect if valid
            // We just need to wait
            setTimeout(() => {
                // If still here after 2 seconds, show login form
                loading.style.display = 'none';
                form.style.display = 'block';
                signup.style.display = 'block';
            }, 2000);
        }
        
        // Handle login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('login-btn');
            const error = document.getElementById('error');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            error.style.display = 'none';
            
            const result = await window.SessionManager.login(email, password);
            
            if (result.success) {
                btn.textContent = 'Success! Redirecting...';
                // Redirect to app
                const params = new URLSearchParams(window.location.search);
                const redirect = params.get('redirect') || '/codebank/indexCB.html';
                window.location.href = redirect;
            } else {
                error.textContent = result.error || 'Login failed';
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
        
        // Start
        checkSession();
    </script>
</body>
</html>
