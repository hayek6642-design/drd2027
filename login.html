<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBank - Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
        }
        
        #loading {
            text-align: center;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #login-form {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        
        .logo {
            font-size: 3em;
            text-align: center;
            margin-bottom: 20px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 0.95em;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
        }
        
        input::placeholder {
            color: #666;
        }
        
        #login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #8a2be2);
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        #login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        
        #login-btn:active {
            transform: translateY(0);
        }
        
        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
        }
        
        .signup-link a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: bold;
        }
        
        .signup-link a:hover {
            text-decoration: underline;
        }
        
        #error-message {
            display: none;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid #ff4757;
            color: #ff6b7a;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95em;
        }
        
        .demo-note {
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid #00d4ff;
            padding: 12px;
            margin-top: 20px;
            font-size: 0.85em;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div id="loading">
            <div class="loading-spinner"></div>
            <p>Checking session...</p>
        </div>
        
        <div id="login-form">
            <div class="logo">🏦</div>
            <h1>CodeBank</h1>
            <p class="subtitle">Sign in to access your assets</p>
            
            <div id="error-message"></div>
            
            <form onsubmit="doLogin(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="you@example.com" 
                        required
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="••••••••" 
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <button type="submit" id="login-btn">Sign In</button>
            </form>
            
            <p class="signup-link">
                Don't have an account? <a href="/signup.html">Sign up here</a>
            </p>
            
            <div class="demo-note">
                <strong>Demo Credentials:</strong><br>
                Email: demo@example.com<br>
                Password: demo123456
            </div>
        </div>
    </div>

    <!-- Load Auth Client -->
    <script src="/shared/js/auth-client.js"></script>
    
    <script>
        // Check if already authenticated
        function init() {
            // If already logged in, redirect to app
            if (window.AuthClient.isAuth()) {
                const params = new URLSearchParams(location.search);
                const redirect = params.get('redirect') || '/codebank/indexCB.html';
                window.location.href = redirect;
                return;
            }
            
            // If loading, wait a bit longer
            if (window.AuthClient.isLoading()) {
                setTimeout(init, 300);
                return;
            }
            
            // Show login form
            document.getElementById('loading').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('email').focus();
        }
        
        // Handle login
        async function doLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const btn = document.getElementById('login-btn');
            
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errorDiv.style.display = 'none';
            
            try {
                const result = await window.AuthClient.login(email, password);
                
                if (result.success) {
                    const params = new URLSearchParams(location.search);
                    const redirect = params.get('redirect') || '/codebank/indexCB.html';
                    window.location.href = redirect;
                } else {
                    errorDiv.textContent = result.error || 'Sign in failed. Please try again.';
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            } catch (err) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }
        
        // Initialize on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            setTimeout(init, 500);
        }
    </script>
</body>
</html>
