<script>
// ── NativeBiometric + NativeStorage helpers for Capacitor ──────────────
window._NativeBio = {
  isNative: () => !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()),
  plugin: () => window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.NativeBiometric,
  prefs: () => window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Preferences,

  async isAvailable() {
    const p = this.plugin();
    if (!p) return false;
    try { const r = await p.isAvailable(); return r.isAvailable === true; } catch(_) { return false; }
  },

  // Persist session to BOTH localStorage AND Capacitor Preferences
  async saveSession(sessionId, userData) {
    localStorage.setItem('session_active', 'true');
    if (sessionId) localStorage.setItem('session_token', sessionId);
    if (userData) localStorage.setItem('user_data', typeof userData === 'string' ? userData : JSON.stringify(userData));
    const pr = this.prefs();
    if (pr) {
      try {
        await pr.set({ key: 'session_active', value: 'true' });
        if (sessionId) await pr.set({ key: 'session_token', value: sessionId });
        if (userData) await pr.set({ key: 'user_data', value: typeof userData === 'string' ? userData : JSON.stringify(userData) });
      } catch(e) { console.warn('[NativeBio] saveSession error:', e); }
    }
  },

  // Restore session from Capacitor Preferences → localStorage
  async restoreSession() {
    const pr = this.prefs();
    if (!pr) return false;
    try {
      const r = await pr.get({ key: 'session_active' });
      if (r.value !== 'true') return false;
      const t = await pr.get({ key: 'session_token' });
      const u = await pr.get({ key: 'user_data' });
      if (t.value) localStorage.setItem('session_token', t.value);
      if (u.value) localStorage.setItem('user_data', u.value);
      localStorage.setItem('session_active', 'true');
      return true;
    } catch(e) { return false; }
  }
};
</script>

<script>
(function() {
  var reason = new URLSearchParams(window.location.search).get('reason');
  if (reason === 'kicked') {
    var msg = sessionStorage.getItem('__kickout_reason__') ||
      'Your account was opened on another device. Sign in here to continue.';
    sessionStorage.removeItem('__kickout_reason__');
    // Inject banner after body opens
    document.addEventListener('DOMContentLoaded', function() {
      var banner = document.createElement('div');
      banner.id = 'kickout-banner';
      banner.style.cssText = [
        'position:fixed', 'top:0', 'left:0', 'right:0', 'z-index:99999',
        'background:linear-gradient(90deg,#c0392b,#e74c3c)',
        'color:#fff', 'text-align:center', 'padding:12px 20px',
        'font-size:14px', 'font-family:-apple-system,BlinkMacSystemFont,sans-serif',
        'box-shadow:0 2px 12px rgba(0,0,0,0.4)', 'display:flex',
        'align-items:center', 'justify-content:center', 'gap:10px'
      ].join(';');
      banner.innerHTML = '<span>📱</span><span>' + msg + '</span>' +
        '<button onclick="document.getElementById('kickout-banner').remove()" ' +
        'style="background:rgba(255,255,255,0.2);border:none;color:#fff;' +
        'padding:4px 10px;border-radius:4px;cursor:pointer;font-size:13px;margin-left:8px">✕</button>';
      document.body.insertBefore(banner, document.body.firstChild);
      // Auto-dismiss after 8s
      setTimeout(function() {
        var b = document.getElementById('kickout-banner');
        if (b) b.remove();
      }, 8000);
    });
  }
})();
</script>

<script>
const API_BASE = '';

console.log('🔥 API_BASE:', API_BASE);
console.log('🔥 Window origin:', window.location.origin);

  // 🧠 Auth Flow Control: Auto-redirect if session is ACTUALLY active
  // 🛡️ FIX: Don't blindly trust localStorage — validate with server first
  //   Also check Capacitor Preferences (native storage) for persisted sessions.
  (async function checkExistingSession() {
    // First: try to restore from Capacitor Preferences (survives app kill on Android)
    const localActive = localStorage.getItem("session_active") === "true";
    if (!localActive && window._NativeBio && window._NativeBio.isNative()) {
      await window._NativeBio.restoreSession();
    }

    if (localStorage.getItem("session_active") === "true") {
      // Quick gate: if the cookie is already gone, no point asking the server
      if (!document.cookie.includes('session_token=')) {
        localStorage.removeItem("session_active");
        localStorage.removeItem("session_token");
        localStorage.removeItem("user_data");
        localStorage.removeItem("__cached_user__");
        localStorage.removeItem("__cached_session_id__");
      } else {
        // Cookie exists — ask the server if it's still valid
        fetch('/api/auth/me', { credentials: 'include' })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.success || data.authenticated || data.ok) {
              window.location.href = "/yt-new-clear.html";
            } else {
              // Server says NO — nuke stale client state
              localStorage.removeItem("session_active");
              localStorage.removeItem("session_token");
              localStorage.removeItem("user_data");
              localStorage.removeItem("__cached_user__");
              localStorage.removeItem("__cached_session_id__");
              document.cookie = "session_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            }
          })
          .catch(function() {
            // Network error — clear stale flag so user isn't stuck
            localStorage.removeItem("session_active");
          });
      }
    } else {
      // No session in either storage — also check if biometric can auto-login
      if (window._NativeBio && window._NativeBio.isNative()) {
        const bioAvailable = await window._NativeBio.isAvailable();
        const prefs = window._NativeBio.prefs();
        if (bioAvailable && prefs) {
          try {
            const t = await prefs.get({ key: 'session_token' });
            if (t.value) {
              document.getElementById('biometricSection').style.display = 'block';
            }
          } catch(_) {}
        }
      }
    }
  })();

  let sessionId = null;
let verificationStatus = { email: false, phone: false };
let emailOtpSessionId = null; // tracks active email-OTP session
let countriesData = [];
let religionsData = [];

// Load data on page load
document.addEventListener('DOMContentLoaded', async () => {
  await Promise.all([loadCountries(), loadReligions()]);
});

async function loadCountries() {
  const loadingEl = document.getElementById('countryLoading');
  if (loadingEl) loadingEl.textContent = '(loading...)';
  try {
    const response = await fetch(`${API_BASE}/api/countries`);
    const data = await response.json();
    if (data.success) {
      countriesData = data.countries;
      populateCountrySelects();
    }
  } catch (error) {
    console.error('Failed to load countries:', error);
  } finally {
    if (loadingEl) loadingEl.textContent = '';
  }
}

async function loadReligions() {
  const loadingEl = document.getElementById('religionLoading');
  if (loadingEl) loadingEl.textContent = '(loading...)';
  try {
    const response = await fetch(`${API_BASE}/api/religions`);
    const data = await response.json();
    if (data.success) {
      religionsData = data.religions;
      populateReligionSelect();
    }
  } catch (error) {
    // Fallback
    religionsData = [
      { value: 'Islam', label: 'Islam', icon: '☪️' },
      { value: 'Christianity', label: 'Christianity', icon: '✝️' },
      { value: 'Judaism', label: 'Judaism', icon: '✡️' },
      { value: 'Hinduism', label: 'Hinduism', icon: '🕉️' },
      { value: 'Buddhism', label: 'Buddhism', icon: '☸️' },
      { value: 'Sikhism', label: 'Sikhism', icon: '🪯' },
      { value: 'Atheist', label: 'Atheist', icon: '⚛️' },
      { value: 'Agnostic', label: 'Agnostic', icon: '❓' },
      { value: 'Other', label: 'Other', icon: '🌐' },
      { value: 'Prefer not to say', label: 'Prefer not to say', icon: '🤫' }
    ];
    populateReligionSelect();
  } finally {
    if (loadingEl) loadingEl.textContent = '';
  }
}

function populateCountrySelects() {
  const countrySelect = document.getElementById('country');
  const countryCodeSelect = document.getElementById('countryCode');
  
  if (!countrySelect || !countryCodeSelect) return;

  countrySelect.innerHTML = '<option value="">-- Select Country --</option>';
  countryCodeSelect.innerHTML = '<option value="">Code</option>';
  
  countriesData.forEach(country => {
    const option = document.createElement('option');
    option.value = country.code;
    option.textContent = `${country.flag} ${country.name}`;
    option.setAttribute('data-phone-code', country.phoneCode);
    countrySelect.appendChild(option);
    
    const codeOption = document.createElement('option');
    codeOption.value = country.phoneCode;
    codeOption.textContent = `${country.flag} ${country.phoneCode}`;
    codeOption.setAttribute('data-country', country.code);
    countryCodeSelect.appendChild(codeOption);
  });
}

function populateReligionSelect() {
  const religionSelect = document.getElementById('religion');
  if (!religionSelect) return;

  religionSelect.innerHTML = '<option value="">-- Select Religion --</option>';
  religionsData.forEach(religion => {
    const option = document.createElement('option');
    option.value = religion.value;
    option.textContent = `${religion.icon || ''} ${religion.label || religion.value}`;
    religionSelect.appendChild(option);
  });
}

function updateCountryCode() {
  const countrySelect = document.getElementById('country');
  const countryCodeSelect = document.getElementById('countryCode');
  if (!countrySelect || !countryCodeSelect) return;

  const selectedOption = countrySelect.options[countrySelect.selectedIndex];
  const phoneCode = selectedOption.getAttribute('data-phone-code');
  
  if (phoneCode) {
    for (let i = 0; i < countryCodeSelect.options.length; i++) {
      if (countryCodeSelect.options[i].value === phoneCode) {
        countryCodeSelect.selectedIndex = i;
        break;
      }
    }
  }
}

function switchTab(tab, evt) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  if (evt && evt.target) evt.target.classList.add('active');
  
  if (tab === 'signup') {
    document.getElementById('signupForm').style.display = 'block';
    document.getElementById('loginForm').style.display = 'none';
  } else {
    document.getElementById('signupForm').style.display = 'none';

  if (!statusEl) return;
  statusEl.textContent = message;
  statusEl.className = 'status-message ' + type;
  setTimeout(() => {
    statusEl.className = 'status-message';
  }, 5000);
}

async function verifyOTP(channel) {
  const otpInput = channel === 'email' ? 'emailOtp' : 'phoneOtp';
  const otp = document.getElementById(otpInput).value.trim();
  
  if (!otp || otp.length !== 6) {
    showStatus(`Please enter the 6-digit OTP`, 'error');
    return;
  }
  
  try {
    const response = await fetch(`${API_BASE}/api/auth/verify-hybrid-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, otp, channel })
    });
    
    const data = await response.json();
    
    if (data.success) {
      verificationStatus[channel] = true;
      updateChannelStatus(channel, true);
      
      if (data.verified) {
        showStatus('Phone number verified! You can now complete signup.', 'success');
        document.getElementById('signupBtn').disabled = false;
        if (document.getElementById('phoneOtpInput')) {
          document.getElementById('phoneOtpInput').style.display = 'none';
        }
      }
    } else {
      showStatus(data.error || 'Invalid OTP', 'error');
    }
  } catch (error) {
    showStatus('Verification failed. Please try again.', 'error');
  }
}

async function resendOTP(channel) {
  try {
    const response = await fetch(`${API_BASE}/api/auth/resend-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, channel })
    });
    
    const data = await response.json();
    
    if (data.success) {
      showStatus(`OTP resent via ${channel}`, 'success');
    } else {
      showStatus(data.error || 'Failed to resend', 'error');
    }
  } catch (error) {
    showStatus('Failed to resend OTP', 'error');
  }
}

function updateChannelStatus(channel, verified) {
  const channelEl = document.getElementById(channel + 'Channel');
  const statusEl = document.getElementById(channel + 'Status');
  const inputEl = document.getElementById(channel + 'OtpInput');
  
  if (verified && channelEl && statusEl && inputEl) {
    channelEl.classList.remove('pending');
    channelEl.classList.add('verified');
    statusEl.textContent = '✓ Verified';
    inputEl.style.display = 'none';
    
    // Enable signup button when verification is successful
    if (channel === 'phone') {
      const signupBtn = document.getElementById('signupBtn');
      if (signupBtn) signupBtn.disabled = false;
    }
  }
}

function startTimer() {
  let seconds = 600; // 10 minutes
  
  const timerEl = document.getElementById('timer');
  if (!timerEl) return;

  const interval = setInterval(() => {
    seconds--;
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    timerEl.textContent = `Codes expire in ${mins}:${secs.toString().padStart(2, '0')}`;
    
    if (seconds <= 0) {
      clearInterval(interval);
      timerEl.textContent = 'Codes expired. Please request new codes.';
    }
  }, 1000);
}

async function handleSignup() {
  const email = document.getElementById('signupEmail').value.trim();
  const username = document.getElementById('signupUsername').value.trim();
  const password = document.getElementById('signupPassword').value;
  const religion = document.getElementById('religion').value;
  const country = document.getElementById('country').value;
  const countryCode = document.getElementById('countryCode').value;
  const phone = document.getElementById('phoneNumber').value.trim();
  
  if (!email || !username || !password || !religion || !country || !phone) {
    showStatus('Please fill in all fields', 'error');
    return;
  }
  
  // 🔒 OTP gate — must verify email before completing signup
  if (!verificationStatus.email) {
    showStatus('Please verify your email address first — click "Send Code"', 'error');
    document.getElementById('signupEmail').focus();
    return;
  }
  
  // Password strength validation
  if (password.length < 8) {
    showStatus('Password must be at least 8 characters long', 'error');
    return;
  }
  if (!/[0-9!@#$%^&*()_\-+=]/.test(password)) {
    showStatus('Password must include at least one number or special character', 'error');
    return;
  }
  
  const signupBtn = document.getElementById('signupBtn');
  signupBtn.disabled = true;
  signupBtn.innerHTML = '<span class="loading"></span> Creating account...';
  
  try {
    const response = await fetch(`${API_BASE}/api/auth/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        email,
        username,
        password,
        religion,
        country,
        phone,
        countryCode
      })
    });
    
    const data = await response.json();
    
    if (data.status === 'success') {
      showStatus('Account created successfully! Redirecting...', 'success');
      
      // 🛡️ CRITICAL: Store session and update auth state
      const session = {
        userId: data.userId,
        sessionId: data.sessionId,
        user: data.user
      };
      localStorage.setItem('session_token', data.sessionId);
      localStorage.setItem('user_data', JSON.stringify(data.user));
      
      // 🧠 Auth Flow Control
      localStorage.setItem('session_active', 'true');

      // 📱 NATIVE: Persist to Capacitor Preferences so session survives app kill
      if (window._NativeBio) window._NativeBio.saveSession(data.sessionId, data.user);
      
      // FIXED: Update auth state to authenticated in AuthCore
      if (window.AuthCore && typeof window.AuthCore._setState === 'function') {
        window.AuthCore._setState({
          authenticated: true,
          status: 'active',
          userId: data.userId,
          sessionId: data.sessionId,
          user: data.user
        });
      }
      
      setTimeout(() => {
        window.location.href = '/yt-new-clear.html';
      }, 1500);
    } else {
      if (data.error === 'USER_EXISTS') {
        showStatus('Account already exists. Please sign in.', 'error');
        return;
      }
      showStatus(data.error || 'Signup failed', 'error');
      signupBtn.disabled = false;
      signupBtn.textContent = 'Complete Sign Up';
    }
  } catch (error) {
    showStatus('Network error. Please try again.', 'error');
    signupBtn.disabled = false;
    signupBtn.textContent = 'Complete Sign Up';
  }
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  if (!email || !password) {
    showStatus('Email and password required', 'error');
    return;
  }

  try {
    const response = await fetch(`${API_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (data.status === 'success') {
      showStatus('Login successful! Redirecting...', 'success');
      
      // 🛡️ CRITICAL: Store session and update auth state
      localStorage.setItem('session_token', data.sessionId);
      if (data.user) {
        localStorage.setItem('user_data', JSON.stringify(data.user));
      }
      
      // 🧠 Auth Flow Control
      localStorage.setItem('session_active', 'true');

      // 📱 NATIVE: Persist to Capacitor Preferences so session survives app kill
      if (window._NativeBio) window._NativeBio.saveSession(data.sessionId, data.user);
      
      // FIXED: Update auth state to authenticated in AuthCore
      if (window.AuthCore && typeof window.AuthCore._setState === 'function') {
        window.AuthCore._setState({
          authenticated: true,
          status: 'active',
          userId: data.userId,
          sessionId: data.sessionId,
          user: data.user
        });
      }
      
      localStorage.setItem('last_login_email', email);
      // Offer biometric registration if device supports it (native only)
      if (window._NativeBio && window._NativeBio.isNative()) {
        window._NativeBio.isAvailable().then(bioOk => {
          if (bioOk) {
            document.getElementById('registerBiometricSection').style.display = 'block';
            setTimeout(() => { window.location.href = '/yt-new-clear.html'; }, 3000);
            return;
          }
          window.location.href = '/yt-new-clear.html';
        });
      } else {
        setTimeout(() => { window.location.href = '/yt-new-clear.html'; }, 1500);
      }
    } else {
      showStatus(data.error || 'Login failed', 'error');
    }
  } catch (error) {
    showStatus('Network error. Please try again.', 'error');
  }
}

//  BIOMETRIC — Uses capacitor-native-biometric plugin

// On page load: check if native biometric is available + stored session exists
document.addEventListener('DOMContentLoaded', async () => {
  if (!window._NativeBio || !window._NativeBio.isNative()) return;
  try {
    const bioAvailable = await window._NativeBio.isAvailable();
    const prefs = window._NativeBio.prefs();
    if (bioAvailable && prefs) {
      const t = await prefs.get({ key: 'session_token' });
      if (t.value) {
        // Restore last known email to the input
        const emailResult = await prefs.get({ key: 'user_data' });
        if (emailResult.value) {
          try {
            const u = JSON.parse(emailResult.value);
            const emailInput = document.getElementById('loginEmail');
            if (emailInput && u.email) emailInput.value = u.email;
          } catch(_) {}
        }
        document.getElementById('biometricSection').style.display = 'block';
      }
    }
  } catch(e) { console.warn('[Biometric] init error:', e); }
});

async function handleBiometricLogin() {
  const btn = document.getElementById('bioAuthBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span> Verifying biometric...';

  try {
    if (!window._NativeBio || !window._NativeBio.isNative()) {
      throw new Error('Biometric login is only available on the mobile app');
    }

    // Step 1: Trigger native biometric prompt (fingerprint / face)
    const NativeBiometric = window.Capacitor.Plugins.NativeBiometric;
    await NativeBiometric.verifyIdentity({
      reason: 'Sign in to CodeBank',
      title: 'Biometric Login',
      subtitle: 'Use fingerprint or face to sign in',
      negativeButtonText: 'Use Password Instead'
    });

    // Step 2: Biometric passed — restore session from Capacitor Preferences
    const prefs = window._NativeBio.prefs();
    if (!prefs) throw new Error('Storage unavailable');

    const tokenResult = await prefs.get({ key: 'session_token' });
    if (!tokenResult.value) {
      throw new Error('No saved session. Please log in with your password first.');
    }

    // Restore to localStorage
    localStorage.setItem('session_token', tokenResult.value);
    const userData = await prefs.get({ key: 'user_data' });
    if (userData.value) localStorage.setItem('user_data', userData.value);
    localStorage.setItem('session_active', 'true');

    // Step 3: Validate the restored session with the server
    showStatus('Verifying session...', 'info');
    const resp = await fetch('/api/auth/me', { credentials: 'include' });
    const data = await resp.json();

    if (data.success || data.authenticated || data.ok) {
      showStatus('✅ Welcome back!', 'success');
      setTimeout(() => { window.location.href = '/yt-new-clear.html'; }, 800);
    } else {
      // Session expired — clear it
      localStorage.removeItem('session_active');
      localStorage.removeItem('session_token');
      await prefs.remove({ key: 'session_active' });
      await prefs.remove({ key: 'session_token' });
      throw new Error('Session expired. Please log in with your password.');
    }
  } catch (err) {
    console.error('[BIOMETRIC]', err);
    const msg = err.message || '';
    if (msg.includes('cancel') || msg.includes('Cancel') || err.code === 10 || err.code === 'BIOMETRIC_DISMISSED') {
      showStatus('Biometric cancelled — use your password below', 'error');
    } else {
      showStatus(msg || 'Biometric failed', 'error');
    }
    btn.disabled = false;
    btn.innerHTML = '<span style="font-size:22px">🪪</span> Sign in with Fingerprint / Face ID';
  }
}

async function registerBiometric() {
  const section = document.getElementById('registerBiometricSection');
  if (!window._NativeBio || !window._NativeBio.isNative()) {
    section.innerHTML = '<div style="text-align:center;padding:10px;color:#aaa">Biometric login is only available on the mobile app.</div>';
    return;
  }

  try {
    section.innerHTML = '<div style="text-align:center;padding:10px"><span class="loading"></span> Checking biometric...</div>';

    // Verify biometric is available
    const available = await window._NativeBio.isAvailable();
    if (!available) throw new Error('No biometric hardware found on this device');

    // Test that biometric works (optional prompt)
    const NativeBiometric = window.Capacitor.Plugins.NativeBiometric;
    await NativeBiometric.verifyIdentity({
      reason: 'Enable biometric login for CodeBank',
      title: 'Enable Biometric',
      subtitle: 'Confirm your identity to enable fast login',
      negativeButtonText: 'Cancel'
    });

    // Session data is already saved to Capacitor Preferences after login.
    // Biometric is now "registered" — just mark it
    localStorage.setItem('biometric_registered', '1');
    const prefs = window._NativeBio.prefs();
    if (prefs) await prefs.set({ key: 'biometric_registered', value: '1' });

    section.innerHTML = `
      <div style="text-align:center;padding:10px;color:#00ff88">
        🎉 Fingerprint / Face ID enabled!<br>
        <small style="color:#aaa">Next login, just tap the fingerprint button.</small>
      </div>`;
  } catch (err) {
    console.error('[BIOMETRIC REG]', err);
    const msg = err.message || '';
    if (msg.includes('cancel') || msg.includes('Cancel')) {
      section.innerHTML = '<div style="text-align:center;padding:10px;color:#aaa">Setup cancelled.</div>';
      return;
    }
    section.innerHTML = `
      <div style="text-align:center;padding:10px;color:#ff6b6b">
        ❌ ${err.message || 'Biometric setup failed'}<br>
        <small style="color:#aaa">You can try again from your profile settings.</small>
      </div>`;
  }
}

async function handleGoogleCredential(response) {
  const statusEl = document.getElementById('statusMessage');
  try {
    if (statusEl) {
      statusEl.textContent = 'Signing in with Google...';
      statusEl.className = 'status-message success';
      statusEl.style.display = 'block';
    }

    const res = await fetch('/api/auth/google', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ credential: response.credential })
    });

    const data = await res.json();

    if (data.status === 'success') {
      localStorage.setItem('session_token', data.sessionId);
      if (data.user) localStorage.setItem('user_data', JSON.stringify(data.user));
      localStorage.setItem('session_active', 'true');
      if (data.user && data.user.email) localStorage.setItem('last_login_email', data.user.email);
      // 📱 NATIVE: Persist to Capacitor Preferences so session survives app kill
      if (window._NativeBio) window._NativeBio.saveSession(data.sessionId, data.user);

      // 📱 NATIVE: Persist to Capacitor Preferences so session survives app kill
      if (window._NativeBio) window._NativeBio.saveSession(data.sessionId, data.user);

      if (window.AuthCore && typeof window.AuthCore._setState === 'function') {
        window.AuthCore._setState({
          authenticated: true,
          status: 'active',
          userId: data.userId,
          sessionId: data.sessionId,
          user: data.user
        });
      }

      if (statusEl) {
        statusEl.textContent = '✅ Signed in with Google! Redirecting...';
        statusEl.className = 'status-message success';
      }

      setTimeout(function() { window.location.href = '/yt-new-clear.html'; }, 1000);
    } else {
      if (statusEl) {
        statusEl.textContent = data.error || 'Google sign-in failed';
        statusEl.className = 'status-message error';
      }
    }
  } catch (e) {
    console.error('[Google Auth Error]', e);
    if (statusEl) {
      statusEl.textContent = 'Network error during Google sign-in';
      statusEl.className = 'status-message error';
    }
  }
}

// Wait for Google library to load, then initialize
function _tryInitGoogle() {
  if (window.google && window.google.accounts) {
    initGoogleSignIn();
  } else {
    setTimeout(_tryInitGoogle, 300);
  }
}
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(_tryInitGoogle, 200);
});
</script>
