<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - DRD 2027</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .signup-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }

        .signup-container h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .signup-container p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input[type="password"]:valid {
            border-color: #4caf50;
        }

        .form-group input[type="password"]:invalid:not(:placeholder-shown) {
            border-color: #f44336;
        }

        .strength-indicator {
            display: none;
            margin-top: 8px;
            font-size: 12px;
            font-weight: 500;
        }

        .strength-indicator.weak {
            color: #f44336;
        }

        .strength-indicator.fair {
            color: #ff9800;
        }

        .strength-indicator.good {
            color: #2196f3;
        }

        .strength-indicator.strong {
            color: #4caf50;
        }

        .password-match {
            display: none;
            margin-top: 8px;
            font-size: 12px;
            font-weight: 500;
            color: #f44336;
        }

        .password-match.match {
            color: #4caf50;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            display: none;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .message.success {
            display: block;
            background: #c8e6c9;
            color: #2e7d32;
            border: 1px solid #4caf50;
        }

        .message.error {
            display: block;
            background: #ffcdd2;
            color: #c62828;
            border: 1px solid #f44336;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #764ba2;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 10px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <h1>Create Account</h1>
        <p>Join DRD 2027 Today</p>

        <form id="signupForm">
            <div id="message" class="message"></div>

            <!-- Username & Email Row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="username">Username (optional)</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
            </div>

            <!-- Password Row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                    <div id="strengthIndicator" class="strength-indicator"></div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required>
                    <div id="matchIndicator" class="password-match"></div>
                </div>
            </div>

            <!-- Country Code & Phone Row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="countryCode">Country Code *</label>
                    <input type="text" id="countryCode" name="countryCode" placeholder="+1" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" placeholder="1234567890" required>
                </div>
            </div>

            <!-- Religion & Country Row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="religion">Religion *</label>
                    <select id="religion" name="religion" required>
                        <option value="">Select religion</option>
                        <option value="Christianity">Christianity</option>
                        <option value="Islam">Islam</option>
                        <option value="Hinduism">Hinduism</option>
                        <option value="Buddhism">Buddhism</option>
                        <option value="Judaism">Judaism</option>
                        <option value="Sikhism">Sikhism</option>
                        <option value="Atheism">Atheism</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="country">Country *</label>
                    <select id="country" name="country" required>
                        <option value="">Select country</option>
                        <option value="United States">United States</option>
                        <option value="United Kingdom">United Kingdom</option>
                        <option value="Canada">Canada</option>
                        <option value="Australia">Australia</option>
                        <option value="Germany">Germany</option>
                        <option value="France">France</option>
                        <option value="India">India</option>
                        <option value="Japan">Japan</option>
                        <option value="China">China</option>
                        <option value="Brazil">Brazil</option>
                        <option value="Mexico">Mexico</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>

            <button type="submit" id="signupBtn">Create Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="/login.html">Sign in here</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('signupForm');
        const messageDiv = document.getElementById('message');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const strengthIndicator = document.getElementById('strengthIndicator');
        const matchIndicator = document.getElementById('matchIndicator');
        const loadingDiv = document.getElementById('loading');
        const signupBtn = document.getElementById('signupBtn');

        // Password strength checker
        function checkPasswordStrength(password) {
            let strength = 'weak';
            if (password.length >= 8) {
                if (/[a-z]/.test(password) && /[A-Z]/.test(password) && /[0-9]/.test(password) && /[^a-zA-Z0-9]/.test(password)) {
                    strength = 'strong';
                } else if (/[a-z]/.test(password) && /[A-Z]/.test(password) && /[0-9]/.test(password)) {
                    strength = 'good';
                } else if (/[a-z]/.test(password) && /[A-Z]/.test(password)) {
                    strength = 'fair';
                } else {
                    strength = 'fair';
                }
            }
            return strength;
        }

        // Update password strength indicator
        passwordInput.addEventListener('input', () => {
            const strength = checkPasswordStrength(passwordInput.value);
            strengthIndicator.textContent = `Password strength: ${strength}`;
            strengthIndicator.className = `strength-indicator ${strength}`;
            strengthIndicator.style.display = passwordInput.value ? 'block' : 'none';
            checkPasswordMatch();
        });

        // Check password match
        function checkPasswordMatch() {
            const match = passwordInput.value === confirmPasswordInput.value && passwordInput.value.length > 0;
            if (confirmPasswordInput.value) {
                matchIndicator.textContent = match ? '✓ Passwords match' : '✗ Passwords do not match';
                matchIndicator.className = `password-match ${match ? 'match' : ''}`;
                matchIndicator.style.display = 'block';
            } else {
                matchIndicator.style.display = 'none';
            }
        }

        confirmPasswordInput.addEventListener('input', checkPasswordMatch);

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Basic validation
            if (passwordInput.value !== confirmPasswordInput.value) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            const formData = {
                email: document.getElementById('email').value.trim(),
                password: passwordInput.value,
                username: document.getElementById('username').value.trim(),
                countryCode: document.getElementById('countryCode').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                religion: document.getElementById('religion').value,
                country: document.getElementById('country').value
            };

            // Show loading state
            loadingDiv.style.display = 'block';
            signupBtn.disabled = true;

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData),
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.status === 'success' || data.success) {
                    showMessage('✓ Account created successfully! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    const error = data.message || data.error || 'Signup failed';
                    showMessage(error, 'error');
                }
            } catch (error) {
                console.error('[Signup Error]:', error);
                showMessage(`Network error: ${error.message}`, 'error');
            } finally {
                loadingDiv.style.display = 'none';
                signupBtn.disabled = false;
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            if (type === 'error') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>
</html>
