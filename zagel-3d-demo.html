<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕊️ Zagel OS - 3D Voice Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 600px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .zagel-viewport {
            background: linear-gradient(135deg, #E3F2FD 0%, #F3E5F5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            min-height: 400px;
        }

        #zagel-3d-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-panel {
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .control-panel h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .section-title {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-state {
            background: #667eea;
            color: white;
        }

        .btn-state:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-action {
            background: #FFD700;
            color: #333;
            font-weight: 600;
        }

        .btn-action:hover {
            background: #FFC700;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
            grid-column: 1;
        }

        .speech-test {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .speech-input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .speech-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .text-input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
        }

        .text-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .status-bar {
            padding: 12px;
            background: #F5F5F5;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
        }

        .status-indicator.active {
            background: #4CAF50;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .log-area {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            max-height: 300px;
            background: rgba(0, 0, 0, 0.9);
            color: #0F0;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            overflow-y: auto;
            z-index: 10000;
        }

        .log-area.show {
            display: block;
        }

        .log-entry {
            margin: 5px 0;
            padding: 3px 0;
            border-bottom: 1px solid #333;
        }

        .log-entry.error {
            color: #FF6B6B;
        }

        .log-entry.success {
            color: #51CF66;
        }

        .log-entry.info {
            color: #74C0FC;
        }

        .toggle-log {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 10001;
        }

        .toggle-log:hover {
            background: #5568d3;
        }

        .info-box {
            background: #E3F2FD;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #333;
        }

        .voice-status {
            padding: 15px;
            background: #FFF9C4;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            color: #F57F17;
        }

        .voice-status.listening {
            background: #C8E6C9;
            color: #2E7D32;
            animation: pulse-bg 1s infinite;
        }

        @keyframes pulse-bg {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <button class="toggle-log">📋 Log</button>
    
    <div class="container">
        <!-- 3D Viewport -->
        <div class="zagel-viewport">
            <div id="zagel-3d-container"></div>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <h1>🕊️ Zagel OS</h1>

            <div class="info-box">
                Complete AI voice assistant with 3D avatar, state animations, and speech synchronization.
            </div>

            <!-- Voice Status -->
            <div id="voice-status" class="voice-status">
                Click a button to interact
            </div>

            <!-- Animation States -->
            <div class="section">
                <div class="section-title">🎬 Animation States</div>
                <div class="button-group">
                    <button class="btn-state" onclick="zagel.setState('idle')">Idle 😌</button>
                    <button class="btn-state" onclick="zagel.setState('listening')">Listening 👂</button>
                    <button class="btn-state" onclick="zagel.setState('talking')">Talking 💬</button>
                    <button class="btn-state" onclick="zagel.setState('excited')">Excited 🎉</button>
                    <button class="btn-state" onclick="zagel.setState('flying')">Flying ✈️</button>
                    <button class="btn-state" onclick="zagel.setState('walking')">Walking 🚶</button>
                </div>
            </div>

            <!-- Speech Synthesis -->
            <div class="section">
                <div class="section-title">🔊 Speech Test</div>
                <textarea class="text-input" id="speech-text" placeholder="اكتب نصاً هنا للتحدث...">السلام عليكم ورحمة الله وبركاته!</textarea>
                <button class="btn-action" onclick="speakText()">
                    🔊 Speak
                </button>
            </div>

            <!-- Quick Actions -->
            <div class="section">
                <div class="section-title">⚡ Quick Actions</div>
                <button class="btn-action" onclick="playAnimation('excited')">
                    🎉 Play Excited
                </button>
                <button class="btn-action" onclick="playAnimation('flying')">
                    ✈️ Play Flying
                </button>
                <button class="btn-action" onclick="syncMouth()">
                    👄 Sync Mouth
                </button>
            </div>

            <!-- Debug -->
            <div class="section">
                <div class="section-title">🔧 Debug</div>
                <button class="btn-small" onclick="toggleLog()">Show Log</button>
                <button class="btn-small" onclick="clearLog()">Clear</button>
            </div>
        </div>
    </div>

    <!-- Log Area -->
    <div id="log-area" class="log-area"></div>

    <script type="module">
        import { initZagel3D, getZagel3D, ZAGEL_STATES } from './shared/zagel-3d-integration.js'
        import { createZagel3D } from './shared/zagel-3d.js'
        import { ZagelVoice } from './shared/zagel-voice.js'

        // ===== Initialize =====
        let zagel = null
        const container = document.getElementById('zagel-3d-container')

        try {
            // Create 3D scene directly (without integration for now)
            zagel = createZagel3D(container, {
                onBirdClick: () => log('Bird clicked!', 'info')
            })
            log('✅ Zagel 3D initialized', 'success')
        } catch (error) {
            log('❌ Initialization error: ' + error.message, 'error')
            console.error(error)
        }

        // ===== Global Functions =====
        window.zagel = zagel

        window.setState = function(state) {
            if (zagel && zagel.bird) {
                zagel.bird.setState(state)
                log(`State: ${state}`, 'info')
                updateVoiceStatus(`State: ${state}`)
            }
        }

        window.speakText = function() {
            const text = document.getElementById('speech-text').value
            if (!text) return

            updateVoiceStatus('Speaking... 🎤')
            log(`Speaking: "${text}"`, 'info')
            
            // Sync with talking state
            if (zagel && zagel.bird) {
                zagel.bird.setState('talking')
            }

            // Use Web Speech API
            const utterance = new SpeechSynthesisUtterance(text)
            utterance.lang = 'ar-SA'
            utterance.rate = 1
            utterance.pitch = 1
            utterance.volume = 1

            utterance.onend = () => {
                updateVoiceStatus('Ready 👂')
                if (zagel && zagel.bird) {
                    zagel.bird.setState('idle')
                }
                log('Speech finished', 'success')
            }

            utterance.onerror = (e) => {
                log(`Speech error: ${e.error}`, 'error')
                updateVoiceStatus('Error ❌')
            }

            speechSynthesis.speak(utterance)
        }

        window.playAnimation = function(animType) {
            if (!zagel || !zagel.bird) return

            log(`Playing: ${animType}`, 'info')

            if (animType === 'excited') {
                zagel.bird.setState('excited')
                setTimeout(() => {
                    zagel.bird.setState('idle')
                }, 3000)
            } else if (animType === 'flying') {
                zagel.bird.setState('flying')
                setTimeout(() => {
                    zagel.bird.setState('idle')
                }, 2000)
            }
        }

        window.syncMouth = function() {
            if (!zagel) return

            log('Syncing mouth...', 'info')
            
            // Animate mouth opening and closing
            for (let i = 0; i <= 10; i++) {
                setTimeout(() => {
                    const level = Math.sin((i / 10) * Math.PI)
                    if (zagel.bird) {
                        zagel.bird.syncBeakWithSpeech(level)
                    }
                }, i * 100)
            }

            setTimeout(() => {
                if (zagel.bird) {
                    zagel.bird.syncBeakWithSpeech(0)
                }
                log('Mouth sync complete', 'success')
            }, 1100)
        }

        // ===== Logging =====
        let logEnabled = false

        window.log = function(message, type = 'info') {
            console.log(`[${type.toUpperCase()}] ${message}`)

            if (!logEnabled) return

            const logArea = document.getElementById('log-area')
            const entry = document.createElement('div')
            entry.className = `log-entry ${type}`
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`
            logArea.appendChild(entry)
            logArea.scrollTop = logArea.scrollHeight

            if (logArea.children.length > 50) {
                logArea.removeChild(logArea.firstChild)
            }
        }

        window.toggleLog = function() {
            logEnabled = !logEnabled
            document.getElementById('log-area').classList.toggle('show')
        }

        window.clearLog = function() {
            document.getElementById('log-area').innerHTML = ''
        }

        function updateVoiceStatus(text) {
            document.getElementById('voice-status').textContent = text
        }

        // ===== Initial Log =====
        log('🕊️ Zagel OS 3D Demo Loaded', 'success')
        log('Click animation buttons to test states', 'info')
        log('Enter text and click Speak to hear Zagel talk', 'info')
    </script>
</body>
</html>
