<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--  RELOAD PROTECTION (from actly.md) -->
    <script>
      (function() {
        const reloadKey = 'last_reload_time';
        const minReloadInterval = 999999999;  // Effectively disabled // Allow login redirect time 
        // FIX: Check for session token FIRST before reload check
        const savedToken = localStorage.getItem('session_token') || sessionStorage.getItem('sessionId');
        if (savedToken) {
            console.log('[AUTH PRESERVED] Session found');
            localStorage.setItem(reloadKey, Date.now().toString());
            return;
        }

        // Only run legacy reload check if no session exists
        const lastReload = parseInt(localStorage.getItem(reloadKey) || '0');
        const now = Date.now();
        if (now - lastReload < minReloadInterval) {
          console.warn('[RELOAD] Rapid but no auth');
          localStorage.setItem(reloadKey, now.toString());
          return;
        }
        localStorage.setItem(reloadKey, now.toString());
      })();
    </script>
