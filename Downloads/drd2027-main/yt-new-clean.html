<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr.D - Platform</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }
        
        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        /* Auth Modal - ONLY USED BY CODEBANK */
        .auth-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
        
        .auth-container {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .auth-header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #238636, #3fb950);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .auth-header p {
            color: #8b949e;
            font-size: 14px;
        }
        
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid #30363d;
        }
        
        .auth-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #8b949e;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .auth-tab.active {
            color: #58a6ff;
            border-bottom-color: #58a6ff;
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #c9d1d9;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 8px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }
        
        .auth-button {
            width: 100%;
            padding: 10px;
            background: #238636;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        
        .auth-button:hover {
            background: #2ea043;
        }
        
        .auth-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .auth-divider {
            display: flex;
            align-items: center;
            margin: 16px 0;
        }
        
        .auth-divider:before,
        .auth-divider:after {
            content: '';
            flex: 1;
            height: 1px;
            background: #30363d;
        }
        
        .auth-divider span {
            padding: 0 8px;
            color: #8b949e;
            font-size: 12px;
        }
        
        .google-button {
            width: 100%;
            padding: 10px;
            background: #fff;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #000;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .google-button:hover {
            background: #f0f0f0;
        }
        
        .error-message {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid #f85449;
            color: #f85449;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .guest-button {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #58a6ff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .guest-button:hover {
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.05);
        }
        
        #mainContent {
            display: flex;
            flex: 1;
            overflow: auto;
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="auth-modal" id="authModal">
            <div class="auth-container">
                <div class="auth-header">
                    <h1>Dr.D</h1>
                    <p>Platform Access</p>
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="signin">Sign In</button>
                    <button class="auth-tab" data-tab="signup">Sign Up</button>
                </div>
                
                <!-- Sign In Form -->
                <form class="auth-form active" id="signinForm" data-tab="signin">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="signinEmail" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signinPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="auth-button">Sign In</button>
                    
                    <div class="auth-divider"><span>or</span></div>
                    
                    <button type="button" id="googleSignin" class="google-button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="1"/><path d="M12 1v6m0 6v6"/>
                        </svg>
                        Continue with Google
                    </button>
                    
                    <button type="button" id="guestSignin" class="guest-button">Continue as Guest</button>
                </form>
                
                <!-- Sign Up Form -->
                <form class="auth-form" id="signupForm" data-tab="signup">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="signupName" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="signupEmail" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="auth-button">Create Account</button>
                    
                    <div class="auth-divider"><span>or</span></div>
                    
                    <button type="button" id="googleSignup" class="google-button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="1"/><path d="M12 1v6m0 6v6"/>
                        </svg>
                        Sign Up with Google
                    </button>
                </form>
            </div>
        </div>
        
        <div id="mainContent">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <script>
        // ============================
        // NO STARTUP AUTH - App loads immediately
        // ============================
        (function bootstrapApp() {
            'use strict';
            
            // Show app IMMEDIATELY - NO AUTH BLOCK
            function showApp() {
                const loading = document.querySelector('.loading');
                if (loading) {
                    loading.style.transition = 'opacity 0.5s ease';
                    loading.style.opacity = '0';
                    setTimeout(() => loading.style.display = 'none', 500);
                }
                
                const mainContent = document.getElementById('mainContent');
                if (mainContent) {
                    mainContent.style.display = 'flex';
                    mainContent.style.opacity = '0';
                    requestAnimationFrame(() => {
                        mainContent.style.opacity = '1';
                        mainContent.style.transition = 'opacity 0.3s ease';
                    });
                }
                
                console.log('[App] Bootstrap complete - no auth gate');
            }
            
            // Initialize immediately
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', showApp);
            } else {
                showApp();
            }
        })();
        
        // ============================================================
        // CODEBANK AUTH SYSTEM - Lazy, only runs when CodeBank opens
        // ============================================================
        window.CodeBankAuth = {
            initialized: false,
            user: null,
            sessionId: null,
            
            async init() {
                if (this.initialized) return this.user;
                
                console.log('[CodeBankAuth] Initializing...');
                
                // Check existing session
                const sessionId = localStorage.getItem('sessionId') || localStorage.getItem('session_token');
                if (sessionId) {
                    try {
                        const res = await fetch('/api/auth/session', {
                            headers: { 'x-session-token': sessionId }
                        });
                        if (res.ok) {
                            const data = await res.json();
                            if (data.authenticated === true) {
                                this.user = data.user;
                                this.sessionId = sessionId;
                                this.initialized = true;
                                console.log('[CodeBankAuth] Session restored');
                                return this.user;
                            }
                        }
                    } catch (e) {
                        console.warn('[CodeBankAuth] Invalid stored data');
                    }
                    localStorage.removeItem('sessionId');
                    localStorage.removeItem('session_token');
                }
                
                // No session - show login inside CodeBank
                this.showLoginModal();
                return null;
            },
            
            showLoginModal() {
                // Remove any existing modal
                const existing = document.getElementById('cb-auth-modal');
                if (existing) existing.remove();
                
                const modal = document.createElement('div');
                modal.id = 'cb-auth-modal';
                modal.innerHTML = `
                    <div class="cb-auth-overlay">
                        <div class="cb-auth-box">
                            <h2>🔐 Sign In to CodeBank</h2>
                            <p>Access your assets and services</p>
                            <form id="cb-login-form">
                                <input type="email" id="cb-email" placeholder="Email" required>
                                <input type="password" id="cb-password" placeholder="Password" required>
                                <div class="cb-error"></div>
                                <button type="submit" class="cb-btn-primary">Sign In</button>
                            </form>
                            <button class="cb-btn-text" onclick="CodeBankAuth.showSignup()">Create Account</button>
                            <button class="cb-btn-close" onclick="CodeBankAuth.closeModal()">✕</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                
                // Add styles if not already present
                if (!document.getElementById('cb-auth-styles')) {
                    const style = document.createElement('style');
                    style.id = 'cb-auth-styles';
                    style.textContent = `
                        .cb-auth-overlay {
                            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
                            display: flex; align-items: center; justify-content: center;
                            z-index: 99999; backdrop-filter: blur(10px);
                        }
                        .cb-auth-box {
                            background: #1a1a2e; border: 1px solid #333;
                            border-radius: 16px; padding: 40px; width: 90%; max-width: 400px;
                            text-align: center; color: #fff; position: relative;
                        }
                        .cb-auth-box h2 { margin: 0 0 10px; font-size: 24px; }
                        .cb-auth-box p { color: #888; margin-bottom: 24px; }
                        .cb-auth-box input {
                            width: 100%; padding: 12px 16px; margin-bottom: 12px;
                            background: #0f0f1a; border: 1px solid #333; border-radius: 8px;
                            color: #fff; font-size: 14px; box-sizing: border-box;
                        }
                        .cb-auth-box input:focus { outline: none; border-color: #00d4ff; }
                        .cb-btn-primary {
                            width: 100%; padding: 14px; background: #00d4ff; color: #000;
                            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
                            font-size: 15px; margin-top: 8px;
                        }
                        .cb-btn-primary:hover { background: #33ddff; }
                        .cb-btn-primary:disabled { opacity: 0.5; cursor:
