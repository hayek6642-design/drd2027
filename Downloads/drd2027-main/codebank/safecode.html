<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Assets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CRITICAL: Asset receiver MUST be first script -->
    <script>
        // SafeCode iframe asset receiver - NON-BLOCKING
        (function() {
            'use strict';
            
            console.log('[SafeCode] Script loaded');
            
            window.AppState = { 
                assets: { codes: [], silver: [], gold: [] },
                user: null,
                loaded: false
            };
            
            // NON-BLOCKING INIT - start immediately
            function startApp() {
                console.log('[SafeCode] Starting app immediately');
                
                // 1. Register with parent bridge FIRST
                const parent = window.parent !== window ? window.parent : window;
                parent.postMessage({ type: 'register:service', name: 'safecode' }, '*');
                
                // 2. Request assets (async, non-blocking)
                parent.postMessage({ type: 'assets:request' }, '*');
                
                console.log('[SafeCode] Init complete, waiting for assets...');
            }
            
            // Listen for asset responses
            window.addEventListener('message', function(e) {
                if (!e.data || !e.data.type) return;
                
                console.log('[SafeCode] Message received:', e.data?.type);
                
                // Handle asset responses from parent
                if (e.data?.type === 'assets:response' || e.data?.type === 'parent:assets-init' || e.data?.assets) {
                    window.AppState.assets = e.data.assets || { codes: [], silver: [], gold: [] };
                    window.AppState.user = e.data.user;
                    window.AppState.loaded = true;
                    
                    // Hide loading, show content
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('asset-container').style.display = 'block';
                    
                    // Dispatch ready event
                    window.dispatchEvent(new CustomEvent('safe-assets-ready', { 
                        detail: window.AppState.assets 
                    }));
                    
                    console.log('[PIPELINE STEP 4] SafeCode received assets:', window.AppState.assets);
                }
            });
            
            // ALWAYS start immediately - never wait for data
            document.addEventListener('DOMContentLoaded', startApp);
            window.addEventListener('load', () => {
                console.log('[SafeCode] Window fully loaded');
            });
        })();
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0f0f0f; 
            color: #fff; 
            font-family: system-ui, -apple-system, sans-serif; 
            height: 100vh; 
            overflow: hidden;
        }
        #loading { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            flex-direction: column; 
            gap: 20px; 
        }
        .spinner { 
            width: 50px; 
            height: 50px; 
            border: 3px solid #333; 
            border-top-color: #00d4ff; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #asset-container { 
            width: 100%; 
            height: 100vh; 
            overflow-y: auto; 
            padding: 20px; 
            display: none; 
        }
        .error-box {
            background: #ff4757;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
    

/* ===== MOBILE RESPONSIVENESS ===== */
@media (max-width: 1023px) {
    .container, .wrapper, .main-container {
        max-width: 100%;
    }
    
    /* Grid layouts to single column */
    [style*="grid-template-columns: 1fr 1fr"],
    [style*="grid-template-columns: repeat(2"],
    [style*="grid-template-columns: repeat(3"] {
        grid-template-columns: 1fr !important;
    }
}

@media (max-width: 767px) {
    * {
        max-width: 100%;
    }
    
    body {
        font-size: 13px;
        padding: 8px;
    }
    
    h1 { font-size: 20px !important; }
    h2 { font-size: 16px !important; }
    h3 { font-size: 14px !important; }
    p { font-size: 12px !important; }
    
    /* Flex layouts */
    [style*="flex-direction: row"],
    .flex-row,
    .horizontal {
        flex-direction: column !important;
    }
    
    /* Grid responsive */
    [style*="display: grid"] {
        grid-template-columns: 1fr !important;
    }
    
    .grid-2, .grid-3, .grid-4 {
        grid-template-columns: 1fr !important;
        gap: 12px !important;
    }
    
    /* Padding & Margin */
    [style*="padding"] {
        padding: 8px !important;
    }
    
    /* Buttons & Inputs */
    button, input, select, textarea {
        min-height: 44px !important;
        padding: 10px 12px !important;
        font-size: 14px !important;
        width: 100%;
    }
    
    /* Cards */
    .card, .item, .box, [class*="card"] {
        padding: 12px !important;
        margin-bottom: 8px !important;
    }
    
    /* Images */
    img {
        max-width: 100% !important;
        height: auto !important;
    }
    
    /* Tables */
    table {
        font-size: 11px !important;
    }
    
    th, td {
        padding: 6px 4px !important;
    }
    
    /* Hide nav arrows, use native navigation */
    .nav-arrow, .navigation-arrow, [class*="nav-arrow"] {
        display: none;
    }
}

@media (max-width: 480px) {
    h1 { font-size: 16px !important; }
    h2 { font-size: 14px !important; }
    h3 { font-size: 12px !important; }
    p { font-size: 11px !important; }
    
    button, input, select, textarea {
        min-height: 40px !important;
        padding: 8px 10px !important;
        font-size: 12px !important;
    }
}

</style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading Safe Assets...</p>
    </div>
    <div id="asset-container">
        <!-- Assets will render here -->
    </div>
    
    <!-- Your existing safe-asset-list.js -->
    <script src="js/safe-asset-list.js"></script>
    <script src="../../service-navigation.js"></script>
</body>
</html>
