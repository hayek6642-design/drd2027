<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Auth Bridge - MUST be first script -->
    <script src="/shared/iframe-auth-client.js?v=2"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pebalaash - Marketplace</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; }
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function PebalaashApp() {
            const [products, setProducts] = useState([]);
            const [search, setSearch] = useState('');
            const [category, setCategory] = useState('all');
            const [priceRange, setPriceRange] = useState([0, 1000]);
            const [loading, setLoading] = useState(false);
            const [cart, setCart] = useState([]);
            const [auth, setAuth] = useState(null);
            const [favorites, setFavorites] = useState(new Set());

            useEffect(() => {
                if (window.Auth && window.Auth.isAuthenticated?.()) {
                    setAuth(window.Auth);
                    fetchProducts();
                }
            }, []);

            const fetchProducts = async () => {
                setLoading(true);
                try {
                    const token = auth?.getToken?.();
                    const response = await fetch(
                        `/api/pebalaash/products?search=${search}&category=${category}&minPrice=${priceRange[0]}&maxPrice=${priceRange[1]}`,
                        { headers: token ? { Authorization: `Bearer ${token}` } : {} }
                    );
                    const data = await response.json();
                    setProducts(data.products || []);
                } catch (err) {
                    console.error('Failed to fetch products:', err);
                }
                setLoading(false);
            };

            const toggleFavorite = (productId) => {
                const newFavorites = new Set(favorites);
                if (newFavorites.has(productId)) {
                    newFavorites.delete(productId);
                } else {
                    newFavorites.add(productId);
                }
                setFavorites(newFavorites);
            };

            const addToCart = (product) => {
                setCart([...cart, product]);
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 via-orange-900 to-slate-900">
                    {/* Header */}
                    <div className="bg-black/40 border-b border-orange-500/20 backdrop-blur-xl sticky top-0 z-20">
                        <div className="max-w-7xl mx-auto px-4 py-6">
                            <div className="flex items-center justify-between mb-6">
                                <div>
                                    <h1 className="text-4xl font-bold text-white mb-2">
                                        🛒 Pebalaash
                                    </h1>
                                    <p className="text-orange-300">Premium marketplace experience</p>
                                </div>
                                <div className="flex items-center gap-4">
                                    {auth && <span className="text-sm text-green-400">✓ Connected</span>}
                                    <div className="relative">
                                        <span className="text-2xl">🛒</span>
                                        {cart.length > 0 && (
                                            <span className="absolute -top-2 -right-2 bg-orange-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">
                                                {cart.length}
                                            </span>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Search & Filters */}
                            <div className="space-y-4">
                                <div className="flex gap-3">
                                    <div className="flex-1 relative">
                                        <input
                                            type="text"
                                            placeholder="Search products..."
                                            value={search}
                                            onChange={(e) => setSearch(e.target.value)}
                                            onKeyPress={(e) => e.key === 'Enter' && fetchProducts()}
                                            className="w-full px-4 py-2 bg-orange-900/30 border border-orange-500/30 rounded-lg text-white placeholder-orange-300/50 focus:outline-none focus:border-orange-500"
                                        />
                                    </div>
                                    <button
                                        onClick={fetchProducts}
                                        disabled={loading}
                                        className="px-6 py-2 bg-orange-600 hover:bg-orange-700 rounded-lg text-white font-medium transition disabled:opacity-50"
                                    >
                                        {loading ? '...' : 'Search'}
                                    </button>
                                </div>

                                <div className="flex gap-3 flex-wrap">
                                    <select
                                        value={category}
                                        onChange={(e) => setCategory(e.target.value)}
                                        className="px-4 py-2 bg-orange-900/30 border border-orange-500/30 rounded-lg text-white text-sm"
                                    >
                                        <option value="all">All Categories</option>
                                        <option value="electronics">Electronics</option>
                                        <option value="fashion">Fashion</option>
                                        <option value="home">Home & Garden</option>
                                        <option value="sports">Sports</option>
                                    </select>

                                    <div className="flex items-center gap-2">
                                        <input
                                            type="range"
                                            min="0"
                                            max="1000"
                                            step="50"
                                            value={priceRange[1]}
                                            onChange={(e) => setPriceRange([priceRange[0], parseInt(e.target.value)])}
                                            className="w-32"
                                        />
                                        <span className="text-sm text-orange-300 min-w-fit">Max: ${priceRange[1]}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Products Grid */}
                    <div className="max-w-7xl mx-auto px-4 py-8">
                        {products.length === 0 ? (
                            <div className="text-center py-20">
                                <p className="text-orange-300 text-lg">
                                    {loading ? 'Loading products...' : 'Search to find amazing products'}
                                </p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {products.map((product) => (
                                    <div
                                        key={product.id}
                                        className="bg-gradient-to-br from-orange-900/50 to-slate-900/50 border border-orange-500/30 rounded-xl overflow-hidden hover:border-orange-500/60 transition"
                                    >
                                        {/* Image */}
                                        <div className="relative h-40 bg-gradient-to-b from-orange-600 to-slate-900 flex items-center justify-center text-4xl">
                                            {product.emoji || '📦'}
                                        </div>

                                        {/* Info */}
                                        <div className="p-4">
                                            <h3 className="font-bold text-white mb-2 line-clamp-2">{product.name}</h3>
                                            
                                            {/* Price */}
                                            <div className="flex items-baseline gap-2 mb-3">
                                                <span className="text-xl font-bold text-orange-400">${product.price}</span>
                                                {product.originalPrice && (
                                                    <span className="text-sm text-slate-400 line-through">${product.originalPrice}</span>
                                                )}
                                            </div>

                                            {/* Rating */}
                                            <div className="flex items-center gap-2 mb-3">
                                                <div className="flex gap-1">
                                                    {[...Array(5)].map((_, i) => (
                                                        <span key={i} className={i < Math.floor(product.rating || 0) ? 'text-yellow-400' : 'text-slate-600'}>★</span>
                                                    ))}
                                                </div>
                                                <span className="text-xs text-slate-400">({product.reviews || 0})</span>
                                            </div>

                                            {/* CTA */}
                                            <button
                                                onClick={() => addToCart(product)}
                                                className="w-full px-4 py-2 bg-gradient-to-r from-orange-600 to-orange-700 hover:from-orange-500 hover:to-orange-600 rounded-lg text-white font-medium transition"
                                            >
                                                Add to Cart
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<PebalaashApp />, document.getElementById('root'));
    </script>
</body>
</html>
