<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .game-card {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-align: center;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.3);
        }

        .game-frame-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-frame {
            width: 90%;
            height: 90%;
            border: none;
            border-radius: 10px;
            background: #fff;
        }

        .close-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff3333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .game-title {
            margin: 10px 0;
            color: #00ff00;
        }

        #sound-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1001;
        }

        .search-filters {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 12px 0;
            padding: 0 20px;
        }

        .search-filters input {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
        }

        .filters {
            display: flex;
            gap: 6px;
        }

        .filters button {
            padding: 6px 12px;
            border: 1px solid #444;
            background: #333;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
        }

        .filters button.active {
            background: #00ff00;
            color: #000;
        }

        .game-description {
            font-size: 0.9rem;
            color: #ddd;
            margin: 8px 0;
        }

        .play-btn {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background: #00cc44;
            color: #021;
            cursor: pointer;
            font-weight: bold;
        }

        .play-btn:hover {
            background: #00aa33;
        }
    </style>
</head>
<body>
    <!-- Sound toggle (used to notify parent page) -->
    <button id="ytSoundToggle">🔊</button>

    <!-- Search & filters -->
    <div class="search-filters">
        <input id="searchGames" placeholder="Search games...">
        <div class="filters">
            <button data-category="all" class="active">All</button>
            <button data-category="arcade">Arcade</button>
            <button data-category="board">Board</button>
            <button data-category="action">Action</button>
            <button data-category="casino">Casino</button>
            <button data-category="classic">Classic</button>
            <button data-category="social">Social</button>
        </div>
    </div>

    <!-- Games grid populated by dashboard.js -->
    <div id="gamesGrid" class="games-grid"></div>

    <!-- Template for game cards (rendered by dashboard.js) -->
    <template id="gameCardTemplate">
        <div class="game-card">
            <img src="" alt="" style="width:100%;height:140px;object-fit:cover;border-radius:8px">
            <h3 class="game-title"></h3>
            <div class="game-category" style="opacity:0.8;font-size:0.9rem;margin-bottom:8px"></div>
            <p class="game-description"></p>
            <button class="play-btn">Start</button>
        </div>
    </template>

    <!-- Fullscreen game host -->
    <div id="gameContainer" class="game-frame-container">
        <iframe id="gameFrame" class="game-frame" frameborder="0"></iframe>
        <button id="backToGames" class="close-button">Close Game</button>
    </div>

    <!-- Load the centralized games manifest and renderer -->
    <script src="js/dashboard.js"></script>
</body>
</html>
