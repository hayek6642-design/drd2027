<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Channel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700;
            --secondary: #1E90FF;
            --dark: #121212;
            --darker: #0A0A0A;
            --light: #FFFFFF;
            --gray: #2D2D2D;
            --success: #4CAF50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(30, 30, 30, 0.9);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 30px;
            width: 100%;
            height: 100%;
            min-width: 500px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
        }

        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: var(--primary);
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .channel-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .channel-iframe {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .subscribe-button {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: var(--dark);
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            margin-top: 20px;
        }

        .subscribe-button:hover {
            background: #FFC600;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.3);
        }

        .channel-info {
            margin-top: 20px;
            text-align: center;
        }

        .channel-info p {
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>My YouTube Channel</h1>
    </div>
    
    <div class="channel-section">
        <iframe class="channel-iframe" src="https://www.youtube.com/embed?listType=user_uploads&list=CHANNELID" allowfullscreen></iframe>
        
        <div class="channel-info">
            <p>Check out my latest videos and subscribe to stay updated!</p>
        </div>
        
        <a href="https://www.youtube.com/channel/CHANNELID?sub_confirmation=1" target="_blank" class="subscribe-button">Subscribe Now</a>
    </div>
</div>

<script>
    // Get channel ID from parent window if available
    window.addEventListener('message', function(event) {
        if (event.data && event.data.channelId) {
            const channelId = event.data.channelId;
            document.querySelector('.channel-iframe').src = `https://www.youtube.com/embed?listType=user_uploads&list=${channelId}`;
            document.querySelector('.subscribe-button').href = `https://www.youtube.com/channel/${channelId}?sub_confirmation=1`;
        }
    });
</script>

<!-- Global Prayer System Integration -->
<script src="js/global-prayer-communication.js"></script>
<script src="js/global-prayer-system.js"></script>

<!-- YouTube Channel Integration with Global System -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(() => {
            if (window.globalPrayerSystem) {
                console.log('🕌 Global Prayer System integrated with YouTube Channel');
                
                // Add global prayer status indicator
                const container = document.querySelector('.container');
                const prayerStatus = document.createElement('div');
                prayerStatus.className = 'prayer-status-indicator';
                prayerStatus.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    background: rgba(255, 215, 0, 0.9);
                    color: #121212;
                    padding: 10px 15px;
                    border-radius: 20px;
                    font-size: 0.9rem;
                    font-weight: 500;
                    backdrop-filter: blur(10px);
                    border: 2px solid rgba(255, 215, 0, 0.3);
                    z-index: 1000;
                `;
                prayerStatus.innerHTML = '🕌 Global Azan Active';
                container.appendChild(prayerStatus);
                
                // Update status based on global system
                const updateStatus = () => {
                    if (window.globalPrayerSystem.isAutoAlertEnabled()) {
                        prayerStatus.textContent = '🕌 Auto Alerts ON';
                        prayerStatus.style.background = 'rgba(76, 175, 80, 0.9)';
                    } else {
                        prayerStatus.textContent = '🕌 Auto Alerts OFF';
                        prayerStatus.style.background = 'rgba(255, 193, 7, 0.9)';
                    }
                };
                
                updateStatus();
                
                // Listen for global prayer system updates
                window.addEventListener('message', (event) => {
                    if (event.data.type === 'PRAYER_SETTINGS_UPDATED') {
                        updateStatus();
                    }
                });
            }
        }, 2000);
    });
</script>



    <!-- Global Prayer System Universal Integration -->
    <script>
        
// Global Prayer System Universal Integration
// This script ensures all services have the Global Prayer System properly integrated

(function() {
    'use strict';
    
    // Service name detection
    const getServiceName = () => {
        const path = window.location.pathname;
        if (path.includes('index.html') || path.includes('indexCB.html')) return 'CodeBank';
        if (path.includes('yt-new.html')) return 'YouTube App';
        if (path.includes('azan-clock/')) return 'Prayer Clock';
        if (path.includes('youtube-channel.html')) return 'YouTube Channel';
        if (path.includes('login.html')) return 'Login Service';
        return 'Unknown Service';
    };
    
    // Integration function
    function integrateGlobalPrayerSystem() {
        const serviceName = getServiceName();
        console.log(`🕌 Integrating Global Prayer System with ${serviceName}`);
        
        // Wait for DOM to be ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', integrate);
        } else {
            integrate();
        }
        
        function integrate() {
            setTimeout(() => {
                if (window.globalPrayerSystem) {
                    console.log(`✅ ${serviceName}: Global Prayer System available`);
                    
                    // Service-specific integrations
                    switch(serviceName) {
                        case 'CodeBank':
                            integrateCodeBank();
                            break;
                        case 'YouTube App':
                            integrateYouTubeApp();
                            break;
                        case 'Prayer Clock':
                            integratePrayerClock();
                            break;
                        case 'YouTube Channel':
                            integrateYouTubeChannel();
                            break;
                        case 'Login Service':
                            integrateLoginService();
                            break;
                    }
                    
                    // Universal integrations for all services
                    universalIntegrations(serviceName);
                } else {
                    console.log(`⚠️ ${serviceName}: Global Prayer System not available yet`);
                    // Retry after 2 seconds
                    setTimeout(integrate, 2000);
                }
            }, 1000);
        }
    }
    
    function integrateCodeBank() {
        // Add prayer status to header
        const header = document.querySelector('header');
        if (header) {
            const prayerStatus = document.createElement('div');
            prayerStatus.className = 'prayer-status-header';
            prayerStatus.style.cssText = `
                display: flex;
                align-items: center;
                background: rgba(76, 175, 80, 0.2);
                padding: 8px 12px;
                border-radius: 20px;
                border: 1px solid rgba(76, 175, 80, 0.3);
                font-size: 0.85rem;
                font-weight: 500;
                color: #4CAF50;
                margin-left: 10px;
            `;
            prayerStatus.innerHTML = '<i class="fas fa-mosque" style="margin-right: 5px;"></i>🕌 Global Azan';
            
            const headerActions = header.querySelector('.flex.items-center.space-x-4');
            if (headerActions) {
                headerActions.appendChild(prayerStatus);
            }
        }
        
        // Add click handler to open prayer dashboard
        const userBalance = document.getElementById('user-balance');
        if (userBalance) {
            let pressTimer;
            userBalance.addEventListener('mousedown', () => {
                pressTimer = setTimeout(() => {
                    window.open('global-prayer-dashboard.html', 'GlobalPrayerDashboard', 'width=1200,height=800,scrollbars=yes,resizable=yes');
                }, 1000);
            });
            
            userBalance.addEventListener('mouseup', () => clearTimeout(pressTimer));
            userBalance.addEventListener('mouseleave', () => clearTimeout(pressTimer));
        }
    }
    
    function integrateYouTubeApp() {
        // Add prayer alert indicator
        const container = document.querySelector('.container') || document.body;
        if (container) {
            const prayerAlert = document.createElement('div');
            prayerAlert.id = 'global-prayer-alert-indicator';
            prayerAlert.style.cssText = `
                position: fixed;
                top: 20px;
                left: 20px;
                background: rgba(255, 215, 0, 0.9);
                color: #121212;
                padding: 10px 15px;
                border-radius: 25px;
                font-size: 0.9rem;
                font-weight: 600;
                backdrop-filter: blur(10px);
                border: 2px solid rgba(255, 215, 0, 0.3);
                z-index: 10000;
                display: none;
            `;
            prayerAlert.innerHTML = '🕌 Prayer Alert Active';
            container.appendChild(prayerAlert);
        }
        
        // Listen for prayer alerts
        window.addEventListener('message', (event) => {
            if (event.data.type === 'GLOBAL_PRAYER_ALERT') {
                const indicator = document.getElementById('global-prayer-alert-indicator');
                if (indicator) {
                    indicator.style.display = 'block';
                    setTimeout(() => {
                        indicator.style.display = 'none';
                    }, 5000);
                }
            }
        });
    }
    
    function integratePrayerClock() {
        // Sync with global system
        if (window.globalPrayerSystem.getCurrentPrayerTimes) {
            const times = window.globalPrayerSystem.getCurrentPrayerTimes();
            if (times && times.length > 0) {
                times.forEach(prayer => {
                    const element = document.getElementById(prayer.name.toLowerCase() + '-time');
                    if (element) {
                        element.textContent = prayer.time;
                    }
                });
            }
        }
        
        // Update auto-alert toggle to sync with global system
        const toggle = document.getElementById('auto-prayer-toggle');
        if (toggle) {
            const syncToggle = () => {
                if (window.globalPrayerSystem.isAutoAlertEnabled()) {
                    toggle.classList.add('active');
                    document.getElementById('toggle-status').textContent = 'ON';
                } else {
                    toggle.classList.remove('active');
                    document.getElementById('toggle-status').textContent = 'OFF';
                }
            };
            
            // Initial sync
            syncToggle();
            
            // Listen for global system updates
            window.addEventListener('message', (event) => {
                if (event.data.type === 'PRAYER_SETTINGS_UPDATED') {
                    syncToggle();
                }
            });
        }
    }
    
    function integrateYouTubeChannel() {
        // Add prayer status indicator
        const container = document.querySelector('.container');
        if (container) {
            const prayerStatus = document.createElement('div');
            prayerStatus.className = 'prayer-status-indicator';
            prayerStatus.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: rgba(255, 215, 0, 0.9);
                color: #121212;
                padding: 10px 15px;
                border-radius: 20px;
                font-size: 0.9rem;
                font-weight: 500;
                backdrop-filter: blur(10px);
                border: 2px solid rgba(255, 215, 0, 0.3);
                z-index: 1000;
            `;
            prayerStatus.innerHTML = '🕌 Global Azan Active';
            container.appendChild(prayerStatus);
            
            // Update status based on global system
            const updateStatus = () => {
                if (window.globalPrayerSystem.isAutoAlertEnabled()) {
                    prayerStatus.textContent = '🕌 Auto Alerts ON';
                    prayerStatus.style.background = 'rgba(76, 175, 80, 0.9)';
                } else {
                    prayerStatus.textContent = '🕌 Auto Alerts OFF';
                    prayerStatus.style.background = 'rgba(255, 193, 7, 0.9)';
                }
            };
            
            updateStatus();
            
            // Listen for global prayer system updates
            window.addEventListener('message', (event) => {
                if (event.data.type === 'PRAYER_SETTINGS_UPDATED') {
                    updateStatus();
                }
            });
        }
    }
    
    function integrateLoginService() {
        // Add subtle prayer system indicator
        const container = document.querySelector('.container') || document.body;
        if (container) {
            const prayerStatus = document.createElement('div');
            prayerStatus.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: rgba(255, 215, 0, 0.8);
                color: #121212;
                padding: 8px 12px;
                border-radius: 15px;
                font-size: 0.8rem;
                font-weight: 500;
                backdrop-filter: blur(5px);
                border: 1px solid rgba(255, 215, 0, 0.3);
                z-index: 1000;
            `;
            prayerStatus.innerHTML = '🕌 Prayer System Ready';
            container.appendChild(prayerStatus);
        }
    }
    
    function universalIntegrations(serviceName) {
        // Enable debug mode if requested
        if (localStorage.getItem('globalPrayerDebug') === 'true') {
            console.log(`🕌 [${serviceName}] Debug mode enabled`);
        }
        
        // Register with global communication system
        if (window.globalPrayerCommunication) {
            window.globalPrayerCommunication.registerComponent(serviceName.toLowerCase().replace(' ', '_'), {
                'PRAYER_ALERT': (data) => {
                    console.log(`🕌 [${serviceName}] Prayer alert received:`, data);
                },
                'PRAYER_SETTINGS_UPDATED': (data) => {
                    console.log(`🕌 [${serviceName}] Prayer settings updated:`, data);
                }
            });
        }
        
        // Broadcast service ready
        if (window.globalPrayerCommunication) {
            window.globalPrayerCommunication.sendMessage('all', {
                type: 'SERVICE_READY',
                service: serviceName,
                timestamp: Date.now()
            });
        }
    }
    
    // Start integration
    integrateGlobalPrayerSystem();
})();

    </script>
</body>
</html>
