<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E7ki - CodeBank Chat</title>
  <style>
    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #1a1d27;
      --bg-tertiary: #242836;
      --bg-input: #2a2e3d;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-muted: #6b7280;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --accent-dim: rgba(99, 102, 241, 0.15);
      --border: #2d3142;
      --danger: #ef4444;
      --success: #22c55e;
      --online: #22c55e;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* ── Layout ──────────────────────────── */
    .e7ki-app {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ─────────────────────────── */
    .sidebar {
      width: 320px;
      min-width: 280px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header h2 {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .user-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--online);
    }

    .search-box {
      padding: 12px 16px;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: var(--accent);
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    .conversations-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--bg-tertiary) transparent;
    }

    .conversation-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .conversation-item:hover {
      background: var(--bg-tertiary);
    }

    .conversation-item.active {
      background: var(--accent-dim);
      border-left: 3px solid var(--accent);
    }

    .conv-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent);
      flex-shrink: 0;
      position: relative;
    }

    .conv-avatar .online-badge {
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--online);
      border: 2px solid var(--bg-secondary);
    }

    .conv-info {
      flex: 1;
      min-width: 0;
    }

    .conv-name {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 2px;
    }

    .conv-preview {
      font-size: 0.8rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }

    .conv-time {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .unread-badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Chat Area ───────────────────────── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
    }

    .chat-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-secondary);
    }

    .chat-header-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header-info .conv-avatar {
      width: 36px;
      height: 36px;
      font-size: 0.85rem;
    }

    .chat-header-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .chat-header-status {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .chat-actions {
      display: flex;
      gap: 8px;
    }

    .chat-actions button {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }

    .chat-actions button:hover {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── Messages ────────────────────────── */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--bg-tertiary) transparent;
    }

    .message-group {
      display: flex;
      gap: 10px;
      max-width: 70%;
      margin-bottom: 8px;
    }

    .message-group.sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-group.received {
      align-self: flex-start;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
      align-self: flex-end;
    }

    .message-group.sent .msg-avatar {
      background: var(--accent-dim);
    }

    .msg-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .message-bubble {
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.45;
      word-wrap: break-word;
    }

    .message-group.sent .message-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message-group.received .message-bubble {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 0.65rem;
      color: var(--text-muted);
      padding: 0 8px;
    }

    .message-group.sent .msg-time {
      text-align: right;
    }

    .date-separator {
      text-align: center;
      padding: 12px 0;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .date-separator span {
      background: var(--bg-secondary);
      padding: 4px 14px;
      border-radius: 12px;
    }

    .typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 8px 16px;
      background: var(--bg-tertiary);
      border-radius: 18px;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .typing-indicator.visible { display: block; }

    .typing-dots {
      display: inline-flex;
      gap: 3px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.4s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* ── Input Area ──────────────────────── */
    .chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      align-items: flex-end;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
    }

    .input-wrapper textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 0.9rem;
      font-family: inherit;
      padding: 8px 12px;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 40px;
      line-height: 1.4;
    }

    .input-wrapper textarea::placeholder {
      color: var(--text-muted);
    }

    .attach-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .attach-btn:hover { color: var(--accent); }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

    /* ── Empty state ─────────────────────── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 4rem;
      opacity: 0.3;
    }

    .empty-state h3 {
      font-size: 1.1rem;
      color: var(--text-secondary);
    }

    .empty-state p {
      font-size: 0.85rem;
      max-width: 300px;
      text-align: center;
      line-height: 1.5;
    }

    /* ── Loading overlay ─────────────────── */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Cost display ────────────────────── */
    .cost-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    /* ── Responsive ──────────────────────── */
    @media (max-width: 768px) {
      .sidebar { width: 100%; position: absolute; z-index: 10; }
      .sidebar.collapsed { display: none; }
      .chat-area { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <div class="e7ki-app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>💬 E7ki</h2>
        <div class="user-status">
          <div class="status-dot"></div>
          <span id="currentUserName">Loading...</span>
        </div>
      </div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search conversations...">
      </div>

      <div class="conversations-list" id="conversationsList">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <div class="icon">💬</div>
        <h3>Welcome to E7ki</h3>
        <p>Select a conversation to start chatting, or start a new one.</p>
      </div>

      <!-- Active chat (hidden by default) -->
      <div id="activeChatView" style="display:none; flex:1; display:none; flex-direction:column;">
        <div class="chat-header">
          <div class="chat-header-info">
            <div class="conv-avatar" id="chatAvatar">?</div>
            <div>
              <div class="chat-header-name" id="chatName">-</div>
              <div class="chat-header-status" id="chatStatus">offline</div>
            </div>
          </div>
          <div class="chat-actions">
            <span class="cost-badge" id="msgCost">🔐 0 codes</span>
            <button onclick="E7ki.clearChat()" title="Clear chat">🗑️</button>
          </div>
        </div>

        <div class="messages-container" id="messagesContainer">
          <!-- Messages rendered here -->
        </div>

        <div class="typing-indicator" id="typingIndicator">
          <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>

        <div class="chat-input-area">
          <div class="input-wrapper">
            <button class="attach-btn" title="Attach file">📎</button>
            <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
          </div>
          <button class="send-btn" id="sendBtn" disabled title="Send">➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Auth + Storage (NEW architecture) -->
  <script src="/shared/service-auth.js"></script>
  <script src="/shared/unified-storage.js"></script>
  <script src="/services/e7ki/e7ki-core.js"></script>
</body>
</html>
