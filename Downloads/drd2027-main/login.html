<script>
// ── NativeBiometric + NativeStorage helpers for Capacitor ──────────────
window._NativeBio = {
  isNative: () => !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()),
  plugin: () => window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.NativeBiometric,
  prefs: () => window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Preferences,

  async isAvailable() {
    const p = this.plugin();
    if (!p) return false;
    try { const r = await p.isAvailable(); return r.isAvailable === true; } catch(_) { return false; }
  },

  async saveSession(sessionId, userData) {
    localStorage.setItem('session_active', 'true');
    if (sessionId) localStorage.setItem('session_token', sessionId);
    if (userData) localStorage.setItem('user_data', typeof userData === 'string' ? userData : JSON.stringify(userData));
    const pr = this.prefs();
    if (pr) {
      try {
        await pr.set({ key: 'session_active', value: 'true' });
        if (sessionId) await pr.set({ key: 'session_token', value: sessionId });
        if (userData) await pr.set({ key: 'user_data', value: typeof userData === 'string' ? userData : JSON.stringify(userData) });
      } catch(e) { console.warn('[NativeBio] saveSession error:', e); }
    }
  },

  async restoreSession() {
    const pr = this.prefs();
    if (!pr) return false;
    try {
      const r = await pr.get({ key: 'session_active' });
      if (r.value !== 'true') return false;
      const t = await pr.get({ key: 'session_token' });
      const u = await pr.get({ key: 'user_data' });
      if (t.value) localStorage.setItem('session_token', t.value);
      if (u.value) localStorage.setItem('user_data', u.value);
      localStorage.setItem('session_active', 'true');
      return true;
    } catch(e) { return false; }
  }
};
</script>

(function() {

    var msg = sessionStorage.getItem('__kickout_reason__') ||
      'Your account was opened on another device. Sign in here to continue.';
    sessionStorage.removeItem('__kickout_reason__');
    document.addEventListener('DOMContentLoaded', function() {
      var banner = document.createElement('div');
      banner.id = 'kickout-banner';
      banner.style.cssText = [
        'position:fixed', 'top:0', 'left:0', 'right:0', 'z-index:99999',

        'align-items:center', 'justify-content:center', 'gap:10px', 'margin-top: 60px'
      ].join(';');
      banner.innerHTML = '<span>📱</span><span>' + msg + '</span>' +
        '<button onclick="this.parentElement.remove()" ' +
        'style="background:rgba(255,255,255,0.2);border:none;color:#fff;' +
        'padding:4px 10px;border-radius:4px;cursor:pointer;font-size:13px;margin-left:8px">✕</button>';

<!-- Auto-switch to signup/login tab based on URL parameter -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Check for mode parameter in URL
  const urlParams = new URLSearchParams(window.location.search);
  const mode = urlParams.get('mode');
  
  if (mode === 'signup') {
    // Switch to signup tab
    switchTab('signup');
    // Update tab button UI
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    // Update navbar buttons
    document.getElementById('signupNavBtn').classList.add('active');
    document.getElementById('loginNavBtn').classList.remove('active');
  } else if (mode === 'login' || mode === 'signin') {
    // Switch to login tab
    switchTab('login');
    // Update tab button UI
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    // Update navbar buttons
    document.getElementById('signupNavBtn').classList.remove('active');
    document.getElementById('loginNavBtn').classList.add('active');
  }
});
</script>

<script>
const API_BASE = '';

console.log('🔥 API_BASE:', API_BASE);
console.log('🔥 Window origin:', window.location.origin);

// ═══════════════════════════════════════════════════════════
// AUTH STATE MANAGEMENT & UI SYNC
// ═══════════════════════════════════════════════════════════

function updateAuthUI() {
  const isAuthenticated = localStorage.getItem('session_active') === 'true';
  const userDataStr = localStorage.getItem('user_data');
  let userEmail = null;
  
  if (userDataStr) {
    try {
      const userData = JSON.parse(userDataStr);
      userEmail = userData.email || userData.user?.email;
    } catch(e) {}
  }

  const signupNavBtn = document.getElementById('signupNavBtn');
  const loginNavBtn = document.getElementById('loginNavBtn');
  const signoutNavBtn = document.getElementById('signoutNavBtn');
  const userBadge = document.getElementById('userBadge');

  if (isAuthenticated && userEmail) {
    // User is authenticated
    if (signupNavBtn) signupNavBtn.style.display = 'none';
    if (loginNavBtn) loginNavBtn.style.display = 'none';
    if (signoutNavBtn) signoutNavBtn.style.display = 'block';
    if (userBadge) {
      userBadge.classList.add('active');
      userBadge.textContent = userEmail;
    }
  } else {
    // User is NOT authenticated
    if (signupNavBtn) signupNavBtn.style.display = 'block';
    if (loginNavBtn) loginNavBtn.style.display = 'block';
    if (signoutNavBtn) signoutNavBtn.style.display = 'none';
    if (userBadge) {
      userBadge.classList.remove('active');
      userBadge.textContent = '';
    }
  }
}

function handleLogout() {
  fetch(`${API_BASE}/api/auth/logout`, {
    method: 'POST',
    credentials: 'include'
  }).then(() => {
    // Clear all auth state
    localStorage.removeItem('session_active');
    localStorage.removeItem('session_token');
    localStorage.removeItem('user_data');
    localStorage.removeItem('__cached_user__');
    localStorage.removeItem('__cached_session_id__');
    document.cookie = 'session_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
    
    console.log('✅ Logged out successfully');
    updateAuthUI();
    showStatus('✅ Signed out successfully', 'success');
    
    // Optionally redirect or show signup form
    setTimeout(() => {
      switchTab('signup', null);
    }, 1000);
  }).catch(err => {
    console.error('Logout error:', err);
    updateAuthUI();
  });
}

// Call on page load
document.addEventListener('DOMContentLoaded', updateAuthUI);

// Also update UI when storage changes (from other tabs)
window.addEventListener('storage', updateAuthUI);

// Helper functions

// 🧠 Auth Flow Control: Auto-redirect if session is ACTUALLY active
(async function checkExistingSession() {
  const localActive = localStorage.getItem("session_active") === "true";
  if (!localActive && window._NativeBio && window._NativeBio.isNative()) {
    await window._NativeBio.restoreSession();
  }

  if (localStorage.getItem("session_active") === "true") {
    if (!document.cookie.includes('session_token=')) {
      localStorage.removeItem("session_active");
      localStorage.removeItem("session_token");
      localStorage.removeItem("user_data");
      localStorage.removeItem("__cached_user__");
      localStorage.removeItem("__cached_session_id__");
    } else {
      fetch('/api/auth/me', { credentials: 'include' })
        .then(function(r) { 
          if (r.status === 200) return r.json();
          throw new Error('not authenticated');
        })
        .then(function(data) {
          console.log('[Session] /auth/me response:', data);
          if (data.success && data.user) {
            if (window.AssetsManager && typeof window.AssetsManager.sync === 'function') {
              console.log('[Session] Syncing restored session assets...');
              window.AssetsManager.sync();
            }
            window.location.href = "/yt-new-clear.html";
          } else {
            console.log('[Session] No valid user, clearing state');
            localStorage.removeItem("session_active");
            localStorage.removeItem("session_token");
            localStorage.removeItem("user_data");
            localStorage.removeItem("__cached_user__");
            localStorage.removeItem("__cached_session_id__");
            document.cookie = "session_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            updateAuthUI();
          }
        })
        .catch(function() {
          localStorage.removeItem("session_active");
          updateAuthUI();
        });
    }
  } else {
    if (window._NativeBio && window._NativeBio.isNative()) {
      const bioAvailable = await window._NativeBio.isAvailable();
      const prefs = window._NativeBio.prefs();
      if (bioAvailable && prefs) {
        try {
          const t = await prefs.get({ key: 'session_token' });
          if (t.value) {
            document.getElementById('biometricSection').style.display = 'block';
          }
        } catch(_) {}
      }
    }
  }
})();

let sessionId = null;
let verificationStatus = { email: false, phone: false };
let emailOtpSessionId = null;
let countriesData = [];
let religionsData = [];

document.addEventListener('DOMContentLoaded', async () => {
  await Promise.all([loadCountries(), loadReligions()]);
  updateAuthUI();
});

async function loadCountries() {
  const loadingEl = document.getElementById('countryLoading');
  if (loadingEl) loadingEl.textContent = '(loading...)';
  try {
    const response = await fetch(`${API_BASE}/api/countries`);
    const data = await response.json();
    if (data.success) {
      countriesData = data.countries;
      populateCountrySelects();
    }
  } catch (error) {
    console.error('Failed to load countries:', error);
  } finally {
    if (loadingEl) loadingEl.textContent = '';
  }
}

async function loadReligions() {
  const loadingEl = document.getElementById('religionLoading');
  if (loadingEl) loadingEl.textContent = '(loading...)';
  try {
    const response = await fetch(`${API_BASE}/api/religions`);
    const data = await response.json();
    if (data.success) {
      religionsData = data.religions;
      populateReligionSelect();
    }
  } catch (error) {
    religionsData = [
      { value: 'Islam', label: 'Islam', icon: '☪️' },
      { value: 'Christianity', label: 'Christianity', icon: '✝️' },
      { value: 'Judaism', label: 'Judaism', icon: '✡️' },
      { value: 'Hinduism', label: 'Hinduism', icon: '🕉️' },
      { value: 'Buddhism', label: 'Buddhism', icon: '☸️' },
      { value: 'Sikhism', label: 'Sikhism', icon: '🪯' },
      { value: 'Atheist', label: 'Atheist', icon: '⚛️' },
      { value: 'Agnostic', label: 'Agnostic', icon: '❓' },
      { value: 'Other', label: 'Other', icon: '🌐' },
      { value: 'Prefer not to say', label: 'Prefer not to say', icon: '🤫' }
    ];
    populateReligionSelect();
  } finally {
    if (loadingEl) loadingEl.textContent = '';
  }
}

function populateCountrySelects() {
  const countrySelect = document.getElementById('country');
  const countryCodeSelect = document.getElementById('countryCode');
  
  if (!countrySelect || !countryCodeSelect) return;

  countrySelect.innerHTML = '<option value="">-- Select Country --</option>';
  countryCodeSelect.innerHTML = '<option value="">Code</option>';
  
  countriesData.forEach(country => {
    const option = document.createElement('option');
    option.value = country.code;
    option.textContent = `${country.flag} ${country.name}`;
    option.setAttribute('data-phone-code', country.phoneCode);
    countrySelect.appendChild(option);
    
    const codeOption = document.createElement('option');
    codeOption.value = country.phoneCode;
    codeOption.textContent = `${country.flag} ${country.phoneCode}`;
    codeOption.setAttribute('data-country', country.code);
    countryCodeSelect.appendChild(codeOption);
  });
}

function populateReligionSelect() {
  const religionSelect = document.getElementById('religion');
  if (!religionSelect) return;

  religionSelect.innerHTML = '<option value="">-- Select Religion --</option>';
  religionsData.forEach(religion => {
    const option = document.createElement('option');
    option.value = religion.value;
    option.textContent = `${religion.icon || ''} ${religion.label || religion.value}`;
    religionSelect.appendChild(option);
  });
}

function updateCountryCode() {
  const countrySelect = document.getElementById('country');
  const countryCodeSelect = document.getElementById('countryCode');
  if (!countrySelect || !countryCodeSelect) return;

  const selectedOption = countrySelect.options[countrySelect.selectedIndex];
  const phoneCode = selectedOption.getAttribute('data-phone-code');
  
  if (phoneCode) {
    for (let i = 0; i < countryCodeSelect.options.length; i++) {
      if (countryCodeSelect.options[i].value === phoneCode) {
        countryCodeSelect.selectedIndex = i;
        break;
      }
    }
  }
}

function switchTab(tab, evt) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  if (evt && evt.target) evt.target.classList.add('active');
  
  if (tab === 'signup') {
    document.getElementById('signupForm').style.display = 'block';
    document.getElementById('loginForm').style.display = 'none';
  } else {
    document.getElementById('signupForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
  }
}

function showStatus(message, type) {
  const statusEl = document.getElementById('statusMessage');
  if (!statusEl) return;
  statusEl.textContent = message;
  statusEl.className = 'status-message ' + type;
  setTimeout(() => {
    statusEl.className = 'status-message';
  }, 5000);
}

// ── Email OTP functions ────────────────────────────────────────

async function sendEmailOTPCode() {
  const email = document.getElementById('signupEmail').value.trim();
  if (!email || !/^\S+@\S+\.\S+$/.test(email)) {
    showStatus('Please enter a valid email address first', 'error'); return;
  }
  const btn = document.getElementById('sendOtpEmailBtn');
  btn.disabled = true; btn.textContent = 'Sending…';

  try {
    const res = await fetch(`${API_BASE}/api/auth/send-email-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (data.success) {
      emailOtpSessionId = data.sessionId;
      document.getElementById('emailOtpPanel').style.display = 'block';
      document.getElementById('emailVerifiedBadge').style.display = 'none';
      document.getElementById('emailOtpStatus').textContent = '';
      btn.textContent = 'Resend';
      btn.disabled = false;
      showStatus(data.message || 'Code sent! Check your inbox.', 'success');
      if (data.mockOtp) console.warn('[DEV] Email OTP:', data.mockOtp);
    } else {
      showStatus(data.error || 'Failed to send code', 'error');
      btn.textContent = 'Send Code'; btn.disabled = false;
    }
  } catch (e) {
    showStatus('Network error. Please try again.', 'error');
    btn.textContent = 'Send Code'; btn.disabled = false;
  }
}

async function verifyEmailOTPCode() {
  const otp = document.getElementById('emailOtpInput').value.trim();
  const statusEl = document.getElementById('emailOtpStatus');
  if (!otp || otp.length !== 6) { statusEl.textContent = 'Enter the 6-digit code'; return; }
  if (!emailOtpSessionId) { statusEl.textContent = 'Please send a code first'; return; }
  statusEl.textContent = 'Verifying…';
  try {
    const res = await fetch(`${API_BASE}/api/auth/verify-email-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: emailOtpSessionId, otp })
    });
    const data = await res.json();
    if (data.success && data.verified) {
      verificationStatus.email = true;
      document.getElementById('emailOtpPanel').style.display = 'none';
      document.getElementById('emailVerifiedBadge').style.display = 'block';
      const signupBtn = document.getElementById('signupBtn');
      signupBtn.textContent = 'Complete Sign Up';
      signupBtn.style.background = 'linear-gradient(135deg,#00c853,#00e676)';
      showStatus('✅ Email verified!', 'success');
    } else {
      statusEl.textContent = data.error || 'Incorrect code. Try again.';
    }
  } catch (e) { statusEl.textContent = 'Network error. Try again.'; }
}

async function resendEmailOTPCode() {
  emailOtpSessionId = null;
  await sendEmailOTPCode();
}

async function handleSignup() {
  console.log('[Auth] handleSignup triggered');
  const email = document.getElementById('signupEmail').value.trim();
  const username = document.getElementById('signupUsername').value.trim();
  const password = document.getElementById('signupPassword').value;
  const religion = document.getElementById('religion').value;
  const country = document.getElementById('country').value;
  const countryCode = document.getElementById('countryCode').value;
  const phone = document.getElementById('phoneNumber').value.trim();
  
  if (!email || !username || !password || !religion || !country || !phone) {
    showStatus('Please fill in all fields', 'error');
    return;
  }
  
  if (password.length < 8) {
    showStatus('Password must be at least 8 characters long', 'error');
    return;
  }
  
  const signupBtn = document.getElementById('signupBtn');
  signupBtn.disabled = true;
  signupBtn.innerHTML = '<span class="loading"></span> Creating account...';
  
  try {
    const response = await fetch(`${API_BASE}/api/auth/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        email, username, password, religion, country, phone, countryCode
      })
    });
    
    const data = await response.json();
    
    if (data.success === true || data.status === 'success') {
      showStatus('✅ Account created successfully! Redirecting...', 'success');
      
      const sid = data.sessionId || data.session_id;
      localStorage.setItem('session_token', sid);
      localStorage.setItem('__cached_session_id__', sid);
      localStorage.setItem('session_active', 'true');
      localStorage.setItem('user_data', JSON.stringify(data.user));
      
      if (window._NativeBio) window._NativeBio.saveSession(sid, data.user);
      
      setTimeout(() => {
        window.location.href = '/codebank/indexCB.html';
      }, 1500);
    } else {
      showStatus(data.error || data.message || 'Signup failed', 'error');
      signupBtn.disabled = false;
      signupBtn.textContent = 'Complete Sign Up';
    }
  } catch (error) {
    console.error('[Auth] Signup error:', error);
    showStatus('Network error. Please try again.', 'error');
    signupBtn.disabled = false;
    signupBtn.textContent = 'Complete Sign Up';
  }
}

async function handleLogin() {
  console.log('[Auth] handleLogin triggered');
  
  const emailEl = document.getElementById('loginEmail');
  const passwordEl = document.getElementById('loginPassword');
  
  if (!emailEl || !passwordEl) {
    console.error('[Auth] Login inputs not found');
    return;
  }

  const email = emailEl.value.trim();
  const password = passwordEl.value;

  if (!email || !password) {
    showStatus('Email and password required', 'error');
    return;
  }

  const loginBtn = document.getElementById('loginBtnMain');
  if (loginBtn) {
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="loading"></span> Logging in...';
  }

  try {
    const response = await fetch(`${API_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();
    console.log('[Auth] Login response:', data);

    if (data.success === true || data.status === 'success') {
      showStatus('✅ Login successful! Redirecting...', 'success');
      
      const sid = data.sessionId || data.session_id;
      localStorage.setItem('session_token', sid);
      localStorage.setItem('__cached_session_id__', sid);
      localStorage.setItem('session_active', 'true');
      if (data.user) localStorage.setItem('user_data', JSON.stringify(data.user));

      if (window._NativeBio) window._NativeBio.saveSession(sid, data.user);
      
      setTimeout(() => {
        window.location.href = '/codebank/indexCB.html';
      }, 1000);
    } else {
      showStatus(data.error || data.message || 'Login failed', 'error');
      if (loginBtn) {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    }
  } catch (error) {
    console.error('[Auth] Login error:', error);
    showStatus('Network error. Please try again.', 'error');
    if (loginBtn) {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    }
  }
}

// ── Google Sign-In Integration ──────────────────────────────────────────────
async function initGoogleSignIn() {
  try {
    console.log('[Google] Initializing...');
    const res = await fetch('/api/auth/google-client-id');
    const data = await res.json();
    const clientId = data.clientId;

    if (!clientId || clientId.includes('your_google')) {
      console.warn('[Google] Client ID not configured');
      return;
    }

    google.accounts.id.initialize({
      client_id: clientId,
      callback: handleGoogleCredential
    });

    const btnWidth = Math.min(window.innerWidth - 60, 400);

    // Render Login Google Button
    const loginG = document.getElementById('google-signin-login');
    if (loginG) {
      google.accounts.id.renderButton(loginG, { theme: 'filled_blue', size: 'large', width: btnWidth, shape: 'pill' });
      document.getElementById('google-login-wrapper').style.display = 'block';
      document.getElementById('google-divider-login').style.display = 'flex';
    }

    // Render Signup Google Button
    const signupG = document.getElementById('google-signin-signup');
    if (signupG) {
      google.accounts.id.renderButton(signupG, { theme: 'filled_blue', size: 'large', width: btnWidth, shape: 'pill' });
      document.getElementById('google-signup-wrapper').style.display = 'block';
      document.getElementById('google-divider-signup').style.display = 'flex';
    }
    console.log('[Google] Buttons rendered');
  } catch (e) {
    console.error('[Google] Init error:', e);
  }
}

async function handleGoogleCredential(response) {
  const statusEl = document.getElementById('statusMessage');
  try {
    console.log('[Google] Credential received, sending to server...');
    if (statusEl) {
      statusEl.textContent = 'Signing in with Google...';
      statusEl.className = 'status-message success';
      statusEl.style.display = 'block';
    }

    const res = await fetch('/api/auth/google', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ credential: response.credential })
    });

    const data = await res.json();
    console.log('[Google] Server response:', data);

    if (data.status === 'success' || data.success === true) {
      console.log('[Google] ✅ Authentication successful!');
      const sid = data.sessionId || data.session_id;
      localStorage.setItem('session_token', sid);
      localStorage.setItem('__cached_session_id__', sid);
      localStorage.setItem('session_active', 'true');
      if (data.user) localStorage.setItem('user_data', JSON.stringify(data.user));
      
      if (window._NativeBio) window._NativeBio.saveSession(sid, data.user);

      if (statusEl) {
        statusEl.textContent = '✅ Signed in with Google! Redirecting...';
        statusEl.className = 'status-message success';
      }

      updateAuthUI();
      setTimeout(function() { window.location.href = '/codebank/indexCB.html'; }, 1000);
    } else {
      console.error('[Google] Server error:', data);
      if (statusEl) {
        statusEl.textContent = '❌ ' + (data.error || 'Google sign-in failed');
        statusEl.className = 'status-message error';
      }
    }
  } catch (e) {
    console.error('[Google Auth Error]', e);
    if (statusEl) {
      statusEl.textContent = '❌ Network error: ' + e.message;
      statusEl.className = 'status-message error';
    }
  }
}

function _tryInitGoogle() {
  if (window.google && window.google.accounts) {
    initGoogleSignIn();
  } else {
    setTimeout(_tryInitGoogle, 500);
  }
}

document.addEventListener('DOMContentLoaded', function() {
  setTimeout(_tryInitGoogle, 500);
});
</script>
