<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBank - Sign In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .mode-tab {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            background: #f5f5f5;
            color: #666;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            text-align: center;
        }

        .mode-tab.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .hidden {
            display: none;
        }

        .error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 8px;
            min-height: 16px;
        }

        .success {
            color: #27ae60;
            font-size: 13px;
            margin-top: 8px;
            min-height: 16px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 CodeBank</h1>
            <p>Secure Authentication</p>
        </div>

        <div class="content">
            <!-- Mode Toggle -->
            <div class="mode-toggle">
                <button class="mode-tab active" onclick="switchMode('login')" id="tab-login">Sign In</button>
                <button class="mode-tab" onclick="switchMode('signup')" id="tab-signup">Sign Up</button>
            </div>

            <!-- LOGIN FORM -->
            <form id="login-form" class="form-section" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter password" required>
                </div>

                <div class="error" id="login-error"></div>
                <button type="submit" class="btn-submit" id="btn-login">Sign In</button>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signup-form" class="form-section hidden" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="Enter password (min 6 chars)" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="signup-confirm">Confirm Password</label>
                    <input type="password" id="signup-confirm" placeholder="Confirm password" required minlength="6">
                </div>

                <div class="error" id="signup-error"></div>
                <button type="submit" class="btn-submit" id="btn-signup">Sign Up</button>
            </form>

            <div class="back-link">
                <a href="/codebank/indexCB.html">← Back to CodeBank</a>
            </div>
        </div>
    </div>

    <script>
        // Get mode from URL
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'login';

        if (mode === 'signup') {
            switchMode('signup');
        }

        function switchMode(newMode) {
            document.getElementById('login-form').classList.toggle('hidden', newMode !== 'login');
            document.getElementById('signup-form').classList.toggle('hidden', newMode !== 'signup');
            document.getElementById('tab-login').classList.toggle('active', newMode === 'login');
            document.getElementById('tab-signup').classList.toggle('active', newMode === 'signup');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const errorDiv = document.getElementById('login-error');
            const btn = document.getElementById('btn-login');
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            errorDiv.textContent = '';

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Signing in...';

                // Attempt server login first
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    // Broadcast to indexCB.html and yt-new-clear.html
                    broadcastAuthSuccess(data.user, data.sessionId);
                    // Redirect back to indexCB.html
                    setTimeout(() => window.location.href = '/codebank/indexCB.html', 500);
                    return;
                }

                // Server failed - try client-side auth (guest mode fallback)
                const success = await clientSideLogin(email, password);
                if (success) {
                    broadcastAuthSuccess({ email }, null);
                    setTimeout(() => window.location.href = '/codebank/indexCB.html', 500);
                } else {
                    errorDiv.textContent = 'Invalid email or password';
                }
            } catch (err) {
                console.warn('[Login] Error:', err.message);
                // Try client-side
                const success = await clientSideLogin(email, password);
                if (success) {
                    broadcastAuthSuccess({ email }, null);
                    setTimeout(() => window.location.href = '/codebank/indexCB.html', 500);
                } else {
                    errorDiv.textContent = 'Login failed. Please try again.';
                }
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            const errorDiv = document.getElementById('signup-error');
            const btn = document.getElementById('btn-signup');
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;

            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match';
                return;
            }

            errorDiv.textContent = '';

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Creating account...';

                // Try server signup first
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    broadcastAuthSuccess(data.user, data.sessionId);
                    setTimeout(() => window.location.href = '/codebank/indexCB.html', 500);
                    return;
                }

                // Server failed - try client-side signup
                const success = await clientSideSignup(email, password);
                if (success) {
                    broadcastAuthSuccess({ email }, null);
                    setTimeout(() => window.location.href = '/codebank/indexCB.html', 500);
                } else {
                    errorDiv.textContent = 'Signup failed. Account may already exist.';
                }
            } catch (err) {
                console.warn('[Signup] Error:', err.message);
                const success = await clientSideSignup(email, password);
                if (success) {
                    broadcastAuthSuccess({ email }, null);
                    setTimeout(() => window.location.href = '/codebank/indexCB.html', 500);
                } else {
                    errorDiv.textContent = 'Signup failed. Please try again.';
                }
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Sign Up';
            }
        }

        // Client-side authentication (guest mode)
        async function clientSideLogin(email, password) {
            try {
                const users = JSON.parse(localStorage.getItem('cb_users_db') || '[]');
                const user = users.find(u => u.email === email);
                if (!user) return false;

                // Simple password check (in real app, use proper hashing)
                if (user.password !== password) return false;

                // Save session
                localStorage.setItem('__cached_user__', JSON.stringify({ email, uid: user.id }));
                localStorage.setItem('session_token', 'guest-' + Date.now());
                return true;
            } catch (_) {
                return false;
            }
        }

        async function clientSideSignup(email, password) {
            try {
                const users = JSON.parse(localStorage.getItem('cb_users_db') || '[]');
                if (users.some(u => u.email === email)) return false;

                const newUser = {
                    id: 'user-' + Date.now(),
                    email,
                    password, // In real app, hash this!
                    createdAt: new Date().toISOString()
                };

                users.push(newUser);
                localStorage.setItem('cb_users_db', JSON.stringify(users));
                localStorage.setItem('__cached_user__', JSON.stringify({ email, uid: newUser.id }));
                localStorage.setItem('session_token', 'guest-' + Date.now());
                return true;
            } catch (_) {
                return false;
            }
        }

        // Broadcast auth success to parent and other windows
        function broadcastAuthSuccess(user, sessionId) {
            // Store in localStorage for cross-frame sync
            localStorage.setItem('__cached_user__', JSON.stringify(user));
            if (sessionId) localStorage.setItem('session_token', sessionId);

            // Broadcast to parent window (indexCB.html)
            if (window.opener && !window.opener.closed) {
                window.opener.postMessage({
                    type: 'auth:broadcast',
                    authenticated: true,
                    user: user,
                    sessionId: sessionId
                }, window.location.origin);
            }

            // Broadcast to parent frame (if in iframe)
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'auth:broadcast',
                    authenticated: true,
                    user: user,
                    sessionId: sessionId
                }, window.location.origin);
            }

            console.log('[Login] ✅ Auth successful, broadcasting to all windows');
        }
    </script>
</body>
</html>
