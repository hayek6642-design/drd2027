<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CodeBank</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#0a0e27;color:#e0e0e0}.navbar{position:fixed;top:0;left:0;right:0;height:60px;background:linear-gradient(135deg,#1a1f3a,#16213e);border-bottom:1px solid #2d3561;display:flex;justify-content:space-between;align-items:center;padding:0 24px;z-index:1000}.navbar-left{display:flex;gap:16px;align-items:center}.navbar-title{font-size:24px;font-weight:700;color:#00d4ff}.navbar-subtitle{font-size:12px;color:#888}.navbar-right{display:flex;gap:12px}.btn-signin{padding:8px 20px;background:linear-gradient(135deg,#00d4ff,#0099cc);border:none;color:#000;border-radius:4px;cursor:pointer;font-weight:600}.user-badge{padding:8px 16px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:4px;font-size:12px;color:#00d4ff}.sidebar{position:fixed;left:0;top:60px;width:240px;height:calc(100vh - 200px);background:#0f1427;border-right:1px solid #2d3561;padding:20px 0;overflow-y:auto;z-index:100}.sidebar-section{margin-bottom:16px}.sidebar-title{padding:8px 16px;font-size:10px;font-weight:700;color:#666;text-transform:uppercase}.sidebar-item{padding:8px 16px;font-size:13px;color:#aaa;cursor:pointer}.sidebar-item:hover{background:rgba(0,212,255,.1);color:#00d4ff}.bottom-panel{position:fixed;bottom:0;left:0;right:0;height:140px;background:#0f1427;border-top:1px solid #2d3561;padding:16px;display:flex;gap:16px;overflow-x:auto;z-index:200}.bottom-service{min-width:120px;padding:12px;background:rgba(0,212,255,.05);border:1px solid #2d3561;border-radius:6px;text-align:center;font-size:12px;cursor:pointer}.bottom-service.zagel{background:rgba(255,165,0,.15);border-color:rgba(255,165,0,.3);color:#ffa500}.main-content{position:fixed;top:60px;left:240px;right:0;bottom:140px;overflow-y:auto;background:#0a0e27}.main-content iframe{width:100%;height:100%;border:none}.login-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:2000;justify-content:center;align-items:center}.login-modal.show{display:flex;animation:slideUp .3s ease-out}.login-modal-content{background:#1a1f3a;border:1px solid #2d3561;border-radius:8px;width:90%;max-width:400px;padding:32px;box-shadow:0 8px 32px rgba(0,0,0,.5);position:relative}.close-modal-btn{position:absolute;top:16px;right:16px;background:0;border:0;color:#666;font-size:24px;cursor:pointer}.tab-button{padding:8px 16px;background:0;border:0;color:#666;cursor:pointer;font-weight:600;border-bottom:2px solid transparent}.tab-button.active{color:#00d4ff;border-bottom-color:#00d4ff}.form-group{margin-bottom:16px}.form-group label{display:block;font-size:12px;color:#888;margin-bottom:6px}.form-group input{width:100%;padding:10px;background:rgba(0,0,0,.3);border:1px solid #2d3561;border-radius:4px;color:#e0e0e0;font-size:14px}.btn-submit{width:100%;padding:12px;background:linear-gradient(135deg,#00d4ff,#0099cc);border:0;color:#000;border-radius:4px;font-weight:600;cursor:pointer}.error-message{display:none;padding:12px;background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);border-radius:4px;color:#ff4444;font-size:13px;margin-bottom:16px;text-align:center}.error-message.show{display:block}.tab-content{display:none}.tab-content.active{display:block}@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}</style></head><body><div class="navbar"><div class="navbar-left"><div><div class="navbar-title">Bankode</div><div class="navbar-subtitle">CodeBank Exchange</div></div></div><div class="navbar-right" id="userInfo"><button class="btn-signin" onclick="showLoginModal(event)">Sign In</button></div></div><div class="sidebar"><div class="sidebar-section"><div class="sidebar-title">CORE</div><div class="sidebar-item">SafeCode</div></div><div class="sidebar-section"><div class="sidebar-title">TOOLS</div><div class="sidebar-item">CoRSA</div><div class="sidebar-item">AI Hub</div><div class="sidebar-item">OpenHands</div><div class="sidebar-item">Calculator</div><div class="sidebar-item">ETHi</div></div><div class="sidebar-section"><div class="sidebar-title">MEDIA</div><div class="sidebar-item">SammaSey</div><div class="sidebar-item">Bafisoda</div></div><div class="sidebar-section"><div class="sidebar-title">FINANCE</div><div class="sidebar-item">Exbat</div><div class="sidebar-item">Pabasah</div></div></div><div class="main-content"><iframe id="appFrame" src="/yt-new-clear.html" title="CodeBank App"></iframe></div><div class="bottom-panel"><div class="bottom-service">SafeCode</div><div class="bottom-service zagel">🧡 Zagel</div><div class="bottom-service">ETHi</div><div class="bottom-service">More</div></div><div id="loginModal" class="login-modal"><div class="login-modal-content"><button class="close-modal-btn" onclick="closeLoginModal()">✕</button><div style="margin-bottom:24px"><h2 style="color:#00d4ff;margin-bottom:8px">CodeBank Access</h2><p style="color:#888;font-size:12px">Sign in to your account</p></div><div id="loginError" class="error-message"></div><div id="signupError" class="error-message"></div><div style="display:flex;gap:12px;margin-bottom:24px;border-bottom:1px solid #2d3561"><button class="tab-button active" onclick="switchTab('login', event)">Sign In</button><button class="tab-button" onclick="switchTab('signup', event)">Create Account</button></div><div id="loginTab" class="tab-content active"><form onsubmit="handleEmailLogin(event)"><div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com" required></div><div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••" required></div><button type="submit" class="btn-submit" id="loginSubmit">Sign In</button></form></div><div id="signupTab" class="tab-content"><form onsubmit="handleSignup(event)"><div class="form-group"><label>Email</label><input type="email" id="signupEmail" placeholder="your@email.com" required></div><div class="form-group"><label>Password</label><input type="password" id="signupPassword" placeholder="••••••••" required></div><div class="form-group"><label>Confirm Password</label><input type="password" id="signupConfirm" placeholder="••••••••" required></div><button type="submit" class="btn-submit" id="signupSubmit">Create Account</button></form></div></div></div><script src="/shared/auth-system-complete.js"></script><script>console.log('[CodeBank] Initialized - Auth modal HIDDEN by default');window.addEventListener('DOMContentLoaded',async()=>{const session=await window.AuthSystem.restoreSession();if(session)updateUserUI(session.email);else console.log('[CodeBank] Ready - Click "Sign In" to authenticate')});function updateUserUI(e){document.getElementById('userInfo').innerHTML=`<div class="user-badge">👤 ${e} <button onclick="handleLogout(event)" style="margin-left:8px;background:0;border:0;color:#00d4ff;cursor:pointer;font-size:12px">Logout</button></div>`;closeLoginModal()}function showLoginModal(e){e.preventDefault();console.log('[CodeBank] Opening auth modal');document.getElementById('loginModal').classList.add('show')}function closeLoginModal(){const e=document.getElementById('loginModal');e.classList.remove('show');document.getElementById('loginEmail').value='';document.getElementById('loginPassword').value='';document.getElementById('signupEmail').value='';document.getElementById('signupPassword').value='';document.getElementById('signupConfirm').value='';document.getElementById('loginError').classList.remove('show');document.getElementById('signupError').classList.remove('show')}function switchTab(e,s){s.preventDefault();document.querySelectorAll('.tab-button').forEach(e=>{e.classList.remove('active')});s.target.classList.add('active');document.querySelectorAll('.tab-content').forEach(s=>{s.classList.remove('active')});document.getElementById(e+'Tab').classList.add('active');document.getElementById('loginError').classList.remove('show');document.getElementById('signupError').classList.remove('show')}async function handleEmailLogin(e){e.preventDefault();const s=document.getElementById('loginEmail').value.trim(),o=document.getElementById('loginPassword').value,l=document.getElementById('loginError'),r=document.getElementById('loginSubmit');l.classList.remove('show');r.disabled=!0;r.textContent='Signing in...';try{const e=await window.AuthSystem.login(s,o);e.success?(console.log('[Auth] Login successful'),updateUserUI(s),setTimeout(()=>location.reload(),500)):(l.textContent=e.error,l.classList.add('show'),r.disabled=!1,r.textContent='Sign In')}catch(e){console.error('[Auth] Error:',e);l.textContent='❌ An error occurred';l.classList.add('show');r.disabled=!1;r.textContent='Sign In'}}async function handleSignup(e){e.preventDefault();const s=document.getElementById('signupEmail').value.trim(),o=document.getElementById('signupPassword').value,l=document.getElementById('signupConfirm').value,r=document.getElementById('signupError'),t=document.getElementById('signupSubmit');r.classList.remove('show');t.disabled=!0;t.textContent='Creating account...';try{const e=await window.AuthSystem.signup(s,o,l);e.success?(console.log('[Auth] Signup successful'),updateUserUI(s),setTimeout(()=>location.reload(),500)):(r.textContent=e.error,r.classList.add('show'),t.disabled=!1,t.textContent='Create Account')}catch(e){console.error('[Auth] Error:',e);r.textContent='❌ An error occurred';r.classList.add('show');t.disabled=!1;t.textContent='Create Account'}}function handleLogout(e){e.preventDefault();window.AuthSystem.logout();location.reload()}document.getElementById('loginModal').addEventListener('click',e=>{e.target.id==='loginModal'&&closeLoginModal()})</script></body></html>
