// LOGOUT FIX: Clear session BEFORE redirect to prevent loop
function clearSessionAndLogout() {
  console.log('[LOGOUT] Clearing ALL session data...');
  
  // 1. Clear localStorage
  localStorage.removeItem('session_active');
  localStorage.removeItem('session_token');
  localStorage.removeItem('user_data');
  localStorage.removeItem('__cached_user__');
  localStorage.removeItem('__cached_session_id__');
  localStorage.removeItem('sessionId');
  localStorage.removeItem('last_login_email');
  
  // 2. Clear sessionStorage
  sessionStorage.clear();
  
  // 3. Properly clear ALL cookies
  const cookies = document.cookie.split(";");
  for (let i = 0; i < cookies.length; i++) {
    const cookie = cookies[i];
    const cookieName = cookie.split("=")[0].trim();
    if (cookieName) {
      console.log('[LOGOUT] Clearing cookie:', cookieName);
      // Clear with path=/ (root)
      document.cookie = cookieName + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; SameSite=Lax";
      // Also try with domain
      document.cookie = cookieName + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=dr-d-h51l.onrender.com; SameSite=Lax";
    }
  }
  
  console.log('[LOGOUT] All session data cleared');
  console.log('[LOGOUT] Staying in app as guest mode...');
  
  // Initialize guest session instead of redirect
  window.AUTH_GLOBAL = {
    userId: 'guest_' + Date.now(),
    authenticated: false,
    guest: true,
    expiresAt: Date.now() + (365 * 24 * 60 * 60 * 1000)
  };
  
  if (window.broadcastAuth && typeof window.broadcastAuth === 'function') {
    window.broadcastAuth(window.AUTH_GLOBAL);
  }
  
  if (window.AuthCore && typeof window.AuthCore._setState === 'function') {
    window.AuthCore._setState({
      authenticated: false,
      status: 'guest',
      userId: window.AUTH_GLOBAL.userId,
      guest: true
    });
  }
}

</script>
<script>
      (function() {
        const reloadKey = 'last_reload_time';
        const minReloadInterval = 999999999;  // Effectively disabled // Allow login redirect time

        // FIX: Check session_token FIRST - login.html sets this immediately after login
        // Don't check session_active here as auth-core.js hasn't loaded yet
        const sessionToken = localStorage.getItem('session_token') || localStorage.getItem('__cached_session_id__');
        if (sessionToken) {
            console.log('[AUTH PRESERVED] session_token found, skipping reload check');
            localStorage.setItem(reloadKey, Date.now().toString());
            return;
        }

        // Also check sessionId in sessionStorage (set by auth-core.js)
        const sessionId = sessionStorage.getItem('sessionId');
        if (sessionId) {
            console.log('[AUTH PRESERVED] sessionId in sessionStorage, skipping reload check');
            localStorage.setItem(reloadKey, Date.now().toString());
            return;
        }

        // OLD RELOAD CHECK - only runs if no session exists
        const lastReload = parseInt(localStorage.getItem(reloadKey) || '0');
        const now = Date.now();
        if (now - lastReload < minReloadInterval) {
          console.warn('[RELOAD] Rapid reload without auth - allowing continue');
          localStorage.setItem(reloadKey, now.toString());
          return;
        }
        localStorage.setItem(reloadKey, now.toString());
      })();
    </script>
    
    <!-- FORCE CODES INTO SNAPSHOT - Fix code bar showing 0 -->
    <script>
    (function ensureCodesInSnapshot() {
        // Get codes from localStorage cache
        let cache = null;
        try { cache = localStorage.getItem('assets_cache'); } catch(e) {}
        let assets = cache ? JSON.parse(cache) : { codes: [], silver: [], gold: [] };
        
        // If cache is empty but codes exist in memory, use those
        if (assets.codes.length === 0 && window.writtenCodes) {
            assets.codes = Array.from(window.writtenCodes);
        }
        
        // Also check other storage keys
        try {
            const legacyCodes = localStorage.getItem('codes');
            if (legacyCodes) {
                const parsed = JSON.parse(legacyCodes);
                assets.codes = [...new Set([...assets.codes, ...parsed])];
            }
        } catch(e) {}
        
        // Save back to ensure snapshot picks it up
        try { localStorage.setItem('assets_cache', JSON.stringify(assets)); } catch(e) {}
        window.__forcedAssets = assets;
        
        console.log('[Code Fix] Forced', assets.codes.length, 'codes into snapshot');
    })();
    </script>
    
    <!-- INITIALIZATION STATE TRACKER - Delay hiding progress until ready -->
    <script>
    (function InitStateTracker() {
        window.InitState = {
            steps: { domReady: false, authLoaded: false, assetsLoaded: false, codeReady: false, bridgeLoaded: false, configLoaded: false },
            startTime: Date.now(),
            minDisplayTime: 2000,
            
            checkComplete: function() {
                const elapsed = Date.now() - this.startTime;
                const timeOk = elapsed >= this.minDisplayTime;
                const codeReady = this.steps.codeReady || this.steps.configLoaded;
                console.log('[InitState] Check:', { elapsed: elapsed, codeReady: codeReady, timeOk: timeOk, hide: codeReady && timeOk });
                return codeReady && timeOk;
            },
            
            markReady: function(step) {
                if (this.steps[step] !== undefined && this.steps[step] === true) return;
                this.steps[step] = true;
                console.log('[InitState] Ready:', step);
                if (step === 'codeReady' || step === 'configLoaded') this.hideProgressPage();
            },
            
            hideProgressPage: function() {
                if (this._hidden) return;
                if (!this.checkComplete()) return;
                this._hidden = true;
                console.log('[InitState] Hiding progress after', Date.now() - this.startTime, 'ms');
                
                // Fade progress elements
                ['loading-progress-bar', 'progress-container', 'init-container'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) { el.style.transition = 'opacity 0.5s'; el.style.opacity = '0'; }
                });
                
                // Clear "Waiting" message if still showing
                const codeDisplay = document.getElementById('code-display');
                if (codeDisplay && codeDisplay.textContent === 'Waiting for code...') {
                    codeDisplay.textContent = window.__currentCode || '';
                }
            },
            
            autoHide: function() {
                setTimeout(() => { if (!this._hidden) { console.log('[InitState] Auto-timeout'); this._hidden = true; } }, 10000);
            }
        };
        
        window.addEventListener('DOMContentLoaded', () => window.InitState.markReady('domReady'));
        window.InitState.autoHide();
        console.log('[InitState] Tracker ready');
    })();
    </script>

    <!-- EMERGENCY AUTH LOCK - Prevents redirect loop -->
    <script>
    (function() {
        let authLocked = false;
        let lockTimeout;
        
        // Watch for authenticated state
        window.addEventListener('auth:ready', (e) => {
            if (e.detail?.authenticated || localStorage.getItem('session_active') === 'true') {
                authLocked = true;
                console.log('[AUTH LOCK] State locked as authenticated');
                clearTimeout(lockTimeout);
                lockTimeout = setTimeout(() => { authLocked = false; }, 30000);
            }
        });
        
        // Block redirects back to login if authenticated
        const originalReplace = window.location.replace;
        window.location.replace = function(url) {
            if (authLocked && url && url.includes('login')) {
                console.warn('[AUTH LOCK] Blocked redirect to login.html');
                return;
            }
            return originalReplace.call(this, url);
        };
        
        const originalAssign = window.location.assign;
        window.location.assign = function(url) {
            if (authLocked && url && url.includes('login')) {
                console.warn('[AUTH LOCK] Blocked assign to login.html');
                return;
            }
            return originalAssign.call(this, url);
        };
        
        // Intercept state changes
        if (window.AuthCore) {
            const origSetState = window.AuthCore._setState;
            window.AuthCore._setState = function(newState) {
                if (this.state?.authenticated === true && newState?.authenticated === false && this.state?.sessionId) {
                    console.warn('[AUTH LOCK] Blocked flip to unauthenticated');
                    newState.authenticated = true;
                    newState.status = 'authenticated';
                }
                return origSetState.call(this, newState);
            };
        }
        
        console.log('[AUTH LOCK] Protection active');
    })();
    </script>

(function(){
            async function fetchSqliteCodesFirst(){
                try {
                    // Auth check handled by fetch patch gate
                    var res = await fetch('/api/sqlite/codes', { method: 'GET', credentials: 'include' });
                    if (!res.ok) return false;
                    var data = await res.json();
                    try { window.UVLog && window.UVLog('sqlite-codes-fetch', { status: data && data.status, count: data && data.count }, 'yt-new-clear') } catch(_){ }
                    try { if (window.DEBUG_MODE) console.log('[CodeBank] SQLite sync result:', data); } catch (_) {}
                    if (data && data.status === 'success' && Array.isArray(data.rows) && data.rows.length > 0) {
                        var latest = (typeof data.latest==='string' ? data.latest : (data.rows[0] && data.rows[0].code) || '');
                        var snapshot = { latest: latest, rows: data.rows };
                        try { window.dispatchEvent(new CustomEvent('sqlite:snapshot', { detail: snapshot })); } catch(_){}
                        try { window.UVLog && window.UVLog('sqlite:snapshot:emit', snapshot, 'yt-new-clear') } catch(_){}
                        // [FIX] Store globally for codebank-bridge.js (timing: bridge module may load after this fires)
                        if (latest) {
                            window.__PENDING_LATEST_CODE__ = latest;
                            if (typeof window.updateCodeDisplay === 'function') {
                                window.updateCodeDisplay(latest);
                            }
                        }
                        return true;
                    }
                    return false;
                } catch(e){ return false; }
            }

                    function readSnap(){ return openDB().then(function (db) { return new Promise(function (resolve, reject) { try { var tx = db.transaction('snapshots', 'readonly'); var store = tx.objectStore('snapshots'); var req = store.get('latest'); req.onsuccess = function () { resolve(req.result || null) }; req.onerror = function () { reject(req.error) }; } catch (e) { reject(e) } }); }); }
                    var snap = await readSnap();

                            return false;

                        // [CROSS-DEVICE FIX] SSE EventSource for real-time cross-device sync.
                        // When ANY device earns a code, server emits CODES_RECEIVED to ALL devices.
                        // All connected sessions (phone, computer, tablet) immediately re-fetch

                        try {

                try {

              }

                // Create guest session instead of redirect
                window.AUTH_GLOBAL = {
                    userId: 'guest_' + Date.now(),

    <script>
    (function() {
      // Wait for DOM to be ready
      function init() {
        const codeDisplay = document.getElementById('code-display');
        if (!codeDisplay) {
          console.warn('[UI SYNC] #code-display not found, retrying...');
          setTimeout(init, 500);
          return;
        }

        console.log('[UI SYNC] Code display handler initialized');
        let lastDisplayedCode = null;

      function updateUI(code, source) {
        if (!code || code === lastDisplayedCode) return;
        
        if (window.DEBUG_MODE) console.log(`[UI SYNC] Updating #code-display from ${source}:`, code);
        codeDisplay.textContent = code;
        lastDisplayedCode = code;
        
        // Visual feedback
        codeDisplay.classList.add('pulse');
        setTimeout(() => codeDisplay.classList.remove('pulse'), 800);
        
        // Mark InitState as code ready
        if (window.InitState) {
            window.InitState.markReady('codeReady');
            window.__currentCode = code;
        }
      }

      function handleEvent(e) {
        const d = e.detail || {};
        let code = null;

        if (window.DEBUG_MODE) console.log(`[UI SYNC] Event received: ${e.type}`, d);

        // Try various properties where code might be
        if (typeof d === 'string') code = d;
        else if (d.code) code = d.code;
        else if (d.latestCode) code = d.latestCode;
        else if (d.latest) code = d.latest;
        else if (Array.isArray(d.codes) && d.codes.length > 0) {
          code = d.codes[d.codes.length - 1];
        } else if (Array.isArray(d) && d.length > 0) {
          code = d[d.length - 1];
        }

        if (code) {
          const codeVal = typeof code === 'string' ? code : (code.code || code);
          updateUI(codeVal, e.type);
        }
      }

      // Listen to ALL possible sources of truth
      const events = [
        'assets:updated', 
        'codes:updated', 
        'bankode:code-generated', 
        'SQLITE_CODE_SYNCED',
        'bridge:snapshot-applied',
        'sqlite:snapshot'
      ];

      events.forEach(evt => window.addEventListener(evt, handleEvent));

      // Also listen for storage changes (cross-tab sync)
      window.addEventListener('storage', (e) => {
        if (e.key && (e.key === 'acc_assets' || e.key === 'codebank_assets' || e.key === 'last_generated_code')) {
          console.log('[UI SYNC] Storage change detected:', e.key);
          const lastCode = localStorage.getItem('last_generated_code') || 
                          (JSON.parse(localStorage.getItem('acc_assets') || '{}').codes || []).slice(-1)[0];
          if (lastCode) {
            updateUI(lastCode, 'storage-change');
          }
        }
      });

      // Fallback: poll for code changes every 2 seconds
      setInterval(function() {
        try {
          var assets = JSON.parse(localStorage.getItem('acc_assets') || '{"codes":[]}');
          var codes = assets.codes || [];
          if (codes.length === 0) return;
          var latestCode = codes[codes.length - 1];
          var codeVal = typeof latestCode === 'string' ? latestCode : (latestCode.code || latestCode);
          if (codeVal && codeVal !== lastDisplayedCode) {
            console.log('[UI SYNC] Polling detected new code:', codeVal);
            updateUI(codeVal, 'polling');
            if (window.InitState) {
                window.InitState.markReady('codeReady');
                window.__currentCode = codeVal;
            }
          }
        } catch(e) { /* ignore polling errors */ }
      }, 2000);

      // Initial check
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          if (window.AssetBus && typeof window.AssetBus.snapshot === 'function') {
