<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battalooda - تسجيل صوتي</title>
    
    <!-- Auth client -->
    <script src="/shared/iframe-auth-client.js"></script>
    
    <!-- Styles -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .freemium-badge {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        .recorder-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timer-display {
            font-size: 4rem;
            font-family: 'Courier New', monospace;
            text-align: center;
            color: #00d4ff;
            margin: 20px 0;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #0099cc);
            width: 0%;
            transition: width 0.1s;
        }

        .progress-bar.warning {
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        #record-btn {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            color: #fff;
            min-width: 150px;
        }

        #record-btn.recording {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.4); }
            50% { box-shadow: 0 0 0 20px rgba(255, 107, 107, 0); }
        }

        #upload-btn, #share-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #upload-btn:hover, #share-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .storage-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .storage-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .storage-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #0099cc);
            transition: width 0.3s;
        }

        .recordings-list {
            margin-top: 20px;
        }

        .recording-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .recording-title {
            font-weight: 500;
            display: block;
        }

        .recording-meta {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .recording-actions button {
            padding: 8px 12px;
            margin: 0 3px;
            min-width: auto;
            font-size: 0.9rem;
        }

        .limit-notice {
            text-align: center;
            padding: 10px;
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #ffc107;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 10000;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .share-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100000;
        }

        .share-content {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .share-content input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            text-align: center;
        }

        .share-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }

        .share-buttons a, .share-buttons button {
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            color: #fff;
        }

        .close-btn {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Battalooda</h1>
        
        <div class="limit-notice">
            ⚡ النسخة المجانية: تسجيلات محلية حتى 1 دقيقة | 50 تسجيل كحد أقصى
        </div>

        <div class="recorder-card">
            <div class="timer-display" id="recording-timer">0:00</div>
            
            <div class="progress-container">
                <div class="progress-bar" id="recording-progress"></div>
            </div>

            <div class="controls">
                <button id="record-btn">🔴 تسجيل</button>
                <button id="upload-btn" style="display:none;">☁️ رفع للسحابة</button>
                <button id="share-btn" style="display:none;">🔗 مشاركة</button>
            </div>

            <audio id="playback-audio" controls style="display:none; width:100%; margin-top:15px;"></audio>

            <div class="storage-info" id="storage-stats">
                <div>التخزين المحلي:</div>
                <div class="storage-bar"><div class="storage-fill" style="width:0%"></div></div>
                <span>جاري التحميل...</span>
            </div>
        </div>

        <div class="recorder-card">
            <h3>📁 تسجيلاتي</h3>
            <div class="recordings-list" id="recordings-list">
                <p style="text-align:center; color:rgba(255,255,255,0.5);">لا توجد تسجيلات بعد</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/battalooda/battalooda-storage-manager.js"></script>
    <script src="/battalooda/battalooda-recorder-freemium.js"></script>
</body>
</html>
