<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostalgia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Admin Dashboard Module -->
    <script src="/shared/nostalgia-admin.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }
        .nostalgia-header {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }
        .nostalgia-header h1 {
            font-size: 24px;
            margin: 0;
        }
        .nostalgia-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: rgba(15, 23, 42, 0.8);
        }
        .nostalgia-tab {
            padding: 10px 20px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nostalgia-tab:hover, .nostalgia-tab.active {
            background: rgba(139, 92, 246, 0.3);
            border-color: #8b5cf6;
        }
        .nostalgia-content {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .nostalgia-card {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .nostalgia-video {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }
        .nostalgia-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(139, 92, 246, 0.2);
        }
        .nostalgia-title {
            font-weight: 600;
            font-size: 18px;
        }
        .nostalgia-user {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 5px;
        }
        .nostalgia-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .nostalgia-btn {
            padding: 8px 16px;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 6px;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nostalgia-btn:hover {
            background: rgba(139, 92, 246, 0.4);
        }
        .nostalgia-empty {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .nostalgia-empty i {
            font-size: 48px;
            margin-bottom: 15px;
            color: #8b5cf6;
        }
    </style>
</head>
<body>
    <div class="nostalgia-header">
        <h1 id="nostalgiaTitle">💿 Nostalgia</h1>
        <p style="margin-top: 8px; color: #94a3b8;">Retro music collection</p>
    </div>
    
    <div class="nostalgia-tabs">
        <button class="nostalgia-tab active" data-tab="feed">
            <i class="fas fa-stream"></i> Feed
        </button>
        <button class="nostalgia-tab" data-tab="upload">
            <i class="fas fa-upload"></i> Upload
        </button>
    </div>
    
    <div class="nostalgia-content" id="nostalgia-content">
        <div class="nostalgia-empty">
            <i class="fas fa-music"></i>
            <h3>No memories yet</h3>
            <p>Be the first to share a retro music moment!</p>
            <button class="nostalgia-btn" onclick="loadFeed()" style="margin-top: 15px;">
                <i class="fas fa-sync"></i> Load Feed
            </button>
        </div>
    </div>

    <script>
        let feedData = [];
        
        async function loadFeed() {
            const content = document.getElementById('nostalgia-content');
            content.innerHTML = '<div style="text-align:center;padding:40px;"><i class="fas fa-spinner fa-spin"></i> Loading feed...</div>';
            
            try {
                const res = await fetch('/api/nostalgia/feed', { credentials: 'include' });
                if (res.ok) {
                    feedData = await res.json();
                }
            } catch (e) {
                console.log('API not available');
            }
            
            if (!feedData || feedData.length === 0) {
                content.innerHTML = `
                    <div class="nostalgia-empty">
                        <i class="fas fa-music"></i>
                        <h3>No memories yet</h3>
                        <p>Be the first to share a retro music moment!</p>
                        <button class="nostalgia-btn" onclick="loadFeed()" style="margin-top: 15px;">
                            <i class="fas fa-sync"></i> Try Again
                        </button>
                    </div>
                `;
                return;
            }
            
            renderFeed(feedData);
        }
        
        function renderFeed(items) {
            const content = document.getElementById('nostalgia-content');
            content.innerHTML = items.map(item => `
                <div class="nostalgia-card">
                    <video class="nostalgia-video" src="${item.url}" autoplay muted loop playsinline></video>
                    <div class="nostalgia-meta">
                        <div>
                            <div class="nostalgia-title">${item.title || ''}</div>
                            <div class="nostalgia-user">@${item.user_id || ''}</div>
                        </div>
                        <div style="color: #94a3b8;">${formatDate(item.admin_date)}</div>
                    </div>
                    <div class="nostalgia-actions">
                        <button class="nostalgia-btn"><span>❤️</span> <span class="reaction-count">0</span></button>
                        <button class="nostalgia-btn"><span>💙</span> <span class="reaction-count">0</span></button>
                        <button class="nostalgia-btn"><span>💜</span> <span class="reaction-count">0</span></button>
                    </div>
                </div>
            `).join('');
        }
        
        function formatDate(d) {
            try { return new Date(d).toLocaleDateString(); } catch(e) { return d || ''; }
        }
        
        document.querySelectorAll('.nostalgia-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nostalgia-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                if (tab.dataset.tab === 'feed') {
                    loadFeed();
                } else if (tab.dataset.tab === 'upload') {
                    showUpload();
                }
            });
        });
        
        function showUpload() {
            const content = document.getElementById('nostalgia-content');
            content.innerHTML = `
                <div class="nostalgia-card">
                    <h3 style="margin-bottom: 20px;">📤 Upload a Memory</h3>
                    <div style="margin-bottom: 15px;">
                        <input type="text" placeholder="Title" id="upload-title" 
                            style="width:100%;padding:12px;background:rgba(15,23,42,0.8);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#e2e8f0;">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <input type="text" placeholder="Artist" id="upload-artist" 
                            style="width:100%;padding:12px;background:rgba(15,23,42,0.8);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#e2e8f0;">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <input type="file" accept="video/*" id="upload-file"
                            style="width:100%;padding:12px;background:rgba(15,23,42,0.8);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#e2e8f0;">
                    </div>
                    <button class="nostalgia-btn" onclick="uploadMemory()" style="width:100%;">
                        <i class="fas fa-upload"></i> Submit for Review
                    </button>
                </div>
            `;
        }
        
        async function uploadMemory() {
            const title = document.getElementById('upload-title').value;
            const artist = document.getElementById('upload-artist').value;
            const file = document.getElementById('upload-file').files[0];
            
            if (!title || !file) {
                alert('Please fill in title and select a video file');
                return;
            }
            
            const formData = new FormData();
            formData.append('title', title);
            formData.append('artist', artist);
            formData.append('file', file);
            
            try {
                const res = await fetch('/api/nostalgia/upload', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });
                
                if (res.ok) {
                    alert('Video uploaded! Pending admin approval.');
                    document.querySelector('.nostalgia-tab[data-tab="feed"]').click();
                } else {
                    alert('Upload failed. Please try again.');
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }
        
        loadFeed();
    </script>
</body>
</html>
