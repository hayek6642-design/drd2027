<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farragna Loader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* Auth State Containers */
        .auth-state-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-icon, .lock-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .retry-btn {
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .retry-btn:hover {
            transform: translateY(-2px);
        }
        
        .error-details {
            margin-top: 20px;
            padding: 10px;
            background: rgba(255,0,0,0.1);
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            max-width: 100%;
            overflow: auto;
        }
        
        #service-frame { flex: 1; width: 100%; height: calc(100vh - 0px); border: none; display: none; }
        #service-frame.loaded { display: block; }
    </style>
</head>
<body>
    <div id="app">
        <!-- Loading State -->
        <div id="auth-loading" class="auth-state-container">
            <div class="spinner"></div>
            <p>Loading Farragna...</p>
        </div>
        
        <!-- Auth Error State -->
        <div id="auth-error" class="auth-state-container" style="display:none;">
            <div class="error-icon">⚠️</div>
            <h3>Failed to Load Farragna</h3>
            <p>Could not connect to CodeBank authentication</p>
            <button onclick="IframeAuthClient.reconnect()" class="retry-btn">
                Retry Connection
            </button>
            <button onclick="forceLoad()" class="retry-btn" style="margin-left: 10px; background: #10b981;">
                Force Load (No Bridge)
            </button>
            <div class="error-details" id="error-details"></div>
        </div>
        
        <!-- Not Authenticated State -->
        <div id="auth-required" class="auth-state-container" style="display:none;">
            <div class="lock-icon">🔒</div>
            <h3>Authentication Required</h3>
            <p>This service requires CodeBank authentication</p>
        </div>
        
        <!-- Main App (shown when authenticated) -->
        <iframe id="service-frame" style="display:none; width:100%; height:100%; border:none; flex:1;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
    </div>

    <!-- Universal Service Sync (for all services) -->
    <script src="/shared/codebank-service-sync.js"></script>
    
    <!-- Assets Service Bridge (must be first) -->
    <script src="/shared/assets-service-bridge.js"></script>
    <!-- 1. iframe-auth-client.js MUST be first -->
    <script src="/shared/iframe-auth-client.js"></script>
    
    <!-- 2. Auth-ready component (optional but recommended) -->
    <script src="/shared/auth-ready-component.js"></script>
    <script>
        // Farragna Application
        class FarragnaApp extends AuthReadyComponent {
            constructor() {
                super({
                    requireAuth: true,
                    onAuthReady: (state) => this.initialize(state),
                    onAuthError: (error) => this.showError(error),
                    onNoAuth: () => this.showAuthRequired()
                });
            }
            
            initialize(state) {
                console.log('[Farragna] Initializing with auth:', state);
                
                // Hide loading, show app
                document.getElementById('auth-loading').style.display = 'none';
                document.getElementById('auth-error').style.display = 'none';
                document.getElementById('auth-required').style.display = 'none';
                
                // Load Farragna service
                this.loadService(state);
            }
            
            async loadService(authData) {
                const frame = document.getElementById('service-frame');
                const baseUrl = './farragna/index.html';

                // Try to get a Farragna JWT token for the iframe
                let farragnaToken = null;
                try {
                    const tokenResp = await fetch('/api/farragna/auth/token', { credentials: 'include' });
                    if (tokenResp.ok) {
                        const tokenData = await tokenResp.json();
                        if (tokenData.ok && tokenData.token) {
                            farragnaToken = tokenData.token;
                            console.log('[Farragna] JWT token obtained for iframe');
                        }
                    }
                } catch(e) {
                    console.warn('[Farragna] Could not get JWT token:', e);
                }
                
                frame.onload = () => {
                    setTimeout(() => {
                        if (frame.contentWindow) {
                            frame.contentWindow.postMessage({ 
                                type: 'auth:ready', 
                                source: 'farragna-loader', 
                                token: farragnaToken,
                                user: authData?.user || authData || null,
                                payload: authData || {} 
                            }, '*');
                        }
                    }, 800);
                    frame.style.display = 'block';
                };
                
                frame.src = baseUrl + '?_loader=' + Date.now();
            }
            
            showError(error) {
                console.error('[Farragna] Auth error:', error);
                document.getElementById('auth-loading').style.display = 'none';
                document.getElementById('auth-error').style.display = 'block';
                document.getElementById('error-details').textContent = 
                    JSON.stringify(error, null, 2);
            }
            
            showAuthRequired() {
                document.getElementById('auth-loading').style.display = 'none';
                document.getElementById('auth-required').style.display = 'block';
            }
            
            onAuthChanged(state) {
                console.log('[Farragna] Auth changed:', state);
                if (!state.authenticated) {
                    // User logged out, reload or show auth required
                    location.reload();
                }
            }
            
            onAuthLogout() {
                console.log('[Farragna] User logged out');
                location.reload();
            }
        }
        
        function forceLoad() {
            const frame = document.getElementById('service-frame');
            frame.removeAttribute('sandbox');
            frame.src = './farragna/index.html?_force=' + Date.now();
            document.getElementById('auth-loading').style.display = 'none';
            frame.style.display = 'block';
        }
        
        // Start app when DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => new FarragnaApp());
        } else {
            new FarragnaApp();
        }
    </script>
</body>
</html>
