<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Farragna - Likes Engine</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: system-ui; padding: 20px; }
        .auth-wall { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .auth-wall button { padding: 15px 40px; background: linear-gradient(135deg, #00d4ff, #8a2be2); border: none; color: white; border-radius: 10px; cursor: pointer; }
        .main-ui { display: none; }
        h1 { background: linear-gradient(135deg, #00d4ff, #8a2be2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .balance { margin: 20px 0; font-size: 1.2em; }
        .balance span { color: #00d4ff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="auth-wall" class="auth-wall">
        <h2>🔒 Sign In to Farragna</h2>
        <button onclick="location.href='/login.html?redirect=' + encodeURIComponent('/codebank/farragna.html')">Go to Login</button>
    </div>
    
    <div id="main-ui" class="main-ui">
        <h1>👍 Farragna</h1>
        <div class="balance">Codes: <span id="code-count">0</span></div>
        <div id="content-feed">
            <p style="color: #888;">Content feed loading...</p>
        </div>
    </div>

    <script src="../shared/js/auth-client.js"></script>
    <script>
        window.AuthClient.on('auth:changed', (state) => {
            if (state.authenticated) {
                document.getElementById('auth-wall').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                document.getElementById('code-count').textContent = state.assets?.codes?.length || 0;
            }
        });
    </script>
</body>
</html>
