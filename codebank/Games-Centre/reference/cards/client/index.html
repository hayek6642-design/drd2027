<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Islamic-Compliant Cards Game</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="screen active">
            <div style="margin: auto; text-align: center;">
                <h1 class="waiting-pulse">Loading System...</h1>
                <p>Verifying Assets Bus & Ledger Connectivity</p>
            </div>
        </div>

        <!-- Lobby Screen -->
        <div id="lobby-screen" class="screen">
            <header style="margin-bottom: 40px;">
                <h1>Card Challenge</h1>
                <div style="text-align: center; color: var(--text-muted)">
                    System Rewards Pool Active • Mode: <span id="current-user-status">Guest</span>
                </div>
            </header>
            
            <div class="lobby-grid">
                <section class="selection-group">
                    <h3>1. Competition Mode</h3>
                    <div id="mode-options" class="options-flex">
                        <button data-mode="practice" class="btn selected">Practice</button>
                        <button data-mode="ai" class="btn">VS Computer</button>
                        <button data-mode="multiplayer" class="btn">Live Match</button>
                    </div>
                </section>

                <section class="selection-group" id="service-section" style="display: none;">
                    <h3>2. Service Level</h3>
                    <div id="service-options" class="options-flex">
                        <button data-level="A" class="btn selected">Mode A: Basic (100c)</button>
                        <button data-level="B" class="btn">Mode B: Chat (500c)</button>
                        <button data-level="C" class="btn">Mode C: Full (1000c)</button>
                    </div>
                </section>

                <button id="start-btn" class="btn btn-primary">Lock Assets & Enter Lobby</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="status-indicator">
                    <div class="dot"></div>
                    <span id="game-status">WAITING FOR OPPONENT</span>
                </div>
                <div id="connection-status" class="status-indicator">● Online</div>
            </div>

            <div class="game-board">
                <!-- Opponent -->
                <div class="arena">
                    <div id="opponent-avatar" class="avatar-label">OPPONENT</div>
                    <div class="card back" id="opponent-card">?</div>
                </div>

                <!-- Game Info -->
                <div style="text-align: center;">
                    <h2 id="round-message">Draw your card</h2>
                </div>

                <!-- Player -->
                <div class="arena">
                    <div class="card back" id="my-card">?</div>
                    <div class="avatar-label">YOU</div>
                </div>
            </div>

            <div class="controls">
                <button id="draw-btn" class="btn btn-primary" style="margin: 0; width: 200px;">DRAW CARD</button>
            </div>

            <!-- Chat Overlay (Enabled in Mode B/C) -->
            <div id="chat-panel" class="chat-overlay hidden">
                <div style="padding: 12px; border-bottom: 1px solid #eee; font-weight: bold; background: #f8fafc; border-radius: 12px 12px 0 0">Live Chat</div>
                <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 12px; font-size: 0.9rem;"></div>
                <div style="padding: 10px; border-top: 1px solid #eee;">
                    <input type="text" id="chat-input" placeholder="Message..." style="width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; outline: none;">
                </div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen">
            <div class="results-card" style="margin: auto;">
                <h1 id="winner-banner" class="winner-banner">YOU WON!</h1>
                <p id="rewards-display" style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 40px;"></p>
                <button id="return-lobby-btn" class="btn btn-primary" style="width: 100%;">Return to Lobby</button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
