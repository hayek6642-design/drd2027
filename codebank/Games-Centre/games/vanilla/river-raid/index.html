<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>River Raid</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#fff;font-family:Arial,sans-serif}
h1{margin-bottom:8px;font-size:1.4rem}
#hud{display:flex;gap:20px;margin-bottom:6px;font-size:1rem;color:#f39c12}
canvas{border:2px solid #333}
#msg{margin-top:8px;font-size:1rem;min-height:1.4rem;color:#2ecc71;text-align:center}
.hint{font-size:.75rem;opacity:.5;margin-top:4px}
</style>
</head>
<body>
<h1>✈️ River Raid</h1>
<div id="hud"><span>Score: <strong id="score">0</strong></span><span>Lives: <strong id="lives">3</strong></span></div>
<canvas id="c" width="360" height="480"></canvas>
<div id="msg">Press ← → Space or tap to start</div>
<div class="hint">Arrows/WASD move · Space/tap shoot · Tap sides to move</div>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=360,H=480;
let player,bullets,enemies,particles,score,lives,speed,running=false,raf,keys={};
let ry=0;
function init(){
  player={x:W/2-15,y:H-70,w:30,h:40,cd:0};
  bullets=[];enemies=[];particles=[];score=0;lives=3;speed=2;
  document.getElementById('score').textContent=0;document.getElementById('lives').textContent=3;
  document.getElementById('msg').textContent='';
  if(!running){running=true;raf=requestAnimationFrame(tick);}
}
let spawnT=0,scoreT=0;
function tick(){
  if(!running)return;raf=requestAnimationFrame(tick);ry=(ry+speed*0.5)%40;
  // Score
  scoreT++;if(scoreT>45){scoreT=0;score++;document.getElementById('score').textContent=score;speed=Math.min(8,2+score/100);}
  // Spawn enemies
  spawnT++;if(spawnT>Math.max(25,60-score/10)){spawnT=0;enemies.push({x:30+Math.random()*(W-80),y:-40,w:34,h:26,hp:1});}
  // Player move
  if((keys.ArrowLeft||keys.a)&&player.x>10)player.x-=5;
  if((keys.ArrowRight||keys.d)&&player.x<W-player.w-10)player.x+=5;
  if((keys.ArrowUp||keys.w)&&player.y>H/2)player.y-=3;
  if((keys.ArrowDown||keys.s)&&player.y<H-player.h-5)player.y+=3;
  // Auto shoot
  if(player.cd>0)player.cd--;
  if((keys[' ']||keys.auto)&&player.cd===0){
    bullets.push({x:player.x+player.w/2-2,y:player.y-10,w:4,h:12});player.cd=10;
  }
  // Move bullets
  bullets=bullets.filter(b=>{b.y-=10;return b.y>-20;});
  // Move enemies
  enemies.forEach(e=>{e.y+=speed;});enemies=enemies.filter(e=>e.y<H+50);
  // Bullet-enemy hit
  bullets.forEach(b=>{
    enemies.forEach(e=>{
      if(b.x<e.x+e.w&&b.x+b.w>e.x&&b.y<e.y+e.h&&b.y+b.h>e.y){
        e.hp--;b.y=-999;
        for(let i=0;i<6;i++)particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:20,color:'#f39c12'});
        if(e.hp<=0){score+=10;document.getElementById('score').textContent=score;}
      }
    });
  });
  enemies=enemies.filter(e=>e.hp>0);
  // Player-enemy hit
  enemies.forEach(e=>{
    if(player.x<e.x+e.w&&player.x+player.w>e.x&&player.y<e.y+e.h&&player.y+player.h>e.y){
      e.hp=0;lives--;document.getElementById('lives').textContent=lives;
      for(let i=0;i<12;i++)particles.push({x:player.x+15,y:player.y+20,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,life:30,color:'#e74c3c'});
      if(lives<=0){gameOver();}
    }
  });
  enemies=enemies.filter(e=>e.hp>0);
  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});particles=particles.filter(p=>p.life>0);
  draw();
}
function gameOver(){
  running=false;cancelAnimationFrame(raf);
  document.getElementById('msg').textContent='Game Over! Press key/tap to restart';
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#e74c3c';ctx.font='bold 26px Arial';ctx.textAlign='center';ctx.fillText('GAME OVER',W/2,H/2-20);
  ctx.fillStyle='#fff';ctx.font='18px Arial';ctx.fillText('Score: '+score,W/2,H/2+20);
}
function draw(){
  ctx.fillStyle='#1a6eb5';ctx.fillRect(0,0,W,H);
  // Waves
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
  for(let y=ry;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // Banks
  ctx.fillStyle='#145a32';
  [[0,0,50,H],[W-50,0,50,H]].forEach(([x,y,w,h])=>ctx.fillRect(x,y,w,h));
  // Enemies (boats)
  enemies.forEach(e=>{
    ctx.fillStyle='#e74c3c';ctx.fillRect(e.x,e.y,e.w,e.h);
    ctx.fillStyle='#c00';ctx.fillRect(e.x+e.w/2-2,e.y-8,4,10);
  });
  // Bullets
  bullets.forEach(b=>{ctx.fillStyle='#ffdd57';ctx.fillRect(b.x,b.y,b.w,b.h);});
  // Particles
  particles.forEach(p=>{ctx.fillStyle=p.color;ctx.globalAlpha=p.life/30;ctx.fillRect(p.x,p.y,4,4);});
  ctx.globalAlpha=1;
  // Player (plane)
  ctx.fillStyle='#3498db';ctx.fillRect(player.x+8,player.y,player.w-16,player.h);
  ctx.fillStyle='#5dade2';
  ctx.fillRect(player.x,player.y+10,player.w,10);// wings
  ctx.fillStyle='#85c1e9';ctx.fillRect(player.x+10,player.y+player.h-14,player.w-20,14);// tail
}
document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();if(!running)init();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
// Mobile: tap left/right to move, center/double-tap to shoot
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  const x=e.touches[0].clientX-C.getBoundingClientRect().left;
  if(x<W/3){keys.ArrowLeft=true;}
  else if(x>W*2/3){keys.ArrowRight=true;}
  else{keys.auto=true;}
  if(!running)init();
},{passive:false});
C.addEventListener('touchend',()=>{keys.ArrowLeft=false;keys.ArrowRight=false;keys.auto=false;},{passive:true});
// Auto-shoot enabled
setInterval(()=>{if(running)keys.auto=true;},200);
draw();
</script>
</body>
</html>
