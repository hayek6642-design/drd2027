<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Billiard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0f1e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#fff;font-family:Arial,sans-serif;padding:10px}
h1{margin-bottom:6px;font-size:1.4rem;background:linear-gradient(135deg,#f39c12,#e74c3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#scoreboard{margin-bottom:8px;display:flex;gap:16px;font-size:1rem}
.sc{color:#f39c12}
#billiards-canvas{border:5px solid #c9aa71;border-radius:6px;box-shadow:0 0 25px rgba(201,170,113,.3);max-width:100%;height:auto}
.hint{margin-top:8px;font-size:.75rem;opacity:.5;text-align:center}
#powerBar{width:200px;height:10px;background:#333;border-radius:5px;margin-top:6px;overflow:hidden}
#powerFill{height:100%;width:0%;background:linear-gradient(90deg,#2ecc71,#e74c3c);border-radius:5px;transition:width .05s}
</style>
</head>
<body>
<h1>🎱 Super Billiard</h1>
<div id="scoreboard">
  <span class="sc">Score: <strong id="score">0</strong></span>
  <span class="sc">Balls: <strong id="ballCount">15</strong></span>
</div>
<canvas id="billiards-canvas"></canvas>
<div id="powerBar"><div id="powerFill"></div></div>
<div class="hint">Click near white ball &amp; drag to aim · Release to shoot</div>
<script>
// Super Billiard: enhanced version with power meter
// Uses same base logic as billiards.js but with power indicator
document.addEventListener('DOMContentLoaded', ()=>{
  const canvas = document.getElementById('billiards-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 800; canvas.height = 400;
  const TW = 760, TH = 360;
  let balls = [], cueBall, pockets = [], score = 0, gameOver = false;
  let isAiming = false, startX, startY;

  // Power bar update
  canvas.addEventListener('mousemove', e => {
    if(!isAiming) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX-rect.left)*(canvas.width/rect.width);
    const my = (e.clientY-rect.top)*(canvas.height/rect.height);
    const power = Math.min(Math.hypot(mx-cueBall.x, my-cueBall.y)*0.1, 15);
    document.getElementById('powerFill').style.width = (power/15*100)+'%';
  });

  function init(){
    cueBall = {x:200,y:200,r:10,color:'#fff',vx:0,vy:0,moving:false};
    const colors=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#f39c12'];
    balls=[];let bi=0;
    for(let row=0;row<5;row++) for(let col=0;col<=row;col++){
      balls.push({x:580+row*21*Math.cos(Math.PI/6),y:200+(col-row/2)*21,r:10,color:colors[bi%colors.length],vx:0,vy:0,moving:false});
      bi++;
    }
    pockets=[[20,20],[400,20],[780,20],[20,380],[400,380],[780,380]].map(([x,y])=>({x,y,r:15}));
  }

  canvas.addEventListener('mousedown', e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
    const my=(e.clientY-rect.top)*(canvas.height/rect.height);
    if(Math.hypot(mx-cueBall.x,my-cueBall.y)<cueBall.r*2.5){isAiming=true;startX=mx;startY=my;}
  });
  canvas.addEventListener('touchstart', e=>{
    e.preventDefault();const rect=canvas.getBoundingClientRect();
    const mx=(e.touches[0].clientX-rect.left)*(canvas.width/rect.width);
    const my=(e.touches[0].clientY-rect.top)*(canvas.height/rect.height);
    if(Math.hypot(mx-cueBall.x,my-cueBall.y)<cueBall.r*3){isAiming=true;startX=mx;startY=my;}
  },{passive:false});
  canvas.addEventListener('mouseup', e=>{
    if(!isAiming)return; isAiming=false;
    document.getElementById('powerFill').style.width='0%';
    const rect=canvas.getBoundingClientRect();
    const ex=(e.clientX-rect.left)*(canvas.width/rect.width);
    const ey=(e.clientY-rect.top)*(canvas.height/rect.height);
    const power=Math.min(Math.hypot(ex-startX,ey-startY)*0.12,15);
    const angle=Math.atan2(ey-cueBall.y,ex-cueBall.x);
    cueBall.vx=-Math.cos(angle)*power; cueBall.vy=-Math.sin(angle)*power; cueBall.moving=true;
  });
  canvas.addEventListener('touchend', e=>{
    if(!isAiming)return; isAiming=false;
    document.getElementById('powerFill').style.width='0%';
    const rect=canvas.getBoundingClientRect();
    const ex=(e.changedTouches[0].clientX-rect.left)*(canvas.width/rect.width);
    const ey=(e.changedTouches[0].clientY-rect.top)*(canvas.height/rect.height);
    const power=Math.min(Math.hypot(ex-startX,ey-startY)*0.12,15);
    const angle=Math.atan2(ey-cueBall.y,ex-cueBall.x);
    cueBall.vx=-Math.cos(angle)*power; cueBall.vy=-Math.sin(angle)*power; cueBall.moving=true;
  });

  function moveBall(b){
    if(!b.moving)return;
    b.vx*=0.985; b.vy*=0.985; b.x+=b.vx; b.y+=b.vy;
    if(b.x-b.r<20){b.x=20+b.r;b.vx*=-0.85;}
    if(b.x+b.r>780){b.x=780-b.r;b.vx*=-0.85;}
    if(b.y-b.r<20){b.y=20+b.r;b.vy*=-0.85;}
    if(b.y+b.r>380){b.y=380-b.r;b.vy*=-0.85;}
    if(Math.abs(b.vx)<0.03&&Math.abs(b.vy)<0.03){b.vx=0;b.vy=0;b.moving=false;}
  }
  function collide(a,b){
    const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy);
    if(d<a.r+b.r){
      const ang=Math.atan2(dy,dx),s=Math.sin(ang),c=Math.cos(ang);
      const rv1x=a.vx*c+a.vy*s, rv1y=a.vy*c-a.vx*s;
      const rv2x=b.vx*c+b.vy*s, rv2y=b.vy*c-b.vx*s;
      a.vx=rv2x*c-rv1y*s; a.vy=rv1y*c+rv2x*s;
      b.vx=rv1x*c-rv2y*s; b.vy=rv2y*c+rv1x*s;
      const ov=(a.r+b.r-d)/2;
      a.x-=ov*Math.cos(ang); a.y-=ov*Math.sin(ang);
      b.x+=ov*Math.cos(ang); b.y+=ov*Math.sin(ang);
      a.moving=true; b.moving=true;
    }
  }

  function draw(){
    ctx.clearRect(0,0,800,400);
    ctx.fillStyle='#166534'; ctx.fillRect(20,20,TW,TH);
    ctx.strokeStyle='#a3703e'; ctx.lineWidth=3;
    ctx.strokeRect(20,20,TW,TH);
    // Rail
    ctx.fillStyle='#a3703e';
    [[0,0,800,20],[0,380,800,20],[0,0,20,400],[780,0,20,400]].forEach(([x,y,w,h])=>ctx.fillRect(x,y,w,h));
    pockets.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();});
    balls.forEach(b=>{
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.fillStyle=b.color;ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1;ctx.stroke();
      // Shine
      ctx.beginPath();ctx.arc(b.x-3,b.y-3,3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.4)';ctx.fill();
    });
    // Cue ball
    ctx.beginPath();ctx.arc(cueBall.x,cueBall.y,cueBall.r,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();ctx.arc(cueBall.x-3,cueBall.y-3,3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.6)';ctx.fill();
    // Aim line
    if(isAiming&&startX&&startY){
      ctx.beginPath();ctx.moveTo(cueBall.x,cueBall.y);ctx.lineTo(startX,startY);
      ctx.strokeStyle='rgba(255,255,0,.6)';ctx.lineWidth=2;ctx.setLineDash([5,5]);ctx.stroke();ctx.setLineDash([]);
    }
  }

  function loop(){
    moveBall(cueBall);
    balls.forEach(b=>moveBall(b));
    balls.forEach(b=>collide(cueBall,b));
    for(let i=0;i<balls.length;i++) for(let j=i+1;j<balls.length;j++) collide(balls[i],balls[j]);
    // Pockets
    pockets.forEach(p=>{
      if(Math.hypot(cueBall.x-p.x,cueBall.y-p.y)<p.r){cueBall.x=200;cueBall.y=200;cueBall.vx=0;cueBall.vy=0;cueBall.moving=false;score=Math.max(0,score-50);document.getElementById('score').textContent=score;}
      balls=balls.filter(b=>{if(Math.hypot(b.x-p.x,b.y-p.y)<p.r){score+=100;document.getElementById('score').textContent=score;document.getElementById('ballCount').textContent=balls.length-1;return false;}return true;});
    });
    draw();
    if(!gameOver) requestAnimationFrame(loop);
  }

  init();loop();
});
</script>
</body>
</html>
