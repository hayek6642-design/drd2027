<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#fff;font-family:Arial,sans-serif}
h1{margin-bottom:8px;font-size:1.4rem}
#info{display:flex;gap:20px;margin-bottom:8px;font-size:1rem;color:#f39c12}
canvas{border:2px solid #333;border-radius:4px;background:#111}
#msg{margin-top:10px;font-size:1.1rem;min-height:1.5rem;color:#2ecc71}
.hint{font-size:.75rem;opacity:.5;margin-top:6px}
</style>
</head>
<body>
<h1>🐍 Snake</h1>
<div id="info">
  <span>Score: <strong id="score">0</strong></span>
  <span>Best: <strong id="best">0</strong></span>
</div>
<canvas id="c" width="400" height="400"></canvas>
<div id="msg">Press any arrow key or tap to start</div>
<div class="hint">Arrow keys / WASD to move · Mobile: swipe</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const GRID=20,COLS=20,ROWS=20;
let snake,dir,nextDir,food,score,best=0,running=false,loop;
function init(){
  snake=[{x:10,y:10}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;
  placeFood();
  document.getElementById('score').textContent=0;
  if(!running){running=true;loop=setInterval(tick,130);}
}
function placeFood(){
  do{food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}
function tick(){
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
    gameOver();return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10;best=Math.max(best,score);
    document.getElementById('score').textContent=score;
    document.getElementById('best').textContent=best;
    placeFood();
  } else {snake.pop();}
  draw();
}
function gameOver(){
  clearInterval(loop);running=false;
  document.getElementById('msg').textContent='Game Over! Press arrow/swipe to restart';
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,400,400);
  ctx.fillStyle='#e74c3c';ctx.font='bold 28px Arial';ctx.textAlign='center';
  ctx.fillText('GAME OVER',200,180);
  ctx.fillStyle='#fff';ctx.font='18px Arial';
  ctx.fillText('Score: '+score,200,220);
}
function draw(){
  ctx.fillStyle='#111';ctx.fillRect(0,0,400,400);
  ctx.fillStyle='#c0392b';ctx.fillRect(food.x*GRID,food.y*GRID,GRID-1,GRID-1);
  snake.forEach((s,i)=>{ctx.fillStyle=i===0?'#2ecc71':'#27ae60';ctx.fillRect(s.x*GRID,s.y*GRID,GRID-1,GRID-1);});
}
document.addEventListener('keydown',e=>{
  const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
             w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
  const nd=map[e.key];
  if(!nd)return;
  e.preventDefault();
  if(nd.x===-dir.x&&nd.y===-dir.y)return;
  nextDir=nd;
  if(!running)init();
});
let tx,ty;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<10&&Math.abs(dy)<10){if(!running)init();return;}
  let nd;
  if(Math.abs(dx)>Math.abs(dy)){nd=dx>0?{x:1,y:0}:{x:-1,y:0};}
  else{nd=dy>0?{x:0,y:1}:{x:0,y:-1};}
  if(nd.x===-dir.x&&nd.y===-dir.y)return;
  nextDir=nd;
  if(!running)init();
},{passive:true});
draw();
</script>
</body>
</html>
