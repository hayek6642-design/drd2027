<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billiard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#fff;font-family:Arial,sans-serif;padding:10px}
h1{margin-bottom:8px;font-size:1.4rem}
#scoreboard{margin-bottom:8px;font-size:1.1rem;color:#f39c12}
#billiards-canvas{border:4px solid #8B4513;border-radius:4px;max-width:100%;height:auto}
.hint{margin-top:8px;font-size:.8rem;opacity:.6}
</style>
</head>
<body>
<h1>🎱 Billiard</h1>
<div id="scoreboard">Score: <span id="score">0</span></div>
<canvas id="billiards-canvas"></canvas>
<p class="hint">Click near the white ball and drag to aim &amp; shoot</p>
<script src="../../../js/billiards.js"></script>
</body>
</html>
