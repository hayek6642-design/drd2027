<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samma3ny - Music Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f0f0f; color: white; font-family: system-ui; }
        
        .auth-wall {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0f0f; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .auth-wall h2 { margin-bottom: 20px; color: #00d4ff; }
        .auth-wall button {
            padding: 15px 40px; background: linear-gradient(135deg, #00d4ff, #8a2be2);
            border: none; color: white; border-radius: 10px; cursor: pointer; font-size: 16px;
        }
        
        #main-ui { display: none; padding: 20px; }
        #main-ui.active { display: block; }
        
        h1 { margin: 20px 0; background: linear-gradient(135deg, #00d4ff, #8a2be2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .player {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .balance { font-size: 1.2em; margin: 20px 0; }
        .balance span { color: #00d4ff; font-weight: bold; }
        
        .controls {
            display: flex; gap: 10px; margin-top: 15px;
        }
        
        button {
            padding: 10px 20px; background: rgba(0,212,255,0.2); border: 1px solid #00d4ff;
            color: #00d4ff; border-radius: 8px; cursor: pointer; transition: all 0.3s;
        }
        
        button:hover {
            background: #00d4ff; color: #0f0f0f;
        }
    </style>
</head>
<body>
    <div id="auth-wall" class="auth-wall">
        <h2>🔒 Sign In to Samma3ny</h2>
        <button onclick="goToLogin()">Go to Login</button>
    </div>
    
    <div id="main-ui">
        <h1>🎵 Samma3ny - Music</h1>
        
        <div class="balance">
            Your Codes: <span id="code-balance">0</span>
        </div>
        
        <div class="player">
            <h2>Now Playing</h2>
            <div id="current-track" style="color: #aaa; margin: 20px 0;">Select a song...</div>
            <div class="controls">
                <button onclick="playMusic()">▶️ Play</button>
                <button onclick="pauseMusic()">⏸ Pause</button>
                <button onclick="toggleAutoMode()">🔄 Auto Mode</button>
            </div>
        </div>
        
        <div id="playlist" style="margin-top: 20px;"></div>
    </div>

    <script src="../shared/js/auth-client.js"></script>
    <script>
        function goToLogin() {
            window.location.href = '/login.html?redirect=' + encodeURIComponent('/codebank/samma3ny.html');
        }
        
        function initUI(user, assets) {
            document.getElementById('auth-wall').style.display = 'none';
            document.getElementById('main-ui').classList.add('active');
            updateBalance(assets);
            console.log('[Samma3ny] Ready for', user.email);
        }
        
        function updateBalance(assets) {
            const codes = assets?.codes?.length || 0;
            document.getElementById('code-balance').textContent = codes;
        }
        
        function playMusic() {
            alert('▶️ Playing music...');
        }
        
        function pauseMusic() {
            alert('⏸ Music paused');
        }
        
        async function toggleAutoMode() {
            const result = await window.AuthClient.transaction('code', 'spend', 1, 'samma3ny', {
                feature: 'auto_mode'
            });
            
            if (result.success) {
                alert('✅ Auto mode activated!');
                const assets = window.AuthClient.getAssets();
                updateBalance(assets);
            } else {
                alert('❌ Not enough codes!');
            }
        }
        
        window.AuthClient.on('auth:changed', (state) => {
            if (state.authenticated && state.assets) {
                initUI(state.user, state.assets);
            } else if (!state.authenticated && !state.loading) {
                document.getElementById('auth-wall').style.display = 'flex';
            }
        });
        
        setTimeout(() => {
            if (window.AuthClient.isAuth()) {
                initUI(window.AuthClient.getUser(), window.AuthClient.getAssets());
            }
        }, 500);
    </script>
</body>
</html>
