<!-- Enhanced JavaScript Functions -->
<script>
/**
 * Load interior assets with transfer source information
 */
function loadInteriorAssets() {
  let codes = 0,
    silver = 0,
    gold = 0;
  let assets = { codes: [], silver: [], gold: [] };

  try {
    // Get assets from parent app state or local storage
    const state =
      window.AppState ||
      window.parent?.AppState ||
      window.parent?.parent?.AppState ||
      {};

    if (state.assets) {
      assets = state.assets;
      codes = assets.codes?.length || 0;
      silver = assets.silver?.length || 0;
      gold = assets.gold?.length || 0;
    }

    // Store for transfer history
    window.__assetsList = assets;
  } catch (_) {}

  // Animate numbers counting up
  animCount($("int-codes"), 0, codes, 600);
  animCount($("int-silver"), 0, silver, 800);
  animCount($("int-gold"), 0, gold, 1000);

  // Calculate transfer stats
  updateTransferStats(assets);
}

/**
 * Update transfer source statistics
 */
function updateTransferStats(assets) {
  let stats = { self: 0, user_transfer: 0, admin_transfer: 0 };

  // Count assets by source
  ["codes", "silver", "gold"].forEach((type) => {
    (assets[type] || []).forEach((asset) => {
      const source = asset.source_type || "self";
      stats[source] = (stats[source] || 0) + 1;
    });
  });

  // Update display
  $("stat-self").textContent = stats.self || 0;
  $("stat-user").textContent = stats.user_transfer || 0;
  $("stat-admin").textContent = stats.admin_transfer || 0;
}

/**
 * Open transfer history modal with formatted data
 */
function openTransferHistory() {
  const modal = $("transfer-history-modal");
  const content = $("history-content");

  // Simulate loading history (in production, fetch from server)
  const history = [
    {
      asset_id: "code-123",
      asset_type: "code",
      from_email: "alice@example.com",
      to_email: "you@example.com",
      transfer_type: "user",
      transferred_at: "2026-04-10T14:23:00Z",
      message: "Shared security snippet",
    },
    {
      asset_id: "gold-001",
      asset_type: "gold",
      from_email: "admin@company.com",
      to_email: "you@example.com",
      transfer_type: "admin",
      transferred_at: "2026-04-09T09:15:00Z",
      message: "Monthly rewards",
    },
  ];

  if (history.length === 0) {
    content.innerHTML =
      '<div style="text-align:center; color:rgba(255,255,255,0.3); padding:20px;">No transfers recorded</div>';
  } else {
    content.innerHTML = history
      .map((h) => {
        const isReceived = true; // Assuming current user is recipient
        const fromEmail = h.from_email.split("@")[0];
        const toEmail = h.to_email.split("@")[0];
        const date = new Date(h.transferred_at).toLocaleDateString();

        return `
        <div class="history-item ${isReceived ? "received" : "sent"}">
          <div class="history-from-to">
            <span>${fromEmail}</span>
            <span class="history-arrow">${isReceived ? "→" : "←"}</span>
            <span>${toEmail}</span>
          </div>
          <div style="color:rgba(255,255,255,0.5); margin-bottom:4px;">
            📦 ${h.asset_type.toUpperCase()} 
            <span style="color:${h.transfer_type === "admin" ? "#ff4444" : "#ff9930"};">
              [${h.transfer_type.toUpperCase()}]
            </span>
          </div>
          ${h.message ? `<div style="color:rgba(255,255,255,0.4); font-style:italic;">"${h.message}"</div>` : ""}
          <div class="history-time">${date}</div>
        </div>
      `;
      })
      .join("");
  }

  modal.classList.add("open");
}

function closeTransferHistory() {
  const modal = $("transfer-history-modal");
  modal.classList.remove("open");
}

// Event listeners
$("btn-view-history").addEventListener("click", openTransferHistory);
$("btn-close-history").addEventListener("click", closeTransferHistory);

// Modal close on overlay click
$("transfer-history-modal").addEventListener("click", (e) => {
  if (e.target.id === "transfer-history-modal") {
    closeTransferHistory();
  }
});

// Update display when vault opens
const originalOpenVault = openVault;
openVault = function () {
  originalOpenVault.call(this);
  loadInteriorAssets();
};
</script>
