<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Auth Bridge - MUST be first script in iframe -->
    <script src="/shared/iframe-auth-client.js?v=2"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battalooda - Voice Talent Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #e74c3c;
            --secondary-color: #f39c12;
            --accent-color: #3498db;
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-color: #f8fafc;
            --backdrop-filter: blur(12px);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Loading Screen */
        #battalooda-loading {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 20px; z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        #battalooda-loading.hidden { opacity: 0; visibility: hidden; }
        .spinner { 
            width: 60px; height: 60px; 
            border: 4px solid rgba(255,255,255,0.1); 
            border-top-color: var(--primary-color); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Main App Layout */
        #battalooda-app {
            display: flex;
            flex-direction: column;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #battalooda-app.ready { opacity: 1; }

        .header {
            padding: 1.5rem 2rem;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: var(--backdrop-filter);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(231, 76, 60, 0.3);
        }

        .category-nav {
            display: flex;
            gap: 0.75rem;
        }

        .category-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .category-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }

        .main-feed {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* Voice Card Styles */
        .voice-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        .voice-card:hover { border-color: var(--primary-color); transform: translateY(-2px); }

        /* Control Bar */
        .control-bar {
            background: rgba(15, 23, 42, 0.95);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            backdrop-filter: var(--backdrop-filter);
        }

        .record-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center;
        }
        .live-record-btn { background: var(--primary-color); color: white; animation: pulse 2s infinite; }
        .music-record-btn { background: var(--secondary-color); color: white; margin-left: 1rem; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        /* Modals */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #1a1a2e; border: 1px solid var(--border-color);
            border-radius: 24px; padding: 2rem; width: 90%; max-width: 600px;
        }

        .hidden { display: none !important; }
    

/* ===== MOBILE RESPONSIVENESS ===== */
@media (max-width: 1023px) {
    .container, .wrapper, .main-container {
        max-width: 100%;
    }
    
    /* Grid layouts to single column */
    [style*="grid-template-columns: 1fr 1fr"],
    [style*="grid-template-columns: repeat(2"],
    [style*="grid-template-columns: repeat(3"] {
        grid-template-columns: 1fr !important;
    }
}

@media (max-width: 767px) {
    * {
        max-width: 100%;
    }
    
    body {
        font-size: 13px;
        padding: 8px;
    }
    
    h1 { font-size: 20px !important; }
    h2 { font-size: 16px !important; }
    h3 { font-size: 14px !important; }
    p { font-size: 12px !important; }
    
    /* Flex layouts */
    [style*="flex-direction: row"],
    .flex-row,
    .horizontal {
        flex-direction: column !important;
    }
    
    /* Grid responsive */
    [style*="display: grid"] {
        grid-template-columns: 1fr !important;
    }
    
    .grid-2, .grid-3, .grid-4 {
        grid-template-columns: 1fr !important;
        gap: 12px !important;
    }
    
    /* Padding & Margin */
    [style*="padding"] {
        padding: 8px !important;
    }
    
    /* Buttons & Inputs */
    button, input, select, textarea {
        min-height: 44px !important;
        padding: 10px 12px !important;
        font-size: 14px !important;
        width: 100%;
    }
    
    /* Cards */
    .card, .item, .box, [class*="card"] {
        padding: 12px !important;
        margin-bottom: 8px !important;
    }
    
    /* Images */
    img {
        max-width: 100% !important;
        height: auto !important;
    }
    
    /* Tables */
    table {
        font-size: 11px !important;
    }
    
    th, td {
        padding: 6px 4px !important;
    }
    
    /* Hide nav arrows, use native navigation */
    .nav-arrow, .navigation-arrow, [class*="nav-arrow"] {
        display: none;
    }
}

@media (max-width: 480px) {
    h1 { font-size: 16px !important; }
    h2 { font-size: 14px !important; }
    h3 { font-size: 12px !important; }
    p { font-size: 11px !important; }
    
    button, input, select, textarea {
        min-height: 40px !important;
        padding: 8px 10px !important;
        font-size: 12px !important;
    }
}

</style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="battalooda-loading">
        <div class="spinner"></div>
        <p>Welcome to Battalooda... (Arab's got Talent)</p>
    </div>

    <!-- App Shell -->
    <div id="battalooda-app">
        <header class="header">
            <h1 class="logo">🎤 Battalooda</h1>
            <nav class="category-nav">
                <button class="category-btn active" data-category="all">All</button>
                <button class="category-btn" data-category="quran">Quran</button>
                <button class="category-btn" data-category="singing">Singing</button>
            </nav>
            <div class="user-profile" style="display: flex; align-items: center; gap: 10px;">
                <span id="userName">Guest</span>
                <div id="userAvatar" style="width: 35px; height: 35px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center;">👤</div>
            </div>
        </header>

        <main class="main-feed" id="mainFeed">
            <div class="loading" id="loadingIndicator">
                <div class="spinner" style="width: 40px; height: 40px; margin: 20px auto;"></div>
            </div>
        </main>

        <div class="control-bar">
            <button class="category-btn" id="studioBtn">🎛️ Studio</button>
            <div style="display: flex;">
                <button class="record-btn live-record-btn" id="liveRecordBtn">🎙️</button>
                <button class="record-btn music-record-btn" id="musicRecordBtn">🎵</button>
            </div>
            <button class="category-btn" id="baseBtn">Base</button>
        </div>
    </div>

    <!-- Modals (Simplified for structural integrity) -->
    <div class="modal-overlay" id="musicLibraryModal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h2>Music Library</h2>
                <button id="closeMusicModal" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div class="search-bar" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="musicSearch" placeholder="Search tracks..." style="flex: 1; padding: 10px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white;">
                <button id="searchBtn" style="padding: 10px 20px; background: var(--accent-color); border: none; border-radius: 8px; color: white;">Search</button>
            </div>
            <div id="musicGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-height: 300px; overflow-y: auto;"></div>
        </div>
    </div>

    <!-- Recording Interface -->
    <div class="modal-overlay" id="recordingOverlay" style="background: rgba(0,0,0,0.95);">
        <div class="modal-content" style="text-align: center;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <button id="stopRecordingBtn" class="category-btn">Cancel</button>
                <div id="recordingTimer" style="font-size: 2.5rem; font-weight: bold; color: var(--primary-color);">00:00</div>
                <div style="color: var(--primary-color); display: flex; align-items: center; gap: 5px;">
                    <div style="width: 10px; height: 10px; background: var(--primary-color); border-radius: 50%; animation: pulse 1s infinite;"></div>
                    REC
                </div>
            </div>
            <div id="audioVisualizer" style="height: 150px; background: rgba(0,0,0,0.3); border-radius: 12px; margin-bottom: 30px;">
                <canvas id="visualizerCanvas" style="width: 100%; height: 100%;"></canvas>
            </div>
            <button id="stopBtn" class="record-btn live-record-btn" style="margin: 0 auto; width: 80px; height: 80px;">⏹️</button>
        </div>
    </div>

    <!-- Preview Modal -->
    <div class="modal-overlay" id="previewModal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h2>Preview Recording</h2>
                <button id="closePreviewModal" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                <div style="margin-bottom: 10px;">
                    <label>Vocal Level</label>
                    <input type="range" id="vocalLevel" min="0" max="100" value="80" style="width: 100%;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Music Level</label>
                    <input type="range" id="musicLevel" min="0" max="100" value="30" style="width: 100%;">
                </div>
                <audio id="previewAudio" controls style="width: 100%;"></audio>
            </div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="reRecordBtn" class="category-btn">Re-record</button>
                <button id="uploadBtn" class="category-btn active">Upload</button>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h2>Upload Talent</h2>
                <button id="closeUploadModal" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px;">Select Category</label>
                <select id="uploadCategory" style="width: 100%; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--border-color);">
                    <option value="singing">Singing</option>
                    <option value="quran">Quran</option>
                    <option value="christian">Christian</option>
                </select>
            </div>
            <div id="musicInfoGroup" class="hidden" style="margin-bottom: 20px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                <div id="musicInfoDisplay"></div>
            </div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="cancelUploadBtn" class="category-btn">Cancel</button>
                <button id="confirmUploadBtn" class="category-btn active">Confirm & Post</button>
            </div>
        </div>
    </div>

    <!-- Assets Service Bridge -->
    <script src="/shared/assets-service-bridge.js"></script>
    <!-- Authentication Proxy -->
    <script src="/shared/auth-proxy.js"></script>

    <!-- Scripts -->
    <script src="/codebank/battalooda/js/audio-engine.js"></script>
    <script src="/codebank/battalooda/js/music-library.js"></script>
    <script src="/codebank/battalooda/js/social-features.js"></script>
    <script src="/codebank/battalooda/security/audio-analyzer.js"></script>
    <script src="/codebank/battalooda/security/challenge-system.js"></script>
    <script src="/codebank/battalooda/security/mobile-sensors.js"></script>
    <script src="/codebank/battalooda/security/security-engine.js"></script>
    <script src="/codebank/battalooda/js/battalooda-core.js"></script>

    <script>
        window.addEventListener('load', () => {
            console.log('🚀 Battalooda scripts loaded, starting engine...');
            
            // Wait a tiny bit for all classes to be available in global scope
            setTimeout(() => {
                if (typeof BattaloodaApp !== 'undefined') {
                    window.battaloodaApp = new BattaloodaApp();
                    document.getElementById('battalooda-app').classList.add('ready');
                } else {
                    console.error('CRITICAL: BattaloodaApp class missing!');
                    // Brute force recovery
                    document.getElementById('battalooda-loading').style.display = 'none';
                    document.getElementById('battalooda-app').style.opacity = '1';
                }
            }, 100);
        });
    </script>
</body>
</html>
