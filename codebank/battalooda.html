<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Battalooda - Games Centre</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: system-ui; padding: 20px; }
        .login-prompt { display: none; text-align: center; padding: 100px; }
        .game-lobby { display: none; }
        h1 { background: linear-gradient(135deg, #00d4ff, #8a2be2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .balance { margin: 20px 0; font-size: 1.1em; }
        .balance span { color: #00d4ff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loading" style="text-align: center; padding: 50px;">Loading Battalooda...</div>
    
    <div id="login-prompt">
        <h2>🔒 Sign In to Play</h2>
        <a href="/login.html?redirect=/codebank/battalooda.html" style="color: #00d4ff; text-decoration: underline;">Click here to sign in</a>
    </div>
    
    <div id="game-lobby">
        <h1>⚔️ Battalooda Games</h1>
        <div class="balance">
            Codes: <span id="game-codes">0</span> | Silver: <span id="game-silver">0</span>
        </div>
        <div id="games-list">
            <p style="color: #888;">Games loading...</p>
        </div>
    </div>

    <script src="../shared/js/auth-client.js"></script>
    <script>
        window.AuthClient.on('auth:changed', (state) => {
            document.getElementById('loading').style.display = 'none';
            
            if (!state.authenticated) {
                document.getElementById('login-prompt').style.display = 'block';
                document.getElementById('game-lobby').style.display = 'none';
                return;
            }
            
            document.getElementById('login-prompt').style.display = 'none';
            document.getElementById('game-lobby').style.display = 'block';
            
            const assets = state.assets || {};
            document.getElementById('game-codes').textContent = assets.codes?.length || 0;
            document.getElementById('game-silver').textContent = assets.silver?.reduce((a,b) => a + b.amount, 0) || 0;
        });
    </script>
</body>
</html>
