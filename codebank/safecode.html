<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Assets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CRITICAL: Asset receiver MUST be first script -->
    <script>
        // SafeCode iframe asset receiver
        (function() {
            'use strict';
            
            window.AppState = { 
                assets: { codes: [], silver: [], gold: [] },
                user: null,
                loaded: false
            };
            
            window.addEventListener('message', function(e) {
                console.log('[SafeCode] Message received:', e.data?.type);
                
                if (e.data?.type === 'parent:assets-init' || e.data?.assets) {
                    window.AppState.assets = e.data.assets || { codes: [], silver: [], gold: [] };
                    window.AppState.user = e.data.user;
                    window.AppState.loaded = true;
                    
                    // Hide loading, show content
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('asset-container').style.display = 'block';
                    
                    // Dispatch ready event
                    window.dispatchEvent(new CustomEvent('safe-assets-ready', { 
                        detail: window.AppState.assets 
                    }));
                    
                    console.log('[SafeCode] Assets loaded:', window.AppState.assets);
                }
            });
            
            // Request assets after 1 second if not received (backup)
            setTimeout(function() {
                if (!window.AppState.loaded && window.parent !== window) {
                    console.log('[SafeCode] Requesting assets from parent...');
                    window.parent.postMessage({ type: 'safecode:request-assets' }, '*');
                }
            }, 1000);
        })();
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0f0f0f; 
            color: #fff; 
            font-family: system-ui, -apple-system, sans-serif; 
            height: 100vh; 
            overflow: hidden;
        }
        #loading { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            flex-direction: column; 
            gap: 20px; 
        }
        .spinner { 
            width: 50px; 
            height: 50px; 
            border: 3px solid #333; 
            border-top-color: #00d4ff; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #asset-container { 
            width: 100%; 
            height: 100vh; 
            overflow-y: auto; 
            padding: 20px; 
            display: none; 
        }
        .error-box {
            background: #ff4757;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading Safe Assets...</p>
    </div>
    <div id="asset-container">
        <!-- Assets will render here -->
    </div>
    
    <!-- Your existing safe-asset-list.js -->
    <script src="js/safe-asset-list.js"></script>
</body>
</html>
