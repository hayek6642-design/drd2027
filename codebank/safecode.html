<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeCode - Asset Storage & Transfer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #fff; 
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            gap: 20px;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #error {
            display: none;
            background: rgba(255,71,87,0.1);
            border: 1px solid #ff4757;
            color: #ff6b7a;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }
        #error button {
            margin-top: 20px;
            padding: 12px 30px;
            background: #ff4757;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        
        #assets-container {
            display: none;
        }
        
        h1 {
            margin: 30px 0 40px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #00d4ff, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .section {
            margin-bottom: 40px;
        }
        
        .section h2 {
            font-size: 1.3em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .asset-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            flex-wrap: wrap;
        }
        
        .asset-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(0,212,255,0.4);
            transform: translateX(5px);
        }
        
        .asset-info {
            flex: 1;
            min-width: 200px;
        }
        
        .asset-label { color: #aaa; }
        .asset-value { 
            color: #00d4ff;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .empty-state {
            color: #666;
            font-style: italic;
            padding: 20px;
            text-align: center;
        }
        
        .badge {
            display: inline-block;
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            margin-left: 10px;
        }
        
        .send-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #00d4ff, #00a8cc);
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85em;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .send-btn:hover {
            background: linear-gradient(135deg, #00a8cc, #0088aa);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,212,255,0.3);
        }
        
        #transferModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        
        #transferModal.show {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0,212,255,0.2);
        }
        
        .modal-content h2 {
            margin-bottom: 20px;
            color: #00d4ff;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9em;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0,212,255,0.1);
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn-send {
            background: linear-gradient(135deg, #00d4ff, #00a8cc);
            color: white;
        }
        
        .btn-send:hover {
            background: linear-gradient(135deg, #00a8cc, #0088aa);
        }
        
        .btn-cancel {
            background: rgba(255,255,255,0.1);
            color: #aaa;
        }
        
        .btn-cancel:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }
        
        .modal-error {
            background: rgba(255,71,87,0.1);
            border: 1px solid #ff4757;
            color: #ff6b7a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        
        .modal-error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <p style="font-size: 1.1em;">Loading Safe Assets...</p>
        </div>
        
        <div id="error">
            <h2>🔒 Authentication Required</h2>
            <p>Please sign in to access your assets</p>
            <button onclick="goToLogin()">Go to Login</button>
        </div>
        
        <div id="assets-container">
            <h1>🔐 Safe Assets</h1>
            
            <div class="section">
                <h2>
                    💳 Codes
                    <span class="badge" id="codes-count">0</span>
                </h2>
                <div id="codes-list"></div>
                <button class="send-btn" onclick="openTransferModal('codes')">📤 Send Codes</button>
            </div>
            
            <div class="section">
                <h2>
                    🪙 Silver
                    <span class="badge" id="silver-count">0</span>
                </h2>
                <div id="silver-list"></div>
                <button class="send-btn" onclick="openTransferModal('silver')">📤 Send Silver</button>
            </div>
            
            <div class="section">
                <h2>
                    👑 Gold
                    <span class="badge" id="gold-count">0</span>
                </h2>
                <div id="gold-list"></div>
                <button class="send-btn" onclick="openTransferModal('gold')">📤 Send Gold</button>
            </div>
        </div>
    </div>
    
    <!-- Transfer Modal -->
    <div id="transferModal">
        <div class="modal-content">
            <h2>📤 Send Assets</h2>
            <div class="modal-error" id="modalError"></div>
            <div class="form-group">
                <label>Recipient Email</label>
                <input type="email" id="recipientEmail" placeholder="user@example.com">
            </div>
            <div class="form-group">
                <label id="amountLabel">Amount</label>
                <input type="number" id="transferAmount" placeholder="1" min="1">
            </div>
            <div class="modal-buttons">
                <button class="btn-send" onclick="submitTransfer()">Send Now</button>
                <button class="btn-cancel" onclick="closeTransferModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="../shared/js/auth-client.js"></script>
    <script>
        let currentAssetType = null;
        
        function goToLogin() {
            window.location.href = '/login.html?redirect=' + encodeURIComponent('/codebank/safecode.html');
        }
        
        function openTransferModal(assetType) {
            currentAssetType = assetType;
            const assets = window.AuthClient.getAssets();
            let count = 0;
            
            if (assetType === 'codes') {
                count = assets?.codes?.length || 0;
                document.getElementById('amountLabel').textContent = 'How many codes?';
            } else if (assetType === 'silver') {
                count = assets?.silver?.length || 0;
                document.getElementById('amountLabel').textContent = 'How much silver?';
            } else if (assetType === 'gold') {
                count = assets?.gold?.length || 0;
                document.getElementById('amountLabel').textContent = 'How much gold?';
            }
            
            if (count === 0) {
                document.getElementById('modalError').textContent = `❌ You have no ${assetType} to send!`;
                document.getElementById('modalError').classList.add('show');
                setTimeout(() => {
                    document.getElementById('modalError').classList.remove('show');
                }, 3000);
                return;
            }
            
            document.getElementById('transferAmount').max = count;
            document.getElementById('transferAmount').value = '1';
            document.getElementById('recipientEmail').value = '';
            document.getElementById('modalError').classList.remove('show');
            document.getElementById('transferModal').classList.add('show');
        }
        
        function closeTransferModal() {
            document.getElementById('transferModal').classList.remove('show');
            currentAssetType = null;
        }
        
        async function submitTransfer() {
            const email = document.getElementById('recipientEmail').value.trim();
            const amount = parseInt(document.getElementById('transferAmount').value, 10);
            
            if (!email) {
                showModalError('❌ Please enter recipient email');
                return;
            }
            
            if (!email.includes('@')) {
                showModalError('❌ Invalid email format');
                return;
            }
            
            if (amount < 1) {
                showModalError('❌ Amount must be at least 1');
                return;
            }
            
            if (email === window.AuthClient.getEmail()) {
                showModalError('❌ Cannot send to yourself');
                return;
            }
            
            try {
                const sendBtn = event.target;
                sendBtn.disabled = true;
                sendBtn.textContent = '⏳ Sending...';
                
                const result = await window.AuthClient.transfer(email, currentAssetType, amount);
                
                if (result.success) {
                    showModalError(`✅ Sent ${amount} ${currentAssetType}(s) to ${email}!`, true);
                    setTimeout(() => {
                        closeTransferModal();
                        renderAssets(window.AuthClient.getAssets());
                    }, 1500);
                } else {
                    showModalError(`❌ Transfer failed: ${result.error || 'Unknown error'}`);
                    sendBtn.disabled = false;
                    sendBtn.textContent = 'Send Now';
                }
            } catch (err) {
                showModalError(`❌ Error: ${err.message}`);
                event.target.disabled = false;
                event.target.textContent = 'Send Now';
            }
        }
        
        function showModalError(message, isSuccess = false) {
            const errorEl = document.getElementById('modalError');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            if (isSuccess) {
                errorEl.style.background = 'rgba(0,212,255,0.1)';
                errorEl.style.borderColor = '#00d4ff';
                errorEl.style.color = '#00d4ff';
            } else {
                errorEl.style.background = 'rgba(255,71,87,0.1)';
                errorEl.style.borderColor = '#ff4757';
                errorEl.style.color = '#ff6b7a';
            }
        }
        
        function renderAssets(assets) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('assets-container').style.display = 'block';
            
            // Codes
            const codes = assets?.codes || [];
            document.getElementById('codes-count').textContent = codes.length;
            document.getElementById('codes-list').innerHTML = codes.length > 0
                ? codes.map(c => `
                    <div class="asset-card">
                        <div class="asset-info">
                            <span class="asset-label">${c.code || 'Code'}</span>
                            <div class="asset-value">${c.value || 'N/A'}</div>
                        </div>
                    </div>
                `).join('')
                : '<div class="empty-state">No codes in storage</div>';
            
            // Silver
            const silver = assets?.silver || [];
            document.getElementById('silver-count').textContent = silver.length;
            document.getElementById('silver-list').innerHTML = silver.length > 0
                ? silver.map(s => `
                    <div class="asset-card">
                        <div class="asset-info">
                            <span class="asset-label">Silver Stack</span>
                            <div class="asset-value">${s.amount || 0} SLVR</div>
                        </div>
                    </div>
                `).join('')
                : '<div class="empty-state">No silver in storage</div>';
            
            // Gold
            const gold = assets?.gold || [];
            document.getElementById('gold-count').textContent = gold.length;
            document.getElementById('gold-list').innerHTML = gold.length > 0
                ? gold.map(g => `
                    <div class="asset-card">
                        <div class="asset-info">
                            <span class="asset-label">Gold Reserve</span>
                            <div class="asset-value">${g.amount || 0} GOLD</div>
                        </div>
                    </div>
                `).join('')
                : '<div class="empty-state">No gold in storage</div>';
        }
        
        // Listen for silver awards from auto-mode
        window.AuthClient.on('silver:awarded', (data) => {
            console.log('[SafeCode] 🎉 Silver awarded!', data);
            if (window.AuthClient.isAuth()) {
                renderAssets(window.AuthClient.getAssets());
            }
            const notification = document.createElement('div');
            notification.innerHTML = `
                <div style="position: fixed; top: 20px; right: 20px; background: linear-gradient(135deg, #FFD700, #FFA500); 
                    color: #333; padding: 20px; border-radius: 10px; font-weight: bold; z-index: 9999; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
                    🎉 You earned ${data.amount} Silver! (Total: ${data.totalAwards})
                </div>
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 4000);
        });
        
        // Listen for auth changes
        window.AuthClient.on('auth:changed', (state) => {
            if (state.authenticated && state.assets) {
                renderAssets(state.assets);
            } else if (!state.authenticated && !state.loading) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            }
        });
        
        // Check immediately in case event already fired
        setTimeout(() => {
            if (window.AuthClient.isAuth() && window.AuthClient.getAssets()) {
                renderAssets(window.AuthClient.getAssets());
            }
        }, 800);
    </script>
</body>
</html>
