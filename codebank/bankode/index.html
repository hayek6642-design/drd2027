<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bankode Dashboard - CodeBank Core</title>

  <!-- Styles & icons -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./dashboard.css">
  <link rel="stylesheet" href="./safe/bankode-safe.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <script>
    window.CODEBANK_TRUSTED_USER_ID = (window.opener && window.opener.CODEBANK_TRUSTED_USER_ID) || (window.parent && window.parent.CODEBANK_TRUSTED_USER_ID) || null;
    window.CODEBANK_TRUSTED_USER_EMAIL = (window.opener && window.opener.CODEBANK_TRUSTED_USER_EMAIL) || (window.parent && window.parent.CODEBANK_TRUSTED_USER_EMAIL) || null;
    
    // Inherit AssetBus from parent if in iframe
    if (window !== window.parent && window.parent.AssetBus) {
        window.AssetBus = window.parent.AssetBus;
    }

    // 🔧 FIX: Update trusted user ID when auth state changes (re-login)
    window.addEventListener('auth:ready', function(e) {
        if (e.detail && e.detail.authenticated && e.detail.userId) {
            window.CODEBANK_TRUSTED_USER_ID = e.detail.userId;
            window.CODEBANK_TRUSTED_USER_EMAIL = e.detail.user?.email || null;
            console.log('[Bankode] Updated CODEBANK_TRUSTED_USER_ID from auth:ready:', e.detail.userId);
            if (window.BankodeDashboard && window.BankodeDashboard.init) {
                window.BankodeDashboard.init();
            }
            // Also refresh RPC instance's supabase ref
            if (window.BankodeRPC) {
                window.BankodeRPC.supabase = window.supabase;
            }
        }
    });
    window.addEventListener('auth:changed', function(e) {
        if (e.detail && e.detail.authenticated && e.detail.userId) {
            window.CODEBANK_TRUSTED_USER_ID = e.detail.userId;
            window.CODEBANK_TRUSTED_USER_EMAIL = e.detail.user?.email || null;
            console.log('[Bankode] Updated CODEBANK_TRUSTED_USER_ID from auth:changed:', e.detail.userId);
            if (window.BankodeDashboard && window.BankodeDashboard.init) {
                window.BankodeDashboard.init();
            }
        }
    });
    // Listen for AUTH_SYNC postMessage from parent iframe
    window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'AUTH_SYNC' && event.data.authenticated && event.data.userId) {
            window.CODEBANK_TRUSTED_USER_ID = event.data.userId;
            window.CODEBANK_TRUSTED_USER_EMAIL = event.data.user?.email || null;
            console.log('[Bankode] Updated CODEBANK_TRUSTED_USER_ID from AUTH_SYNC postMessage:', event.data.userId);
            if (window.BankodeDashboard && window.BankodeDashboard.init) {
                window.BankodeDashboard.init();
            }
        }
    });

    // 🛡️ Prevent auto-close
    window.onbeforeunload = function(e) {
        console.log('[SafeCode] Blocked unload attempt');
        return false;
    };

    // 🛡️ Signal parent when ready
    window.addEventListener('DOMContentLoaded', function() {
        if (window.parent !== window) {
            setTimeout(() => {
                console.log('[SafeCode] Signaling ready to parent');
                window.parent.postMessage({ type: 'safe-code-ready' }, '*');
            }, 500);
        }
    });
  </script>

  <!-- bcrypt (used by safe) -->
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
  <div class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 px-4 py-3">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-3">
          <i class="fas fa-university text-2xl text-blue-400"></i>
          <h1 class="text-xl font-bold">Bankode Dashboard</h1>
        </div>
        <div class="flex items-center space-x-4"></div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col lg:flex-row">
      <!-- Sidebar -->
      <aside class="w-full lg:w-64 bg-gray-800 border-r border-gray-700 p-4">
        <nav class="space-y-2">
          <button id="dashboardBtn" class="w-full text-left px-3 py-2 bg-blue-600 text-white rounded flex items-center space-x-2">
            <i class="fas fa-tachometer-alt"></i><span>Dashboard</span>
          </button>
          <button id="transactionsBtn" class="w-full text-left px-3 py-2 text-gray-300 hover:bg-gray-700 rounded flex items-center space-x-2">
            <i class="fas fa-exchange-alt"></i><span>Transactions</span>
          </button>
          <button id="settingsBtn" class="w-full text-left px-3 py-2 text-gray-300 hover:bg-gray-700 rounded flex items-center space-x-2">
            <i class="fas fa-cog"></i><span>Settings</span>
          </button>
        </nav>
      </aside>

      <!-- Dashboard Content -->
      <div class="flex-1 p-6 overflow-auto">
        <!-- Balance Cards (IDs must match what dashboard.js expects in fallback) -->
        <div id="balanceCards" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-lg shadow-lg">
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-lg font-semibold">Codes Balance</h3><i class="fas fa-code text-2xl"></i>
            </div>
            <!-- NOTE: dashboard.js fallback looks for 'codes-balance' id -->
            <div class="text-3xl font-bold" id="codes-balance">0</div>
            <div class="text-sm text-blue-100 mt-2">Available Codes</div>
          </div>

          <div class="bg-gradient-to-br from-gray-600 to-gray-800 p-6 rounded-lg shadow-lg">
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-lg font-semibold">Silver Balance</h3><i class="fas fa-coins text-2xl"></i>
            </div>
            <!-- NOTE: dashboard.js fallback looks for 'silver-balance' id -->
            <div class="text-3xl font-bold" id="silver-balance">0</div>
            <div class="text-sm text-gray-100 mt-2">Available Silver</div>
          </div>

          <div class="bg-gradient-to-br from-yellow-600 to-yellow-800 p-6 rounded-lg shadow-lg">
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-lg font-semibold">Gold Balance</h3><i class="fas fa-gem text-2xl"></i>
            </div>
            <!-- NOTE: dashboard.js fallback looks for 'gold-balance' id -->
            <div class="text-3xl font-bold" id="gold-balance">0</div>
            <div class="text-sm text-yellow-100 mt-2">Available Gold</div>
          </div>
        </div>

        <!-- Transactions Table -->
        <div class="bg-gray-800 rounded-lg shadow-lg p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-bold">Recent Transactions</h2>
            <button id="refreshTransactions" class="bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded text-sm">
              <i class="fas fa-sync-alt"></i> Refresh
            </button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr class="border-b border-gray-700">
                  <th class="text-left p-2">Date</th>
                  <th class="text-left p-2">Type</th>
                  <th class="text-left p-2">Amount</th>
                  <th class="text-left p-2">Currency</th>
                  <th class="text-left p-2">Status</th>
                  <th class="text-left p-2">Details</th>
                </tr>
              </thead>
              <tbody id="transactionsTable">
                <tr>
                  <td colspan="6" class="text-center py-4 text-gray-400">Loading transactions...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  

  <!-- Admin modal used by dashboard.js (IDs must match) -->
  <div id="adminPanelModal" class="fixed inset-0 bg-black bg-opacity-75 hidden items-center justify-center z-50">
    <div class="bg-gray-800 rounded-lg p-6 w-full max-w-2xl relative">
      <button id="closeAdminPanel" class="absolute top-4 right-4 text-gray-400 hover:text-white">
        <i class="fas fa-times text-xl"></i>
      </button>
      <h2 class="text-xl font-bold mb-4 text-center">Admin Panel</h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label for="adminUserId" class="block text-sm font-medium mb-1">User ID</label>
          <input type="text" id="adminUserId" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded" placeholder="User ID">
        </div>

        <div>
          <label for="adminCurrency" class="block text-sm font-medium mb-1">Currency</label>
          <select id="adminCurrency" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded">
            <option value="codes">Codes</option>
            <option value="silver">Silver</option>
            <option value="gold">Gold</option>
          </select>
        </div>

        <div>
          <label for="adminAmount" class="block text-sm font-medium mb-1">Amount</label>
          <input type="number" id="adminAmount" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded" placeholder="Amount">
        </div>

        <div>
          <label for="adminAction" class="block text-sm font-medium mb-1">Action</label>
          <select id="adminAction" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded">
            <option value="add">Add</option>
            <option value="subtract">Subtract</option>
            <option value="set">Set</option>
          </select>
        </div>
      </div>

      <div class="flex space-x-2">
        <button id="adminExecuteBtn" class="flex-1 bg-green-600 hover:bg-green-700 py-2 px-4 rounded">
          <i class="fas fa-check"></i> Execute
        </button>
        <button id="adminCancelBtn" class="flex-1 bg-gray-600 hover:bg-gray-700 py-2 px-4 rounded">
          <i class="fas fa-times"></i> Cancel
        </button>
      </div>

      <div id="adminStatus" class="mt-4 text-center text-sm"></div>
    </div>
  </div>

  <!-- Dependency Helper Functions (MUST load first) -->
  <script src="utils/dependency-helpers.js"></script>

  <!-- Core Scripts -->
  <script src="bankodeConfig.js"></script>
  <script src="rpc.js"></script>
  <script src="utils/helpers.js"></script>
  <script src="utils/validators.js"></script>
  <script src="utils/formatters.js"></script>
  <script src="unifiedStorage.js"></script>

  <!-- Components -->
  <script src="components/Card.js"></script>
  <script src="components/Table.js"></script>
  <script src="components/Button.js"></script>
  <script src="components/Modal.js"></script>

  

  <!-- Dashboard -->
  <script src="dashboard.js"></script>

  <!-- Validation Test -->
  <script src="bankode-validation-test.js"></script>

  <script>
    async function initApp() {
      if (window.BankodeDashboard?.init) {
        try { await window.BankodeDashboard.init(); } catch (err) { console.error('Dashboard initialization error:', err); }
      }
    }
    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initApp); } else { initApp(); }
  </script>
</body>
</html>
