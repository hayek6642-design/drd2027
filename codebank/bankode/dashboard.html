<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bankode Dashboard - CodeBank</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-university"></i>
                    <span>Bankode</span>
                </div>
                <div class="user-info">
                    <span id="user-email">Loading...</span>
                    <button id="logout-btn" class="btn-secondary">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Dashboard -->
        <main class="dashboard-main">
            <!-- Balance Cards -->
            <section class="balance-section">
                <h2><i class="fas fa-wallet"></i> Account Balances</h2>
                <div class="balance-cards">
                    <div class="balance-card codes">
                        <div class="card-icon">
                            <i class="fas fa-code"></i>
                        </div>
                        <div class="card-content">
                            <h3>Codes</h3>
                            <div class="balance-amount" id="codes-balance">0</div>
                        </div>
                    </div>
                    <div class="balance-card silver">
                        <div class="card-icon">
                            <i class="fas fa-coins"></i>
                        </div>
                        <div class="card-content">
                            <h3>Silver</h3>
                            <div class="balance-amount" id="silver-balance">0</div>
                        </div>
                    </div>
                    <div class="balance-card gold">
                        <div class="card-icon">
                            <i class="fas fa-gem"></i>
                        </div>
                        <div class="card-content">
                            <h3>Gold</h3>
                            <div class="balance-amount" id="gold-balance">0</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Quick Actions -->
            <section class="actions-section">
                <h2><i class="fas fa-bolt"></i> Quick Actions</h2>
                <div class="action-buttons">
                    <button id="change-password-btn" class="action-btn">
                        <i class="fas fa-key"></i>
                        <span>Change Password</span>
                    </button>
                    <button id="transfer-btn" class="action-btn">
                        <i class="fas fa-exchange-alt"></i>
                        <span>Transfer</span>
                    </button>
                    <button id="deposit-btn" class="action-btn">
                        <i class="fas fa-plus-circle"></i>
                        <span>Deposit</span>
                    </button>
                    <button id="withdraw-btn" class="action-btn">
                        <i class="fas fa-minus-circle"></i>
                        <span>Withdraw</span>
                    </button>
                </div>
            </section>

            <!-- Transaction History -->
            <section class="transactions-section">
                <div class="section-header">
                    <h2><i class="fas fa-history"></i> Transaction History</h2>
                    <div class="transaction-controls">
                        <select id="transaction-filter" class="filter-select">
                            <option value="all">All Transactions</option>
                            <option value="deposit">Deposits</option>
                            <option value="withdrawal">Withdrawals</option>
                            <option value="transfer">Transfers</option>
                            <option value="mint">Mints</option>
                            <option value="admin">Admin</option>
                        </select>
                        <button id="refresh-transactions" class="btn-secondary">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                </div>

                <div class="transactions-table-container">
                    <table class="transactions-table" id="transactions-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Asset</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Description</th>
                            </tr>
                        </thead>
                        <tbody id="transactions-body">
                            <tr>
                                <td colspan="6" class="loading">Loading transactions...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination" id="pagination">
                    <button id="prev-page" class="page-btn" disabled>
                        <i class="fas fa-chevron-left"></i> Previous
                    </button>
                    <span id="page-info">Page 1</span>
                    <button id="next-page" class="page-btn">
                        Next <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </section>
        </main>

        <!-- Modals -->
        <!-- Change Password Modal -->
        <div id="password-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="fas fa-key"></i> Change Bankode Password</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="password-form">
                        <div class="form-group">
                            <label for="current-password">Current Password</label>
                            <input type="password" id="current-password" required>
                        </div>
                        <div class="form-group">
                            <label for="new-password">New Password (6-32 characters)</label>
                            <input type="password" id="new-password" required minlength="6" maxlength="32">
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">Confirm New Password</label>
                            <input type="password" id="confirm-password" required>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn-secondary modal-close">Cancel</button>
                            <button type="submit" class="btn-primary">Change Password</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Transfer Modal -->
        <div id="transfer-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="fas fa-exchange-alt"></i> Transfer Funds</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="transfer-form">
                        <div class="form-group">
                            <label for="recipient-email">Recipient Email</label>
                            <input type="email" id="recipient-email" required placeholder="user@example.com">
                        </div>
                        <div class="form-group">
                            <label for="transfer-asset">Asset Type</label>
                            <select id="transfer-asset" required>
                                <option value="codes">Codes</option>
                                <option value="silver">Silver</option>
                                <option value="gold">Gold</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="transfer-amount">Amount</label>
                            <input type="number" id="transfer-amount" required min="0.01" step="0.01">
                        </div>
                        <div class="form-group">
                            <label for="transfer-description">Description (Optional)</label>
                            <input type="text" id="transfer-description" maxlength="255" placeholder="Transfer description">
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn-secondary modal-close">Cancel</button>
                            <button type="submit" class="btn-primary">Transfer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Deposit Modal -->
        <div id="deposit-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="fas fa-plus-circle"></i> Deposit Funds</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="deposit-form">
                        <div class="form-group">
                            <label for="deposit-asset">Asset Type</label>
                            <select id="deposit-asset" required>
                                <option value="codes">Codes</option>
                                <option value="silver">Silver</option>
                                <option value="gold">Gold</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="deposit-amount">Amount</label>
                            <input type="number" id="deposit-amount" required min="0.01" step="0.01">
                        </div>
                        <div class="form-group">
                            <label for="deposit-description">Description (Optional)</label>
                            <input type="text" id="deposit-description" maxlength="255" placeholder="Deposit description">
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn-secondary modal-close">Cancel</button>
                            <button type="submit" class="btn-primary">Deposit</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Withdraw Modal -->
        <div id="withdraw-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="fas fa-minus-circle"></i> Withdraw Funds</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="withdraw-form">
                        <div class="form-group">
                            <label for="withdraw-asset">Asset Type</label>
                            <select id="withdraw-asset" required>
                                <option value="codes">Codes</option>
                                <option value="silver">Silver</option>
                                <option value="gold">Gold</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="withdraw-amount">Amount</label>
                            <input type="number" id="withdraw-amount" required min="0.01" step="0.01">
                        </div>
                        <div class="form-group">
                            <label for="withdraw-description">Description (Optional)</label>
                            <input type="text" id="withdraw-description" maxlength="255" placeholder="Withdrawal description">
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn-secondary modal-close">Cancel</button>
                            <button type="submit" class="btn-primary">Withdraw</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="loading-overlay">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <span>Loading...</span>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <!-- Scripts -->
    <!-- Dependency Helper Functions (MUST load first) -->
    <script src="utils/dependency-helpers.js"></script>
    
    <script src="../../../js/supabase.js"></script>
    <script src="bankodeConfig.js"></script>
    <script src="rlsManager.js"></script>
    <script src="bankode-complete-fix.js"></script>
    <script src="unifiedStorage.js"></script>
    <script src="utils/helpers.js"></script>
    <script src="utils/validators.js"></script>
    <script src="utils/formatters.js"></script>
    <script src="test-balance-loader.js"></script>
    <script src="dashboard.js"></script>
    <script src="test-unified-client.js"></script>
</body>
</html>
