<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoRsA Loader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #loader { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.3s; }
        #loader.hidden { opacity: 0; pointer-events: none; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error-display { display: none; text-align: center; padding: 20px; max-width: 500px; }
        #error-display.visible { display: block; }
        .error-icon { font-size: 48px; margin-bottom: 16px; }
        .retry-btn { margin-top: 20px; padding: 12px 24px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .retry-btn:hover { background: #2563eb; }
        #service-frame { flex: 1; width: 100%; border: none; display: none; }
        #service-frame.loaded { display: block; }
    

/* ===== MOBILE RESPONSIVENESS ===== */
@media (max-width: 1023px) {
    .container, .wrapper, .main-container {
        max-width: 100%;
    }
    
    /* Grid layouts to single column */
    [style*="grid-template-columns: 1fr 1fr"],
    [style*="grid-template-columns: repeat(2"],
    [style*="grid-template-columns: repeat(3"] {
        grid-template-columns: 1fr !important;
    }
}

@media (max-width: 767px) {
    * {
        max-width: 100%;
    }
    
    body {
        font-size: 13px;
        padding: 8px;
    }
    
    h1 { font-size: 20px !important; }
    h2 { font-size: 16px !important; }
    h3 { font-size: 14px !important; }
    p { font-size: 12px !important; }
    
    /* Flex layouts */
    [style*="flex-direction: row"],
    .flex-row,
    .horizontal {
        flex-direction: column !important;
    }
    
    /* Grid responsive */
    [style*="display: grid"] {
        grid-template-columns: 1fr !important;
    }
    
    .grid-2, .grid-3, .grid-4 {
        grid-template-columns: 1fr !important;
        gap: 12px !important;
    }
    
    /* Padding & Margin */
    [style*="padding"] {
        padding: 8px !important;
    }
    
    /* Buttons & Inputs */
    button, input, select, textarea {
        min-height: 44px !important;
        padding: 10px 12px !important;
        font-size: 14px !important;
        width: 100%;
    }
    
    /* Cards */
    .card, .item, .box, [class*="card"] {
        padding: 12px !important;
        margin-bottom: 8px !important;
    }
    
    /* Images */
    img {
        max-width: 100% !important;
        height: auto !important;
    }
    
    /* Tables */
    table {
        font-size: 11px !important;
    }
    
    th, td {
        padding: 6px 4px !important;
    }
    
    /* Hide nav arrows, use native navigation */
    .nav-arrow, .navigation-arrow, [class*="nav-arrow"] {
        display: none;
    }
}

@media (max-width: 480px) {
    h1 { font-size: 16px !important; }
    h2 { font-size: 14px !important; }
    h3 { font-size: 12px !important; }
    p { font-size: 11px !important; }
    
    button, input, select, textarea {
        min-height: 40px !important;
        padding: 8px 10px !important;
        font-size: 12px !important;
    }
}

</style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Loading CoRsA...</p>
        <div id="error-display">
            <div class="error-icon">⚠️</div>
            <h2>Failed to Load CoRsA</h2>
            <p id="error-message">Unknown error occurred</p>
            <button class="retry-btn" onclick="location.reload()">Retry</button>
            <button class="retry-btn" onclick="forceLoad()" style="margin-left: 10px; background: #10b981;">Force Load (No Bridge)</button>
        </div>
    </div>
    <iframe id="service-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-top-navigation-by-user-activation"></iframe>
    <script src="/shared/assets-service-bridge.js"></script>
    <script>
        const ParentBridge = {
            send: function(data) {
                if (window.parent !== window) {
                    window.parent.postMessage({ type: 'corsa-loader', ...data, timestamp: Date.now() }, '*');
                }
            },
            receive: function(callback) {
                window.addEventListener('message', (e) => {
                    if (e.data?.type === 'auth:ready' || e.data?.type === 'codebank:init') { callback(e.data); }
                });
            }
        };
        async function init() {
            ParentBridge.send({ status: 'loader-ready' });
            ParentBridge.receive((data) => { loadService(data); });
            setTimeout(() => { if (!window.loaded) loadService(null); }, 2000);
        }
        function loadService(authData) {
            window.loaded = true;
            const frame = document.getElementById('service-frame');
            const loader = document.getElementById('loader');
            const baseUrl = './corsa/index.html';
            frame.onload = () => {
                setTimeout(() => {
                    if (frame.contentWindow) {
                        frame.contentWindow.postMessage({ type: 'auth:ready', source: 'corsa-loader', payload: authData?.payload || authData || {} }, '*');
                    }
                }, 1000);
                frame.classList.add('loaded'); loader.classList.add('hidden');
                ParentBridge.send({ status: 'service-loaded' });
            };
            frame.src = baseUrl + '?_loader=' + Date.now();
        }
        function forceLoad() {
            const frame = document.getElementById('service-frame');
            frame.removeAttribute('sandbox');
            frame.src = './corsa/index.html?_force=' + Date.now();
            document.getElementById('loader').classList.add('hidden');
            frame.classList.add('loaded');
        }
        init();
    </script>
</body>
</html>
