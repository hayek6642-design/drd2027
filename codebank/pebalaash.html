<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pebalaash - Barter Exchange</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: system-ui; padding: 20px; }
        .auth-check { text-align: center; padding: 50px; }
        .barter-ui { display: none; }
        h1 { background: linear-gradient(135deg, #00d4ff, #8a2be2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .asset-display { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="auth-check" style="text-align: center; padding: 50px;">Checking authentication...</div>
    
    <div id="barter-ui">
        <h1>💱 Pebalaash - Barter</h1>
        <div id="my-assets">
            <h2>My Assets</h2>
            <div class="asset-display">Codes: <span id="my-codes">0</span></div>
            <div class="asset-display">Silver: <span id="my-silver">0</span></div>
            <div class="asset-display">Gold: <span id="my-gold">0</span></div>
        </div>
    </div>

    <script src="../shared/js/auth-client.js"></script>
    <script>
        window.AuthClient.on('auth:changed', (state) => {
            if (!state.authenticated) {
                document.getElementById('auth-check').innerHTML = '<p>Please <a href="/login.html?redirect=/codebank/pebalaash.html" style="color: #00d4ff;">login</a> to continue</p>';
                return;
            }
            document.getElementById('auth-check').style.display = 'none';
            document.getElementById('barter-ui').style.display = 'block';
            
            const assets = state.assets || {};
            document.getElementById('my-codes').textContent = assets.codes?.length || 0;
            document.getElementById('my-silver').textContent = assets.silver?.reduce((a,b) => a + (b.amount || 0), 0) || 0;
            document.getElementById('my-gold').textContent = assets.gold?.reduce((a,b) => a + (b.amount || 0), 0) || 0;
        });
    </script>
</body>
</html>
