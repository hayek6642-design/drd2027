<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pebalaash Store</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

/* ── Header ── */
.header { background: #1e293b; padding: 14px 16px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.logo { font-size: 20px; font-weight: 700; color: #3b82f6; letter-spacing: -0.5px; }
.balance-badge { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); padding: 5px 12px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
.balance-number { font-size: 17px; font-weight: 700; color: #60a5fa; }

/* ── Category tabs ── */
.categories { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.categories::-webkit-scrollbar { display: none; }
.cat-btn { padding: 5px 12px; border-radius: 16px; border: 1px solid #334155; background: transparent; color: #94a3b8; font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.18s; flex-shrink: 0; }
.cat-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }

/* ── Products grid ── */
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; padding: 14px; }

.product-card { background: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid #334155; transition: transform 0.18s, border-color 0.18s; }
.product-card:hover { transform: translateY(-2px); border-color: #3b82f6; }
.product-emoji { font-size: 48px; text-align: center; padding: 18px 8px 8px; background: #0f172a; }
.product-info { padding: 9px 10px 11px; }
.product-name { font-size: 12px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
.product-cat { font-size: 10px; color: #64748b; margin-bottom: 7px; }
.product-bottom { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 7px; }
.price-codes { font-size: 15px; font-weight: 700; color: #3b82f6; }
.price-label { font-size: 9px; color: #64748b; }
.stock-info { font-size: 10px; color: #64748b; text-align: right; }
.buy-btn { width: 100%; padding: 7px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.18s; }
.buy-btn:hover { background: #2563eb; }
.buy-btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
.buy-btn.cant-afford { background: #1d4ed8; opacity: 0.6; }

/* ── Bottom nav ── */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; border-top: 1px solid #334155; display: flex; z-index: 100; }
.nav-btn { flex: 1; padding: 10px 4px; text-align: center; cursor: pointer; font-size: 10px; color: #64748b; background: none; border: none; }
.nav-btn.active { color: #3b82f6; }
.nav-btn .nav-icon { font-size: 18px; display: block; margin-bottom: 2px; }
.content-wrap { padding-bottom: 62px; }

/* ── Checkout modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal { background: #1e293b; border-radius: 20px 20px 0 0; width: 100%; max-width: 520px; margin: 0 auto; padding: 22px 18px 30px; border-top: 1px solid #334155; }
.modal-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-title { font-size: 17px; font-weight: 700; }
.modal-close { background: none; border: none; color: #64748b; font-size: 24px; cursor: pointer; line-height: 1; }
.selected-row { display: flex; align-items: center; gap: 10px; background: #0f172a; padding: 10px 12px; border-radius: 10px; margin-bottom: 16px; }
.sel-emoji { font-size: 32px; }
.sel-name { font-size: 13px; font-weight: 600; }
.sel-price { font-size: 15px; font-weight: 700; color: #3b82f6; }
.form-group { margin-bottom: 12px; }
.form-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; display: block; }
.form-input { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; outline: none; }
.form-input:focus { border-color: #3b82f6; }
.confirm-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; }
.confirm-btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* ── Success screen ── */
.success-screen { position: fixed; inset: 0; background: #0f172a; z-index: 300; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
.success-screen.show { display: flex; }
.success-icon { font-size: 68px; margin-bottom: 18px; }
.success-title { font-size: 22px; font-weight: 700; color: #22c55e; margin-bottom: 8px; }
.success-msg { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 6px; }
.success-order { font-size: 11px; color: #475569; margin-bottom: 24px; }
.back-btn { padding: 12px 30px; background: #3b82f6; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }

/* ── Orders list ── */
.orders-list { padding: 14px; }
.order-card { background: #1e293b; border-radius: 10px; padding: 13px; margin-bottom: 10px; border: 1px solid #334155; }
.order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.order-product { font-weight: 600; font-size: 13px; }
.status-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
.status-badge.pending { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
.status-badge.shipped { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
.status-badge.delivered { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
.status-badge.completed { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
.order-meta { font-size: 11px; color: #64748b; margin-bottom: 2px; }
.order-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.order-codes { font-size: 12px; font-weight: 600; color: #ef4444; }
.order-date { font-size: 10px; color: #475569; }

/* ── Loaders & empty ── */
.center-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; gap: 14px; }
.spinner { width: 36px; height: 36px; border: 3px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 50px 20px; }
.empty-icon { font-size: 44px; margin-bottom: 12px; }
.empty-text { color: #64748b; font-size: 13px; line-height: 1.6; }

/* ── Toast ── */
.toast { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 9px 18px; border-radius: 8px; font-size: 12px; z-index: 400; display: none; white-space: nowrap; max-width: 90vw; overflow: hidden; text-overflow: ellipsis; }
.toast.show { display: block; }
.toast.error { border-color: #ef4444; color: #fca5a5; }
.toast.ok { border-color: #22c55e; color: #86efac; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.loading-text { animation: pulse 1s infinite; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div class="logo">🛍️ Pebalaash</div>
    <div class="balance-badge">
      💎 <span class="balance-number" id="balance-num">—</span> <span style="font-size:11px;color:#94a3b8">codes</span>
    </div>
  </div>
  <div class="categories" id="cat-tabs"></div>
</div>

<!-- Content area -->
<div class="content-wrap">
  <div id="store-view">
    <div id="products-loading" class="center-loader"><div class="spinner"></div><p style="color:#64748b;font-size:13px">Loading products…</p></div>
    <div id="products-grid" class="products-grid" style="display:none"></div>
  </div>
  <div id="orders-view" style="display:none">
    <div id="orders-loading" class="center-loader"><div class="spinner"></div></div>
    <div id="orders-list" class="orders-list" style="display:none"></div>
  </div>
</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-store" data-view="store">
    <span class="nav-icon">🏪</span>Store
  </button>
  <button class="nav-btn" id="nav-orders" data-view="orders">
    <span class="nav-icon">📦</span>My Orders
  </button>
</div>

<!-- Checkout modal -->
<div class="modal-overlay" id="checkout-modal">
  <div class="modal">
    <div class="modal-title-row">
      <span class="modal-title">Complete Purchase</span>
      <button class="modal-close" id="modal-close-btn">×</button>
    </div>
    <div class="selected-row">
      <span class="sel-emoji" id="sel-emoji">🛍️</span>
      <div>
        <div class="sel-name" id="sel-name"></div>
        <div class="sel-price"><span id="sel-price"></span> codes</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Full Name *</label>
      <input type="text" class="form-input" id="inp-name" placeholder="Your full name" autocomplete="name">
    </div>
    <div class="form-group">
      <label class="form-label">Phone Number *</label>
      <input type="tel" class="form-input" id="inp-phone" placeholder="+20 xxx xxx xxxx" autocomplete="tel">
    </div>
    <div class="form-group">
      <label class="form-label">Delivery Address *</label>
      <input type="text" class="form-input" id="inp-addr" placeholder="Full address including city" autocomplete="street-address">
    </div>
    <button class="confirm-btn" id="confirm-btn">✅ Confirm Purchase</button>
  </div>
</div>

<!-- Success screen -->
<div class="success-screen" id="success-screen">
  <div class="success-icon">🎉</div>
  <div class="success-title">Order Placed!</div>
  <div class="success-msg">Your order has been received.<br>We'll contact you on your phone to arrange delivery.</div>
  <div class="success-order" id="success-order-id"></div>
  <button class="back-btn" id="back-to-store-btn">Back to Store</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
'use strict';
// ── State ──────────────────────────────────────────────────────────────────────
var balance = 0;
var allProducts = [];
var productMap = {};
var selectedProduct = null;
var activeCategory = 'all';

// ── Init ───────────────────────────────────────────────────────────────────────
// Accept auth from parent CodeBank (iframe postMessage)
window.addEventListener('message', function(e) {
  var d = e.data;
  if (d && (d.type === 'auth:ready' || d.type === 'codebank:init')) {
    init();
  }
});

// Auto-init fallback for direct access or if no message in 1.5s
var _initTimer = setTimeout(init, 1500);

function init() {
  clearTimeout(_initTimer);
  loadBalance();
  loadProducts();
}

// ── Balance ────────────────────────────────────────────────────────────────────
function loadBalance() {
  fetch('/api/pebalaash/wallet', { credentials: 'include' })
    .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function(data) {
      if (data.ok) {
        balance = Number(data.codes_count) || 0;
        document.getElementById('balance-num').textContent = balance.toLocaleString();
      }
    })
    .catch(function(e) { console.warn('[Pebalaash] wallet:', e); });
}

// ── Products ───────────────────────────────────────────────────────────────────
function loadProducts() {
  fetch('/api/pebalaash/products')
    .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function(data) {
      if (data.ok && data.products) {
        allProducts = data.products;
        productMap = {};
        allProducts.forEach(function(p) { productMap[p.id] = p; });
        buildCategoryTabs();
        renderProducts(allProducts);
      }
    })
    .catch(function() {
      document.getElementById('products-loading').innerHTML =
        '<div class="empty-state"><div class="empty-icon">😓</div><div class="empty-text">Could not load products.<br>Please try again later.</div></div>';
    });
}

function buildCategoryTabs() {
  var cats = ['all'];
  allProducts.forEach(function(p) {
    if (p.category && !cats.includes(p.category)) cats.push(p.category);
  });
  var labels = { 'all':'🌟 All', 'Cosmetics':'💄 Cosmetics', 'Women':'👗 Women', 'Men':'👔 Men',
                 'Kids':'🧒 Kids', 'Toys':'🧸 Toys', 'Electronics':'📱 Electronics',
                 'Food':'🍕 Food', 'Accessories':'👜 Accessories', 'Sports':'⚽ Sports' };
  var tabsEl = document.getElementById('cat-tabs');
  tabsEl.innerHTML = cats.map(function(cat) {
    return '<button class="cat-btn' + (cat === 'all' ? ' active' : '') + '" data-cat="' + esc(cat) + '">' +
           (labels[cat] || ('🏷️ ' + cat)) + '</button>';
  }).join('');
  tabsEl.addEventListener('click', function(e) {
    var btn = e.target.closest('.cat-btn');
    if (!btn) return;
    tabsEl.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeCategory = btn.dataset.cat;
    var filtered = activeCategory === 'all' ? allProducts : allProducts.filter(function(p) { return p.category === activeCategory; });
    renderProducts(filtered);
  });
}

function renderProducts(list) {
  var loading = document.getElementById('products-loading');
  var grid = document.getElementById('products-grid');
  loading.style.display = 'none';
  grid.style.display = '';

  if (!list.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No products in this category.</div></div>';
    return;
  }

  grid.innerHTML = list.map(function(p) {
    var inStock = p.stock > 0;
    var canAfford = balance >= p.price_codes;
    var btnCls = !inStock ? ' disabled' : (!canAfford ? ' cant-afford' : '');
    var btnTxt = !inStock ? 'Out of Stock' : (!canAfford ? ('Need ' + (p.price_codes - balance) + ' more') : '🛒 Buy Now');
    return '<div class="product-card">' +
      '<div class="product-emoji">' + (p.image_emoji || '🛍️') + '</div>' +
      '<div class="product-info">' +
        '<div class="product-name">' + esc(p.name) + '</div>' +
        '<div class="product-cat">' + esc(p.category || '') + '</div>' +
        '<div class="product-bottom">' +
          '<div><div class="price-codes">' + p.price_codes + '</div><div class="price-label">codes</div></div>' +
          '<div class="stock-info">' + (inStock ? p.stock + ' left' : '—') + '</div>' +
        '</div>' +
        '<button class="buy-btn' + btnCls + '" data-pid="' + esc(String(p.id)) + '"' + (!inStock ? ' disabled' : '') + '>' + btnTxt + '</button>' +
      '</div>' +
    '</div>';
  }).join('');

  grid.addEventListener('click', function(e) {
    var btn = e.target.closest('.buy-btn');
    if (!btn || btn.disabled) return;
    var pid = btn.dataset.pid;
    if (pid && productMap[pid]) openCheckout(productMap[pid]);
  });
}

// ── Checkout ───────────────────────────────────────────────────────────────────
function openCheckout(product) {
  if (balance < product.price_codes) {
    showToast('You need ' + (product.price_codes - balance) + ' more codes for this', 'error');
    return;
  }
  selectedProduct = product;
  document.getElementById('sel-emoji').textContent = product.image_emoji || '🛍️';
  document.getElementById('sel-name').textContent = product.name;
  document.getElementById('sel-price').textContent = product.price_codes;
  document.getElementById('checkout-modal').classList.add('open');
}

document.getElementById('modal-close-btn').addEventListener('click', closeCheckout);
document.getElementById('checkout-modal').addEventListener('click', function(e) {
  if (e.target === this) closeCheckout();
});

function closeCheckout() {
  document.getElementById('checkout-modal').classList.remove('open');
  selectedProduct = null;
}

document.getElementById('confirm-btn').addEventListener('click', function() {
  if (!selectedProduct) return;
  var name = document.getElementById('inp-name').value.trim();
  var phone = document.getElementById('inp-phone').value.trim();
  var addr = document.getElementById('inp-addr').value.trim();
  if (!name || !phone || !addr) {
    showToast('Please fill in all delivery details', 'error');
    return;
  }
  var btn = this;
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-text">⏳ Processing…</span>';
  fetch('/api/pebalaash/checkout', {
    method: 'POST',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ productId: selectedProduct.id, customerInfo: { name: name, phone: phone, address: addr } })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.ok) {
      balance = data.newBalance || 0;
      document.getElementById('balance-num').textContent = balance.toLocaleString();
      closeCheckout();
      showSuccess(data.orderId);
      // Reset form
      document.getElementById('inp-name').value = '';
      document.getElementById('inp-phone').value = '';
      document.getElementById('inp-addr').value = '';
      // Refresh product stock
      loadProducts();
    } else {
      showToast(data.error || 'Purchase failed. Please try again.', 'error');
    }
  })
  .catch(function() { showToast('Network error. Please try again.', 'error'); })
  .finally(function() {
    btn.disabled = false;
    btn.innerHTML = '✅ Confirm Purchase';
  });
});

// ── Orders ─────────────────────────────────────────────────────────────────────
function loadOrders() {
  var loading = document.getElementById('orders-loading');
  var list = document.getElementById('orders-list');
  loading.style.display = 'flex';
  list.style.display = 'none';
  fetch('/api/pebalaash/orders', { credentials: 'include' })
    .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function(data) {
      loading.style.display = 'none';
      list.style.display = 'block';
      if (!data.orders || !data.orders.length) {
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">No orders yet.<br>Start shopping to spend your codes!</div></div>';
        return;
      }
      list.innerHTML = data.orders.map(function(o) {
        return '<div class="order-card">' +
          '<div class="order-top">' +
            '<div class="order-product">' + esc(o.product_name) + '</div>' +
            '<span class="status-badge ' + esc(o.status) + '">' + esc(o.status) + '</span>' +
          '</div>' +
          (o.customer_name ? '<div class="order-meta">' + esc(o.customer_name) + ' · ' + esc(o.customer_phone) + '</div>' : '') +
          (o.customer_address ? '<div class="order-meta">' + esc(o.customer_address) + '</div>' : '') +
          '<div class="order-footer">' +
            '<div class="order-codes">-' + o.codes_spent + ' codes</div>' +
            '<div class="order-date">' + fmtDate(o.created_at) + '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    })
    .catch(function() {
      loading.style.display = 'none';
      list.style.display = 'block';
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">😓</div><div class="empty-text">Could not load orders.</div></div>';
    });
}

// ── Navigation ─────────────────────────────────────────────────────────────────
document.querySelector('.bottom-nav').addEventListener('click', function(e) {
  var btn = e.target.closest('.nav-btn');
  if (!btn) return;
  var view = btn.dataset.view;
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('store-view').style.display = view === 'store' ? '' : 'none';
  document.getElementById('orders-view').style.display = view === 'orders' ? '' : 'none';
  if (view === 'orders') loadOrders();
});

// ── Success screen ─────────────────────────────────────────────────────────────
function showSuccess(orderId) {
  document.getElementById('success-order-id').textContent = orderId ? 'Order #' + String(orderId).slice(0, 8).toUpperCase() : '';
  document.getElementById('success-screen').classList.add('show');
}
document.getElementById('back-to-store-btn').addEventListener('click', function() {
  document.getElementById('success-screen').classList.remove('show');
});

// ── Toast ──────────────────────────────────────────────────────────────────────
var _toastTimer;
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3500);
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  if (!d) return '';
  try {
    var dt = new Date(d);
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
           dt.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  } catch(e) { return String(d); }
}
</script>
</body>
</html>
