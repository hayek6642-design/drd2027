<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneWorld - Anonymous Social Platform</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
</head>
<body>
    <!-- Main App -->
    <div id="app" class="app">
        <!-- Header -->
        <header class="header">
            <h1 class="logo">🌍 OneWorld</h1>
            <p class="subtitle">Free anonymous social platform</p>
        </header>

        <!-- Post Composer -->
        <div class="post-composer">
            <div class="composer-content">
                <textarea id="post-content" placeholder="Share your thoughts anonymously..." maxlength="1000"></textarea>
                <div class="composer-actions">
                    <div class="composer-submit">
                        <span id="char-count" class="char-count">1000</span>
                        <button id="submit-post" class="submit-post-btn" disabled>Post</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Posts Feed -->
        <div id="posts-feed" class="posts-feed">
            <!-- Posts will be loaded here -->
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script type="module" src="app.js"></script>
</body>
</html>
