<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Hub - Modern</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 50%, #16213e 100%);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* RIGHT HOVER TOAST SIDEBAR - MODERN STYLE */
        /* ═══════════════════════════════════════════════════════════ */
        
        .sidebar-trigger-zone {
            position: fixed;
            right: 0;
            top: 0;
            width: 60px;
            height: 100vh;
            z-index: 800;
        }

        .sidebar-toast {
            position: fixed;
            right: -400px;
            top: 0;
            width: 380px;
            height: 100vh;
            background: rgba(15, 20, 25, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
            transition: right 0.35s cubic-bezier(0.23, 1, 0.320, 1);
            z-index: 999;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar-trigger-zone:hover ~ .sidebar-toast,
        .sidebar-toast:hover {
            right: 0;
        }

        .sidebar-toast.show {
            right: 0;
        }

        /* Sidebar Header */
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .sidebar-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin: 0;
        }

        .sidebar-close-btn {
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 24px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .sidebar-close-btn:hover {
            color: #fff;
        }

        /* Sidebar Content */
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Account Section */
        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 1px;
            margin: 5px 0;
        }

        /* Auth Buttons - FIXED VISIBILITY */
        .auth-button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 5px;
        }

        .auth-btn {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .auth-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
            color: #fff;
        }

        .auth-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
            color: #fff;
        }

        .auth-btn.primary:hover {
            background: linear-gradient(135deg, #7c8eef 0%, #8b5ab8 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .google-btn {
            background: #fff;
            color: #333;
            border: none;
        }

        .google-btn:hover {
            background: #f0f0f0;
        }

        .google-icon {
            width: 18px;
            height: 18px;
        }

        /* Account Status */
        .account-status {
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            display: none;
        }

        .account-status.logged-in {
            display: block;
        }

        .account-status h4 {
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #667eea;
        }

        .account-status p {
            font-size: 0.85rem;
            color: #aaa;
        }

        /* Divider */
        .sidebar-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 5px 0;
        }

        /* Menu Items - FIXED SPACING */
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sidebar-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: #aaa;
            font-size: 0.9rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .sidebar-menu-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .sidebar-menu-item .icon {
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
        }

        .sidebar-menu-item .label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Theme Toggle */
        .theme-toggle {
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 4px;
        }

        .theme-option {
            flex: 1;
            padding: 6px 10px;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .theme-option.active {
            background: rgba(102, 126, 234, 0.5);
            color: #fff;
        }

        /* Main Chat Area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow: hidden;
        }

        .chat-header {
            background: rgba(26, 26, 46, 0.8);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .chat-header h1 {
            font-size: 1.2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .header-btn {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            color: #667eea;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: rgba(102, 126, 234, 0.3);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-indicator.error {
            background: #ef4444;
            animation: none;
        }

        /* Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 10px;
            word-wrap: break-word;
        }

        .message.bot .message-content {
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: #e0e0e0;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Input Area */
        .chat-input-container {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(15, 20, 25, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .input-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            padding: 10px 15px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .chat-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }

        .input-controls {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            color: #667eea;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            color: #7c8eef;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        /* Model Selector */
        .model-selector {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            padding: 10px 15px;
            font-size: 0.9rem;
        }

        .model-selector:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
        }

        /* Loading State */
        .loading-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #667eea;
            animation: blink 1.4s infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.5);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar-toast {
                width: 85vw;
                right: -85vw;
            }

            .message-content {
                max-width: 85%;
            }

            .chat-input {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- MAIN CHAT CONTAINER -->
    <div class="chat-container">
        <!-- HEADER -->
        <div class="chat-header">
            <h1>🤖 AI Chat Hub</h1>
            <div class="chat-controls">
                <span class="header-btn">
                    <span class="status-indicator"></span>
                    Ready
                </span>
            </div>
        </div>

        <!-- MESSAGES -->
        <div class="chat-messages" id="chatMessages">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <h2>Welcome to AI Chat Hub</h2>
                <p>Select a model and start chatting</p>
            </div>
        </div>

        <!-- INPUT AREA -->
        <div class="chat-input-container">
            <div class="input-row">
                <select class="model-selector" id="modelSelect">
                    <option value="">Select an AI Model...</option>
                    <optgroup label="Groq (Free)">
                        <option value="groq:llama-3.1-8b">Llama 3.1 8B</option>
                        <option value="groq:mixtral-8x7b">Mixtral 8x7B</option>
                    </optgroup>
                    <optgroup label="Google Gemini (Free)">
                        <option value="gemini:1.5-flash">Gemini 1.5 Flash</option>
                        <option value="gemini:1.5-pro">Gemini 1.5 Pro</option>
                    </optgroup>
                </select>
            </div>

            <div class="input-row">
                <input 
                    type="text" 
                    class="chat-input" 
                    id="chatInput" 
                    placeholder="Type your message... (Ctrl+Enter to send)"
                    autocomplete="off"
                >
                <div class="input-controls">
                    <button class="icon-btn" title="Attach file">📎</button>
                    <button class="icon-btn" title="Voice input">🎤</button>
                    <button class="send-btn" id="sendBtn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- RIGHT SIDEBAR - HOVER TOAST ACTIVATION ZONE -->
    <div class="sidebar-trigger-zone"></div>

    <!-- MODERN SIDEBAR TOAST -->
    <div class="sidebar-toast" id="sidebarToast">
        <div class="sidebar-header">
            <h3>⚙️ Account</h3>
            <button class="sidebar-close-btn" onclick="document.getElementById('sidebarToast').classList.remove('show')">✕</button>
        </div>

        <div class="sidebar-content">
            <!-- AUTHENTICATION SECTION -->
            <div class="sidebar-section">
                <div class="sidebar-section-title">Authentication</div>
                
                <div class="auth-button-container">
                    <!-- Google Sign In -->
                    <button class="auth-btn google-btn" onclick="handleGoogleSignIn()">
                        <svg class="google-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Sign in with Google
                    </button>

                    <!-- Sign In Button -->
                    <button class="auth-btn" onclick="handleSignIn()">
                        🔐 Sign In
                    </button>

                    <!-- Sign Up Button -->
                    <button class="auth-btn primary" onclick="handleSignUp()">
                        ✨ Create Account
                    </button>
                </div>

                <!-- Account Status (shown when logged in) -->
                <div class="account-status" id="accountStatus">
                    <h4>Logged In</h4>
                    <p id="userName">user@example.com</p>
                </div>

                <div class="sidebar-divider"></div>
            </div>

            <!-- MENU SECTION -->
            <div class="sidebar-section">
                <div class="sidebar-section-title">Menu</div>
                <div class="sidebar-menu">
                    <div class="sidebar-menu-item" onclick="saveChat()">
                        <span class="icon">💾</span>
                        <span class="label">Save Chat</span>
                    </div>
                    <div class="sidebar-menu-item" onclick="viewHistory()">
                        <span class="icon">📋</span>
                        <span class="label">Chat History</span>
                    </div>
                    <div class="sidebar-menu-item" onclick="exportJSON()">
                        <span class="icon">📥</span>
                        <span class="label">Export JSON</span>
                    </div>
                    <div class="sidebar-menu-item" onclick="exportMarkdown()">
                        <span class="icon">📄</span>
                        <span class="label">Export MD</span>
                    </div>
                    <div class="sidebar-menu-item" onclick="clearHistory()">
                        <span class="icon">🗑️</span>
                        <span class="label">Clear All</span>
                    </div>
                    <div class="sidebar-menu-item" onclick="newChat()">
                        <span class="icon">➕</span>
                        <span class="label">New Chat</span>
                    </div>
                </div>

                <div class="sidebar-divider"></div>
            </div>

            <!-- THEME SECTION -->
            <div class="sidebar-section">
                <div class="sidebar-section-title">Theme</div>
                <div class="theme-toggle">
                    <button class="theme-option active" onclick="setTheme('dark')">🌙 Dark</button>
                    <button class="theme-option" onclick="setTheme('light')">☀️ Light</button>
                </div>

                <div class="sidebar-divider"></div>
            </div>

            <!-- PREFERENCES -->
            <div class="sidebar-section">
                <div class="sidebar-section-title">Preferences</div>
                <div class="sidebar-menu">
                    <div class="sidebar-menu-item" onclick="openSettings()">
                        <span class="icon">⚙️</span>
                        <span class="label">Settings</span>
                    </div>
                    <div class="sidebar-menu-item" onclick="openHelp()">
                        <span class="icon">❓</span>
                        <span class="label">Help & Docs</span>
                    </div>
                    <div class="sidebar-menu-item" onclick="openAbout()">
                        <span class="icon">ℹ️</span>
                        <span class="label">About</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Auth Functions
        function handleGoogleSignIn() {
            alert('Google Sign-In: Integrating with OAuth...');
            updateAccountStatus('user@gmail.com');
        }

        function handleSignIn() {
            const email = prompt('Enter your email:');
            if (email) {
                updateAccountStatus(email);
                alert(`Welcome back, ${email}!`);
            }
        }

        function handleSignUp() {
            alert('Sign Up: Redirecting to registration...');
        }

        function updateAccountStatus(email) {
            document.getElementById('accountStatus').classList.add('logged-in');
            document.getElementById('userName').textContent = email;
        }

        // Chat Functions
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            const model = document.getElementById('modelSelect').value;

            if (!message || !model) {
                alert('Please select a model and enter a message');
                return;
            }

            // Add user message
            addMessage('user', message);
            input.value = '';

            // Simulate bot response
            setTimeout(() => {
                addMessage('bot', `Response from ${model}... (Demo)`);
            }, 1000);
        }

        function addMessage(sender, content) {
            const messagesDiv = document.getElementById('chatMessages');
            
            // Remove empty state if needed
            if (messagesDiv.innerHTML.includes('empty-state')) {
                messagesDiv.innerHTML = '';
            }

            const messageEl = document.createElement('div');
            messageEl.className = `message ${sender}`;
            messageEl.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
            messagesDiv.appendChild(messageEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Chat Management
        function saveChat() { alert('💾 Save Chat: Feature coming soon'); }
        function viewHistory() { alert('📋 View History: Feature coming soon'); }
        function exportJSON() { alert('📥 Export JSON: Downloading...'); }
        function exportMarkdown() { alert('📄 Export MD: Downloading...'); }
        function clearHistory() {
            if (confirm('Clear all chat history?')) {
                alert('✅ History cleared');
            }
        }
        function newChat() {
            document.getElementById('chatMessages').innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><h2>New Chat Started</h2></div>';
            document.getElementById('chatInput').value = '';
        }

        // Settings
        function openSettings() { alert('⚙️ Settings: Coming soon'); }
        function openHelp() { alert('❓ Help: Check documentation'); }
        function openAbout() { alert('ℹ️ About AI Chat Hub v2.0'); }
        function setTheme(theme) {
            alert(`🎨 Theme set to ${theme}`);
            document.querySelectorAll('.theme-option').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        // Event Listeners
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('chatInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                sendMessage();
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            console.log('✅ AI Chat Hub Modern - Ready');
        });
    </script>
</body>
</html>
