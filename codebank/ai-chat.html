<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - CodeBank</title>
    <link rel="stylesheet" href="ai-chat.css">

  <script src="../auth-bridge.js"></script>
  <script>
    // Listen for auth changes from main app
    authBridge.onAuthChange((user, token) => {
      if (!user || !token) {
        console.warn('[Service Auth] Not authenticated. Redirecting to login...');
        // Show auth required message
        if (document.body) {
          document.body.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0f0f1a,#1a1a2e);font-family:sans-serif;color:#fff;">
              <div style="text-align:center;padding:40px;">
                <div style="font-size:64px;margin-bottom:20px;">🔐</div>
                <h1 style="margin:0;color:#00d4ff;">Authentication Required</h1>
                <p style="color:#aaa;margin:10px 0 20px;">Please log in first to access this service.</p>
                <a href="/login.html" style="background:linear-gradient(135deg,#00d4ff,#0099cc);color:#000;padding:12px 30px;border-radius:8px;text-decoration:none;font-weight:600;display:inline-block;">Go to Login</a>
              </div>
            </div>
          `;
        }
        return;
      }
      console.log('[Service Auth] User authenticated:', user.email);
      // Initialize service with authenticated user
      if (window.serviceInit && typeof window.serviceInit === 'function') {
        window.serviceInit(user, token);
      }
    });
  </script>
  </head>
<body>
    <div class="ai-chat-container">
        <!-- Left Panel: Chat Threads -->
        <div class="chat-threads-list">
            <div class="threads-header">
                <h3>💬 Conversations</h3>
                <button class="new-chat-btn" id="newChatBtn">+ New</button>
            </div>

            <div class="threads-container" id="threadsContainer">
                <!-- Chat threads populated here -->
            </div>
        </div>

        <!-- Right Panel: Chat View -->
        <div class="chat-view">
            <!-- No Chat State -->
            <div class="no-chat-state" id="noChatState">
                <div class="welcome-box">
                    <h2>🤖 AI Chat</h2>
                    <p>Start a new conversation or select one from the list</p>
                    <button class="start-btn" id="startNewChatBtn">Start Chat</button>
                </div>
            </div>

            <!-- Active Chat -->
            <div class="active-chat" id="activeChat" style="display: none;">
                <div class="chat-header">
                    <div>
                        <h2 id="chatTitle">New Conversation</h2>
                        <p id="chatSubtitle" class="chat-subtitle">AI Assistant</p>
                    </div>
                    <div class="header-actions">
                        <button class="btn-icon" id="infoBtn" title="Info">ℹ️</button>
                        <button class="btn-icon delete" id="deleteBtn" title="Delete">🗑️</button>
                    </div>
                </div>

                <div class="messages-container" id="messagesContainer">
                    <!-- Messages populated here -->
                </div>

                <div class="input-area">
                    <form id="chatForm">
                        <input type="text" id="messageInput" placeholder="Type your message..." class="message-input" autocomplete="off">
                        <button type="submit" class="send-btn">Send</button>
                    </form>
                </div>

                <div class="quick-actions">
                    <button class="quick-action-btn" data-prompt="Help me with...">Help me with...</button>
                    <button class="quick-action-btn" data-prompt="Explain...">Explain...</button>
                    <button class="quick-action-btn" data-prompt="Write...">Write...</button>
                    <button class="quick-action-btn" data-prompt="Code...">Code...</button>
                </div>
            </div>
        </div>
    </div>

    <script src="ai-chat.js"></script>
</body>
</html>
