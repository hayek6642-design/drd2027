<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - CodeBank</title>
    <link rel="stylesheet" href="ai-chat.css">
</head>
<body>
    <div class="ai-chat-container">
        <!-- Left Panel: Chat Threads -->
        <div class="chat-threads-list">
            <div class="threads-header">
                <h3>💬 Conversations</h3>
                <button class="new-chat-btn" id="newChatBtn">+ New</button>
            </div>

            <div class="threads-container" id="threadsContainer">
                <!-- Chat threads populated here -->
            </div>
        </div>

        <!-- Right Panel: Chat View -->
        <div class="chat-view">
            <!-- No Chat State -->
            <div class="no-chat-state" id="noChatState">
                <div class="welcome-box">
                    <h2>🤖 AI Chat</h2>
                    <p>Start a new conversation or select one from the list</p>
                    <button class="start-btn" id="startNewChatBtn">Start Chat</button>
                </div>
            </div>

            <!-- Active Chat -->
            <div class="active-chat" id="activeChat" style="display: none;">
                <div class="chat-header">
                    <div>
                        <h2 id="chatTitle">New Conversation</h2>
                        <p id="chatSubtitle" class="chat-subtitle">AI Assistant</p>
                    </div>
                    <div class="header-actions">
                        <button class="btn-icon" id="infoBtn" title="Info">ℹ️</button>
                        <button class="btn-icon delete" id="deleteBtn" title="Delete">🗑️</button>
                    </div>
                </div>

                <div class="messages-container" id="messagesContainer">
                    <!-- Messages populated here -->
                </div>

                <div class="input-area">
                    <form id="chatForm">
                        <input type="text" id="messageInput" placeholder="Type your message..." class="message-input" autocomplete="off">
                        <button type="submit" class="send-btn">Send</button>
                    </form>
                </div>

                <div class="quick-actions">
                    <button class="quick-action-btn" data-prompt="Help me with...">Help me with...</button>
                    <button class="quick-action-btn" data-prompt="Explain...">Explain...</button>
                    <button class="quick-action-btn" data-prompt="Write...">Write...</button>
                    <button class="quick-action-btn" data-prompt="Code...">Code...</button>
                </div>
            </div>
        </div>
    </div>

    <script src="ai-chat.js"></script>
</body>
</html>
