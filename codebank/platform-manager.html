<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform Manager 🤖 — AI Assistant</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a16;
      --surface:  #12122a;
      --surface2: #1c1c38;
      --border:   rgba(255,255,255,0.07);
      --accent:   #7c3aed;
      --accent2:  #06b6d4;
      --gold:     #f59e0b;
      --silver:   #94a3b8;
      --text:     #f0f0ff;
      --muted:    #8888aa;
      --green:    #22c55e;
      --red:      #ef4444;
      --radius:   14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #0d0d22 0%, #130d2e 100%);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(124,58,237,0.35);
      flex-shrink: 0;
    }
    .header-logo { font-size: 28px; line-height: 1; }
    .header-text h1 {
      font-size: 17px; font-weight: 900;
      background: linear-gradient(90deg, #7c3aed, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-text p { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    /* Assets pill */
    .assets-bar {
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    }
    .asset-pill {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 10px;
      font-size: 12px; font-weight: 700;
      transition: border-color 0.2s;
    }
    .asset-pill .icon { font-size: 14px; }
    .asset-pill.codes  { border-color: rgba(124,58,237,0.4); }
    .asset-pill.silver { border-color: rgba(148,163,184,0.4); }
    .asset-pill.gold   { border-color: rgba(245,158,11,0.4); color: var(--gold); }
    .asset-pill.tier   { border-color: rgba(6,182,212,0.4); color: var(--accent2); font-size: 11px; }

    /* Clear btn */
    .btn-clear {
      background: none; border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px; color: var(--red); font-size: 11px;
      padding: 5px 10px; cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: all 0.2s; white-space: nowrap;
    }
    .btn-clear:hover { background: rgba(239,68,68,0.1); border-color: var(--red); }

    .btn-back {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); font-size: 11px;
      padding: 5px 10px; cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: all 0.2s; text-decoration: none; white-space: nowrap;
    }
    .btn-back:hover { border-color: var(--accent); color: var(--text); }

    /* ── Chat area ──────────────────────────────────── */
    .chat-scroll {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
      scroll-behavior: smooth;
    }
    .chat-scroll::-webkit-scrollbar { width: 4px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

    /* Messages */
    .msg { display: flex; gap: 10px; max-width: 82%; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai   { align-self: flex-start; }

    .msg-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; border: 1px solid var(--border);
    }
    .msg.user .msg-avatar { background: linear-gradient(135deg, #7c3aed, #06b6d4); }
    .msg.ai   .msg-avatar { background: var(--surface2); }

    .msg-body { display: flex; flex-direction: column; gap: 8px; }

    .msg-bubble {
      padding: 11px 15px; border-radius: var(--radius);
      font-size: 14px; line-height: 1.6; word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
      color: #fff; border-bottom-right-radius: 4px;
    }
    .msg.ai .msg-bubble {
      background: var(--surface2); border: 1px solid var(--border);
      border-bottom-left-radius: 4px; color: var(--text);
    }
    .msg-bubble .model-tag {
      display: inline-block; font-size: 9px; color: var(--muted);
      background: rgba(255,255,255,0.05); border-radius: 4px;
      padding: 1px 5px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px;
    }

    /* Action buttons */
    .action-btns {
      display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px;
    }
    .action-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px; border-radius: 10px; font-size: 12px; font-weight: 700;
      cursor: pointer; border: 1px solid transparent;
      transition: all 0.2s; text-decoration: none; color: #fff;
      position: relative; overflow: hidden;
    }
    .action-btn:hover { transform: translateY(-2px); filter: brightness(1.15); box-shadow: 0 4px 14px rgba(0,0,0,0.35); }
    .action-btn .a-reason { font-size: 9px; font-weight: 400; opacity: 0.8; display: block; line-height: 1.1; }

    /* Thinking indicator */
    .typing { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; }
    .dots span {
      display: inline-block; width: 6px; height: 6px;
      background: var(--accent); border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40%           { transform: translateY(-6px); opacity: 1; }
    }

    /* Quota bar */
    .quota-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px; background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 10px; color: var(--muted); flex-shrink: 0;
    }
    .quota-fill {
      flex: 1; height: 3px; background: rgba(255,255,255,0.07);
      border-radius: 4px; overflow: hidden;
    }
    .quota-fill-inner {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px; transition: width 0.4s;
    }

    /* ── Input area ─────────────────────────────────── */
    .input-area {
      padding: 12px 16px; background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; align-items: flex-end; gap: 10px; flex-shrink: 0;
    }
    #msgInput {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); padding: 11px 14px;
      font-size: 14px; outline: none; resize: none; max-height: 120px;
      font-family: inherit; line-height: 1.5; transition: border-color 0.2s;
    }
    #msgInput:focus { border-color: var(--accent); }
    #msgInput::placeholder { color: var(--muted); }
    .btn-send {
      background: linear-gradient(135deg, var(--accent), #5b21b6);
      border: none; border-radius: 12px; color: #fff;
      width: 44px; height: 44px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: all 0.2s; box-shadow: 0 4px 14px rgba(124,58,237,0.3);
    }
    .btn-send:hover { transform: scale(1.05); filter: brightness(1.1); }
    .btn-send:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }

    /* Welcome screen */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 14px; color: var(--muted);
      text-align: center; padding: 20px;
    }
    .welcome-icon { font-size: 56px; animation: pulse 3s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    .welcome h2 {
      font-size: 20px; font-weight: 900;
      background: linear-gradient(90deg, #7c3aed, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .welcome p { font-size: 13px; max-width: 320px; line-height: 1.6; }
    .welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 6px; }
    .chip {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 7px 14px; font-size: 12px;
      cursor: pointer; transition: all 0.2s; color: var(--text);
    }
    .chip:hover { border-color: var(--accent); background: rgba(124,58,237,0.12); }

    /* RTL support */
    .rtl { direction: rtl; text-align: right; }
    .rtl .msg.user { flex-direction: row; }
    .rtl .msg.ai   { flex-direction: row-reverse; }

    @media (max-width: 480px) {
      .header { flex-wrap: wrap; gap: 8px; }
      .header-right { width: 100%; justify-content: space-between; }
      .msg { max-width: 92%; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-logo">🤖</div>
  <div class="header-text">
    <h1>Platform Manager</h1>
    <p id="statusLine">AI Assistant · DRD2027</p>
  </div>
  <div class="header-right">
    <div class="assets-bar" id="assetsBar" style="display:none">
      <div class="asset-pill codes">  <span class="icon">💰</span> <span id="aCoins">0</span> </div>
      <div class="asset-pill silver"> <span class="icon">🥈</span> <span id="aSilver">0</span> </div>
      <div class="asset-pill gold">   <span class="icon">🥇</span> <span id="aGold">0</span> </div>
      <div class="asset-pill tier">   <span class="icon">✦</span>  <span id="aTier">—</span> </div>
    </div>
    <button class="btn-clear" onclick="clearHistory()"><i class="fa fa-trash"></i> Clear</button>
    <a href="/codebank/aihub.html" class="btn-back"><i class="fa fa-arrow-left"></i> Hub</a>
  </div>
</header>

<!-- Quota bar -->
<div class="quota-bar" id="quotaBar" style="display:none">
  <span id="quotaTxt">Quota</span>
  <div class="quota-fill"><div class="quota-fill-inner" id="quotaFill" style="width:0%"></div></div>
  <span id="quotaPct">0%</span>
</div>

<!-- Chat scroll area -->
<div class="chat-scroll" id="chatScroll">
  <!-- Welcome -->
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-icon">🤖</div>
    <h2>Platform Manager</h2>
    <p>Your AI assistant for DRD2027 — ask about your assets, get shortcuts, explore the platform.</p>
    <div class="welcome-chips">
      <div class="chip" onclick="quickSend('What are my assets?')">💰 My assets</div>
      <div class="chip" onclick="quickSend('How do I earn more codes?')">🎯 How to earn</div>
      <div class="chip" onclick="quickSend('Open Games Centre')">🎮 Games Centre</div>
      <div class="chip" onclick="quickSend('ما هو رصيدي؟')">🌙 بالعربي</div>
      <div class="chip" onclick="quickSend('What can you do?')">🤔 Help</div>
    </div>
  </div>
</div>

<!-- Input area -->
<div class="input-area">
  <textarea id="msgInput" rows="1" placeholder="Ask about your assets, navigate, or get help…"
    onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
  <button class="btn-send" id="sendBtn" onclick="sendMessage()">
    <i class="fa fa-paper-plane"></i>
  </button>
</div>

<script>
  const chatScroll   = document.getElementById('chatScroll');
  const welcomeEl    = document.getElementById('welcomeScreen');
  const msgInput     = document.getElementById('msgInput');
  const sendBtn      = document.getElementById('sendBtn');
  const assetsBar    = document.getElementById('assetsBar');
  const quotaBar     = document.getElementById('quotaBar');
  const statusLine   = document.getElementById('statusLine');
  let   isLoading    = false;
  let   msgCount     = 0;

  /* ── Quick chips ──────────────────────────────────── */
  function quickSend(text) {
    msgInput.value = text;
    sendMessage();
  }

  /* ── Textarea auto-grow ───────────────────────────── */
  function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  /* ── Render message ───────────────────────────────── */
  function appendMessage(role, text, actions = [], modelTag = '') {
    if (msgCount === 0) welcomeEl.style.display = 'none';
    msgCount++;

    const isAr = /[\u0600-\u06FF]/.test(text);
    const wrapper = document.createElement('div');
    wrapper.className = `msg ${role}${isAr ? ' rtl' : ''}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const body = document.createElement('div');
    body.className = 'msg-body';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (modelTag && role === 'ai') {
      const tag = document.createElement('span');
      tag.className = 'model-tag';
      tag.textContent = modelTag;
      bubble.appendChild(tag);
    }

    const textNode = document.createElement('span');
    textNode.textContent = text;
    bubble.appendChild(textNode);
    body.appendChild(bubble);

    // Action buttons
    if (actions && actions.length > 0) {
      const btns = document.createElement('div');
      btns.className = 'action-btns';
      actions.forEach(a => {
        const btn = document.createElement('a');
        btn.className = 'action-btn';
        btn.href = a.url || '#';
        btn.style.background = a.color || '#7c3aed';
        btn.innerHTML = `<span>${a.label}</span><span class="a-reason">${a.reason || ''}</span>`;
        btn.addEventListener('click', e => {
          if (!a.url) { e.preventDefault(); return; }
          if (!a.url.startsWith('http')) {
            e.preventDefault();
            window.location.href = a.url;
          }
        });
        btns.appendChild(btn);
      });
      body.appendChild(btns);
    }

    wrapper.appendChild(avatar);
    wrapper.appendChild(body);
    chatScroll.appendChild(wrapper);
    chatScroll.scrollTop = chatScroll.scrollHeight;
    return wrapper;
  }

  /* ── Typing indicator ─────────────────────────────── */
  function showTyping() {
    if (msgCount === 0) welcomeEl.style.display = 'none';
    const el = document.createElement('div');
    el.className = 'msg ai';
    el.id = 'typingIndicator';
    el.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="typing">
        <div class="dots"><span></span><span></span><span></span></div>
        <span>Thinking…</span>
      </div>`;
    chatScroll.appendChild(el);
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typingIndicator')?.remove();
  }

  /* ── Update assets + quota ────────────────────────── */
  function updateAssets(ctx, quota) {
    if (ctx) {
      document.getElementById('aCoins').textContent  = ctx.assets?.codes  ?? 0;
      document.getElementById('aSilver').textContent = ctx.assets?.silver ?? 0;
      document.getElementById('aGold').textContent   = ctx.assets?.gold   ?? 0;
      document.getElementById('aTier').textContent   = ctx.tier            ?? '—';
      assetsBar.style.display = 'flex';
    }
    if (quota) {
      const used  = quota.used  ?? 0;
      const limit = quota.limit ?? 1;
      const pct   = Math.round((used / limit) * 100);
      const remaining = limit - used;
      document.getElementById('quotaTxt').textContent = `${remaining} calls left`;
      document.getElementById('quotaPct').textContent = `${pct}%`;
      document.getElementById('quotaFill').style.width = `${pct}%`;
      quotaBar.style.display = 'flex';
    }
  }

  /* ── Send message ─────────────────────────────────── */
  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    msgInput.value = '';
    msgInput.style.height = 'auto';

    appendMessage('user', text);
    showTyping();
    statusLine.textContent = 'Thinking…';

    try {
      const res = await fetch('/api/ai/agent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ message: text }),
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok || !data.ok) {
        const errTxt = data.error || 'Server error. Please try again.';
        appendMessage('ai', `⚠️ ${errTxt}`);
        statusLine.textContent = 'Error';
      } else {
        appendMessage('ai', data.text, data.actions, data.model);
        updateAssets(data.ctx, data.quota);
        statusLine.textContent = `AI Assistant · ${data.model || 'ready'}`;
      }
    } catch (err) {
      removeTyping();
      appendMessage('ai', '⚠️ Network error — check your connection and try again.');
      statusLine.textContent = 'Offline';
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      msgInput.focus();
    }
  }

  /* ── Clear history ────────────────────────────────── */
  async function clearHistory() {
    if (!confirm('Clear conversation history?')) return;
    try {
      await fetch('/api/ai/history', { method: 'DELETE', credentials: 'include' });
    } catch (_) {}
    // Reset UI
    const msgs = chatScroll.querySelectorAll('.msg');
    msgs.forEach(m => m.remove());
    welcomeEl.style.display = 'flex';
    msgCount = 0;
    statusLine.textContent = 'AI Assistant · DRD2027';
    assetsBar.style.display = 'none';
    quotaBar.style.display  = 'none';
  }

  /* ── Init: fetch quota on load ────────────────────── */
  (async () => {
    try {
      const r = await fetch('/api/ai/stats', { credentials: 'include' });
      if (r.ok) {
        const d = await r.json();
        if (d.quota) updateAssets(null, d.quota);
      }
    } catch (_) {}
    msgInput.focus();
  })();
</script>
</body>
</html>
