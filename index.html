rformance-optimizations.css" as="style" onload="this.onload=null;this.rel='stylesheet'">\n  <noscript><link rel="stylesheet" href="/src/styles/performance-optimizations.css"></noscript>\n  \n  <title>CodeBank</title>\n\n  <!-- Capacitor Native Bridge -->\n  <script src="https://cdn.jsdelivr.net/npm/@capacitor/core/dist/capacitor.js"></script>\n  <script src="/src/native-bridge.js"></script>\n  <script src="/src/native-storage.js"></script>\n  \n  <!-- Native platform styles -->\n  <style>\n    /* Safe area support for notched devices */\n    body {\n      padding-top: env(safe-area-inset-top);\n      padding-bottom: env(safe-area-inset-bottom);\n      padding-left: env(safe-area-inset-left);\n      padding-right: env(safe-area-inset-right);\n    }\n    /* Hide scrollbars on native */\n    .native-platform ::-webkit-scrollbar { display: none; }\n    .native-platform { -webkit-overflow-scrolling: touch; }\n  </style>\n\n  <!-- PWA Install Handler (iOS guide + Android banner + Service Worker) -->\n  <script src="/src/pwa-install.js" defer></script>\n</head>\n<body>\n  <!-- Loading screen (removed by JS when ready) -->\n  <div id="loading" class="loading-screen">\n    <div class="spinner"></div>\n  </div>\n\n  <div id="app"></div>\n\n  <!-- Module scripts (loaded asynchronously) -->\n  <script type="module">\n    (async () => {\n      try {\n        // 🌐 Platform Detection: Add native class for CSS targeting\n        if (window.Capacitor && window.Capacitor.isNativePlatform()) {\n          document.body.classList.add('native-platform');\n          document.body.classList.add('platform-' + window.Capacitor.getPlatform());\n          console.log('[CodeBank] Running on native:', window.Capacitor.getPlatform());\n        }\n\n        // 🧠 Auth Flow Control: Skip grid if session is active\n        // On native, also check NativeStorage for persisted session\n        const sessionActive = localStorage.getItem("session_active") === "true";\n        const nativeSession = window.NativeStorage ? window.NativeStorage.syncGet("session_active") : null;\n        \n        if (sessionActive || nativeSession === "true" || nativeSession === true) {\n          console.log("Active session found, redirecting to app...");\n          // Show loading screen is already handled by the HTML\n          setTimeout(() => {\n            window.location.href = "/yt-new-clear.html";\n          }, 1500);\n          return; // Stop further execution\n        }\n\n        // Dynamic imports for code splitting\n        const loadApp = async () => {\n          try {\n            console.log('[Index] Starting app load...');\n            \n            // Check DOM elements\n            const appEl = document.getElementById('app');\n            console.log('[Index] App element found:', !!appEl);\n            if (!appEl) throw new Error('App container #app not found');\n            \n            // Core first\n            console.log('[Index] Importing core modules...');\n            const [{ serviceManager }, { assetBus }, { watchDog }] = await Promise.all([\n              import('./src/core/service-manager-v2.js'),\n              import('./src/core/assetbus-v2.js'),\n              import('./src/core/watch-dog-optimized.js')\n            ]);\n            console.log('[Index] Core modules imported successfully');\n            \n            // UI components (lazy)\n            console.log('[Index] Importing app-grid...');\n            const { renderAppGrid } = await import('./src/components/app-grid.js');\n            console.log('[Index] App-grid imported successfully, type:', typeof renderAppGrid);\n            \n            // Initialize\n            window.serviceManager = serviceManager;\n            window.assetBus = assetBus;\n            window.watchDog = watchDog;\n            console.log('[Index] Global references set');\n            \n            // Render\n            console.log('[Index] Calling renderAppGrid...');\n            renderAppGrid(appEl);\n            console.log('[Index] renderAppGrid completed');\n            \n            // Remove loading screen\n            document.getElementById('loading').remove();\n            console.log('[Index] Loading screen removed');\n            \n            // Load performance monitor (dev only)\n            if (location.hostname === 'localhost' || location.search.includes('debug')) {\n              await import('./src/utils/performance-monitor.js');\n            }\n            \n            console.log('[Index] App loaded successfully!');\n            \n          } catch (err) {\n            console.error('[Index] Failed to load app:', err.message);\n            console.error('[Index] Stack:', err.stack);\n            const loadingEl = document.getElementById('loading');\n            if (loadingEl) {\n              loadingEl.innerHTML = '<p>فشل التحميل.<br>خطأ: ' + err.message + '</p>';\n            }\n          }\n        };\n        \n        // Use requestIdleCallback for non-critical start\n        if ('requestIdleCallback' in window) {\n          requestIdleCallback(loadApp, { timeout: 2000 });\n        } else {\n          setTimeout(loadApp, 0);\n        }\n      } catch (err) {\n        console.error('Script initialization error:', err);\n      }\n    })();\n  </script>\n\n  <!-- Service Worker -->\n  <script>\n    if ('serviceWorker' in navigator) {\n      navigator.serviceWorker.register('/sw.js', { \n        updateViaCache: 'imports' \n      }).catch(console.error);\n    }\n  </script>\n</body>\n</html>\n
