<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f0f">
  
  <!-- Performance: Preconnect to critical domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://api.codebank.app">
  
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- Critical CSS inline -->
  <style>
    /* Minimal critical CSS for first paint */
    body { margin: 0; background: #0f0f0f; color: #fff; font-family: system-ui; }
    #app { min-height: 100vh; }
    .loading-screen { 
      position: fixed; 
      inset: 0; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      background: #0f0f0f;
      z-index: 99999;
    }
    .spinner { 
      width: 40px; 
      height: 40px; 
      border: 3px solid #333; 
      border-top-color: #00d4ff; 
      border-radius: 50%; 
      animation: spin 1s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  
  <!-- Async load non-critical CSS -->
  <link rel="preload" href="/src/styles/performance-optimizations.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="/src/styles/performance-optimizations.css"></noscript>
  
  <title>CodeBank</title>
</head>
<body>
  <!-- Loading screen (removed by JS when ready) -->
  <div id="loading" class="loading-screen">
    <div class="spinner"></div>
  </div>

  <div id="app"></div>

  <!-- Module scripts (loaded asynchronously) -->
  <script type="module">
    // 🧠 Auth Flow Control: Verify session with server before redirecting (prevents redirect loop)
    const _idxToken = localStorage.getItem("session_token");
    if (_idxToken) {
      try {
        const _idxResp = await fetch('/api/auth/me', { 
          credentials: 'include', 
          headers: { 'Authorization': 'Bearer ' + _idxToken }
        });
        const _idxData = _idxResp.ok ? await _idxResp.json() : null;
        if (_idxData && _idxData.user && _idxData.user.id) {
          console.log("🚀 Active session verified, redirecting to app...");
          window.location.href = "/yt-new-clear.html";
          return;
        }
        // Session expired or invalid — clear stale flags and render app grid
        localStorage.removeItem("session_active");
        localStorage.removeItem("session_token");
        localStorage.removeItem("user_data");
      } catch(_idxErr) {
        localStorage.removeItem("session_active");
      }
    }

    // Dynamic imports for code splitting
    const loadApp = async () => {
      try {
        // Core first
        const [{ serviceManager }, { assetBus }, { watchDog }] = await Promise.all([
          import('./src/core/service-manager-v2.js'),
          import('./src/core/assetbus-v2.js'),
          import('./src/core/watch-dog-optimized.js')
        ]);
        
        // UI components (lazy)
        const { renderAppGrid } = await import('./src/components/app-grid.js');
        
        // Initialize
        window.serviceManager = serviceManager;
        window.assetBus = assetBus;
        window.watchDog = watchDog;
        
        // Render
        renderAppGrid(document.getElementById('app'));
        
        // Remove loading screen
        document.getElementById('loading').remove();
        
        // Load performance monitor (dev only)
        if (location.hostname === 'localhost' || location.search.includes('debug')) {
          await import('./src/utils/performance-monitor.js');
        }
        
      } catch (err) {
        console.error('Failed to load app:', err);
        document.getElementById('loading').innerHTML = '<p>فشل التحميل. يرجى تحديث الصفحة.</p>';
      }
    };
    
    // Use requestIdleCallback for non-critical start
    if ('requestIdleCallback' in window) {
      requestIdleCallback(loadApp, { timeout: 2000 });
    } else {
      setTimeout(loadApp, 0);
    }
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { 
        updateViaCache: 'imports' 
      }).catch(console.error);
    }
  </script>
</body>
</html>
