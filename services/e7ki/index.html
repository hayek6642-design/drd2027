<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E7ki - محادثة آمنة</title>
    
    <!-- Service Base (MUST be first) -->
    <script src="/shared/service-base.js"></script>
    
    <!-- Auth Client -->
    <script src="/shared/iframe-auth-client.js"></script>
    
    <!-- Optimized styles (inline critical CSS) -->
    <style>
        /* Critical CSS inline - rest loaded async */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, sans-serif; 
            background: #0f0f0f; 
            color: #fff;
            display: none; /* Hidden until activated */
        }
        .chat-container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        .messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px;
            scroll-behavior: smooth;
        }
        .input-area { 
            padding: 15px; 
            background: rgba(255,255,255,0.05);
            display: flex;
            gap: 10px;
        }
        input { 
            flex: 1; 
            padding: 12px; 
            border-radius: 25px; 
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        button { 
            padding: 12px 24px; 
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        /* Loading state */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
            gap: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    
    <!-- Non-critical CSS async -->
    <link rel="preload" href="/e7ki/styles.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
</head>
<body>
    <!-- Loading State -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>جاري التحميل...</p>
    </div>

    <!-- Main Chat (hidden initially) -->
    <div class="chat-container" id="chat-app" style="display:none;">
        <header class="chat-header">
            <h2>E7ki</h2>
            <span id="user-status">● متصل</span>
        </header>
        
        <div class="messages" id="messages">
            <!-- Messages loaded dynamically -->
        </div>
        
        <div class="input-area">
            <input type="text" id="message-input" placeholder="اكتب رسالتك..." autocomplete="off">
            <button id="send-btn">إرسال</button>
        </div>
    </div>

    <!-- Scripts loaded async -->
    <script>
        // Initialize service base immediately
        ServiceBase.init('e7ki');
        
        // E7ki specific implementation
        const E7kiApp = {
            messages: [],
            socket: null,
            
            async init() {
                // Wait for auth
                const auth = await ServiceBase.requireAuth();
                if (!auth) {
                    this.showError('يجب تسجيل الدخول');
                    return;
                }

                // Hide loading, show app
                document.getElementById('loading').style.display = 'none';
                document.getElementById('chat-app').style.display = 'flex';
                
                // Setup chat
                this.setupSocket();
                this.setupUI();
                this.loadMessages();
                
                console.log('[E7ki] App initialized');
            },

            setupSocket() {
                // WebSocket with auto-reconnect
                const wsUrl = `ws://${location.host}/ws`;
                this.connectWebSocket(wsUrl);
            },

            connectWebSocket(url) {
                try {
                    this.socket = new WebSocket(url);
                    
                    this.socket.onopen = () => {
                        console.log('[E7ki] WebSocket connected');
                        // Send init message with user info
                        this.socket.send(JSON.stringify({
                            type: 'init',
                            payload: {
                                userId: ServiceBase.authState?.user?.id || 'anonymous'
                            }
                        }));
                    };
                    
                    this.socket.onmessage = (e) => {
                        const msg = JSON.parse(e.data);
                        this.handleMessage(msg);
                    };
                    
                    this.socket.onclose = () => {
                        console.log('[E7ki] WebSocket disconnected, reconnecting...');
                        // Auto-reconnect after 3s
                        setTimeout(() => this.connectWebSocket(url), 3000);
                    };
                    
                    this.socket.onerror = (error) => {
                        console.error('[E7ki] WebSocket error:', error);
                    };
                    
                } catch (err) {
                    console.error('[E7ki] WebSocket connection failed:', err);
                    // Fallback to polling
                    this.startPolling();
                }
            },

            setupUI() {
                const input = document.getElementById('message-input');
                const sendBtn = document.getElementById('send-btn');
                
                const sendMessage = () => {
                    const text = input.value.trim();
                    if (!text) return;
                    
                    this.sendMessage(text);
                    input.value = '';
                };
                
                sendBtn.addEventListener('click', sendMessage);
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') sendMessage();
                });
                
                // Optimized scroll handling
                const messagesDiv = document.getElementById('messages');
                messagesDiv.addEventListener('scroll', ServiceBase.throttle(() => {
                    this.loadMoreMessagesIfNeeded();
                }, 200));
            },

            sendMessage(text) {
                const message = {
                    id: Date.now(),
                    text: text,
                    sender: 'me',
                    timestamp: new Date().toISOString()
                };
                
                this.addMessageToUI(message);
                
                if (this.socket?.readyState === WebSocket.OPEN) {
                    this.socket.send(JSON.stringify({
                        type: 'message',
                        payload: message
                    }));
                }
            },

            handleMessage(msg) {
                switch(msg.type) {
                    case 'message':
                        this.addMessageToUI(msg.payload);
                        break;
                    case 'presence':
                        this.updateUserStatus(msg.payload);
                        break;
                    case 'typing':
                        this.showTypingIndicator(msg.payload);
                        break;
                    case 'read':
                        this.markAsRead(msg.payload);
                        break;
                    case 'init':
                        console.log('[E7ki] Initialized with server');
                        break;
                    default:
                        console.log('[E7ki] Unknown message type:', msg.type);
                }
            },

            updateUserStatus(status) {
                const statusEl = document.getElementById('user-status');
                if (statusEl) {
                    statusEl.textContent = status.status === 'online' ? '● متصل' : '○ غير متصل';
                    statusEl.style.color = status.status === 'online' ? '#00d4ff' : '#666';
                }
            },

            showTypingIndicator(data) {
                // Show typing indicator
                console.log('[E7ki] User typing:', data);
            },

            markAsRead(data) {
                // Mark message as read
                console.log('[E7ki] Message read:', data);
            },

            startPolling() {
                console.log('[E7ki] Starting HTTP polling fallback');
                // Simple polling implementation
                setInterval(async () => {
                    try {
                        const response = await fetch(`/api/e7ki/messages?chat_id=default`);
                        if (response.ok) {
                            const messages = await response.json();
                            messages.forEach(msg => this.addMessageToUI(msg));
                        }
                    } catch (err) {
                        console.error('[E7ki] Polling failed:', err);
                    }
                }, 5000);
            },

            addMessageToUI(msg) {
                const container = document.getElementById('messages');
                const div = document.createElement('div');
                div.className = `message ${msg.sender === 'me' ? 'sent' : 'received'}`;
                div.innerHTML = `
                    <p>${this.escapeHtml(msg.text)}</p>
                    <span class="time">${new Date(msg.timestamp).toLocaleTimeString('ar')}</span>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            // ServiceBase lifecycle overrides
            onPause() {
                if (this.socket) this.socket.close();
            },

            onResume() {
                if (this.socket) this.setupSocket();
            },

            onDestroy() {
                if (this.socket) this.socket.close();
            }
        };

        // Start when service is ready
        window.addEventListener('service:ready', () => {
            E7kiApp.init();
        });

        // Override ServiceBase hooks
        ServiceBase.onActivate = function() {
            document.body.style.display = 'block';
            E7kiApp.onResume?.();
        };

        ServiceBase.onDeactivate = function() {
            E7kiApp.onPause?.();
        };

        ServiceBase.onDestroy = function() {
            E7kiApp.onDestroy?.();
        };
    </script>
</body>
</html>
